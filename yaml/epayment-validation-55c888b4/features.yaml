    module: Finance - Payment Validation
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Multi-select validated invoices for voucher creation, same-vendor enforcement, automatic total amount calculation (sum of payableAmounts), reference number generation (K1-PV-yyMMdd-{id}), optional per-invoice descriptions, payment voucher listing with tabs (Pending Approval/Paid), payment voucher detail view with linked invoices and documents, immediate approval workflow trigger upon creation.
