  - name: Office Asset Procurement Integration
    description: |
      Integration between Asset Management and Office Services (OS) module for office asset procurement. When a department needs an office asset, the request goes through the OS module, which checks the Asset Registrar for existing available assets before initiating a new Purchase Request (PR). This prevents unnecessary purchases by reusing available assets. At the end of each month, all asset-related transactions are posted to the ledger (pending KPA API integration for automated ledger posting).
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Office asset request workflow via OS module, Asset Registrar availability check before PR creation, automatic routing to Purchase Request if no available asset exists, monthly ledger posting of asset transactions (pending KPA API), asset transaction journal for financial reconciliation, integration with existing OS and Procurement modules.
    outOfScope: |
      KPA API implementation (pending — ledger posting will be manual or batch until API is available), non-office asset procurement workflows.
    sequence: 9
    uatFlows:
      - name: Request Office Asset via OS Module
        description: User submits a request for an office asset through the Office Services module. The system checks the Asset Registrar for available assets of the requested type before allowing a new Purchase Request to be created.
        preconditions: User has OS module access. Asset Registrar is operational.
        status: draft
        sequence: 0
      - name: Asset Registrar Availability Check
        description: OS module queries the Asset Registrar to check if there are available (unassigned, returned, or surplus) assets matching the request. If available, the asset is reassigned instead of purchasing new.
        preconditions: Office asset request submitted. Asset Registrar contains asset inventory data.
        status: draft
        sequence: 1
      - name: Route to Purchase Request if No Asset Available
        description: If no matching asset is available in the Asset Registrar, the system automatically creates a Purchase Request (PR) in the procurement module with pre-filled asset specifications.
        preconditions: Asset Registrar check returned no available assets.
        status: draft
        sequence: 2
      - name: Monthly Ledger Posting of Asset Transactions
        description: At the end of each month, all asset-related financial transactions (acquisitions, disposals, transfers, maintenance costs) are compiled and posted to the general ledger. Note — pending KPA API integration for automated posting; currently supports batch export for manual posting.
        preconditions: Asset transactions exist for the period. Month-end closing is initiated.
        status: draft
        sequence: 3
  - name: Asset Reporting Suite
    description: |
      Standardised set of five core asset management reports required for operational and financial oversight. These reports provide a comprehensive view of asset portfolio status, movements, and lifecycle events. Reports include: (1) Total Asset Report, (2) New Assets Report, (3) Disposals Report, (4) Maintenance Report, and (5) Transfer Report (by department and custodian).
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Total Asset Report (complete inventory with current values, statuses, and locations), New Assets Report (assets registered within a given period with acquisition details), Disposals Report (disposed assets with method, value recovered, and approval trail), Maintenance Report (maintenance activities, costs, and frequency per asset), Transfer Report (asset transfers by department and custodian with movement history), report filtering by date range, department, category, and status, export to PDF and Excel, scheduled report generation.
    outOfScope: |
      Custom report builder (covered under existing Reporting & Analytics Dashboard feature), predictive analytics.
    sequence: 10
    uatFlows:
      - name: Generate Total Asset Report
        description: User generates a comprehensive report of all registered assets showing current status, location, custodian, book value, and condition.
        preconditions: Assets exist in the system. User has reporting access.
        status: draft
        sequence: 0
      - name: Generate New Assets Report
        description: User generates a report of all newly registered assets within a specified date range, showing acquisition source, cost, and department assignment.
        preconditions: Assets have been registered within the selected period.
        status: draft
        sequence: 1
      - name: Generate Disposals Report
        description: User generates a report of all disposed assets within a specified period, showing disposal method, value recovered, approval chain, and compliance status.
        preconditions: Disposals have been completed within the selected period.
        status: draft
        sequence: 2
      - name: Generate Maintenance Report
        description: User generates a report of all maintenance activities showing costs, frequency, technician assignments, and SLA compliance per asset or department.
        preconditions: Maintenance records exist in the system.
        status: draft
        sequence: 3
      - name: Generate Transfer Report
        description: User generates a report of all asset transfers showing movement by department and custodian, including transfer dates, approval status, and current assignment.
        preconditions: Asset transfers have been recorded in the system.
        status: draft
        sequence: 4
