  - name: Invoice Validation Workflow (3-Level Sequential Approval)
    description: Automated three-level sequential validation workflow triggered upon invoice submission. Each level must complete before the next begins, with 2-business-day SLA per level. The chain proceeds from Requester HOD to Department Finance Officer to Finance AP, culminating in invoice VALIDATED status.
    module: Finance - Payment Validation
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Level 1 - Requester HOD validation (VERIFICATION task, 2 business day SLA, assigned to requester's HOD). Level 2 - Finance Officer validation (VERIFICATION task, 2 business day SLA, assigned to department-specific Finance Officer from PURCHASE_REQUEST_DEPARTMENTS config). Level 3 - Finance AP validation (VERIFICATION task, 2 business day SLA, assigned to finance-ap role user, sets validatedAt timestamp on approval). Task creation with auto-generated names (e.g., "Requester HOD: Payment Validation for Invoice #K1-INV-yyMMdd-{id}"). Approval and rejection with comments at each level. Notification dispatch on task assignment, approval, and rejection. Sequential workflow progression (next level only starts after previous approval). Invoice status transition from SUBMITTED to VALIDATED upon Level 3 approval.
    outOfScope: Parallel validation, automatic escalation on SLA breach, delegation/proxy approval.
    sequence: 1
    mockScreens: []
    processFlows: []
    uatFlows:
      - name: Level 1 - Requester HOD Validates Invoice
        description: Requester HOD receives a VERIFICATION task, reviews the invoice against the PO, and approves it to advance the workflow to Level 2.
        preconditions: Invoice has been submitted. Requester has a configured HOD. VERIFICATION task is ACTIVE and assigned to the HOD.
        status: draft
        sequence: 0
      - name: Level 1 - Requester HOD Rejects Invoice
        description: Requester HOD reviews the invoice and rejects it with comments. Workflow stops, requester is notified.
        preconditions: VERIFICATION task is ACTIVE and assigned to the HOD.
        status: draft
        sequence: 1
      - name: Level 2 - Finance Officer Validates Invoice
        description: Department-specific Finance Officer receives a VERIFICATION task after Level 1 approval, reviews compliance, and approves to advance to Level 3.
        preconditions: Level 1 has been approved. Finance Officer is configured for the requester's department.
        status: draft
        sequence: 2
      - name: Level 2 - Finance Officer Rejects Invoice
        description: Finance Officer rejects the invoice with comments. Workflow stops, requester is notified.
        preconditions: VERIFICATION task is ACTIVE and assigned to the Finance Officer.
        status: draft
        sequence: 3
      - name: Level 3 - Finance AP Validates Invoice (Final)
        description: Finance AP user receives the final VERIFICATION task, validates the invoice, and sets validatedAt. Invoice status transitions to VALIDATED. Requester receives "Invoice Validated" notification.
        preconditions: Level 2 has been approved. Finance AP user exists with 'finance-ap' role.
        status: draft
        sequence: 4
      - name: Level 3 - Finance AP Rejects Invoice
        description: Finance AP rejects the invoice with comments. Workflow stops, requester is notified. Invoice remains SUBMITTED.
        preconditions: VERIFICATION task is ACTIVE and assigned to Finance AP.
        status: draft
        sequence: 5
