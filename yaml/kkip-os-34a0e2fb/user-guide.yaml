metadata:
  title: KKIP Office Services - User Guide
  version: "1.0"
  lastUpdated: null
  description: >
    Comprehensive user guide for the KKIP Office Services system covering Office Supplies Requests,
    Room Booking, and Vehicle Booking modules. Instructions are organized by user role.

roles:
  - name: Requester (Office Supplies, Vehicle & Room Booking)
    slug: requester
    description: >
      End users who submit office supply requests, book meeting rooms, and reserve vehicles.
      This role covers all self-service actions available to regular staff members.
    sequence: 0
    sections:
      - title: Office Supplies - Browsing the Catalog
        slug: office-supplies-browsing
        module: Office Services
        sequence: 0
        content: >
          To browse available office supplies, navigate to "User Modules" > "New Office Supplies Order"
          or go directly to /user/office-supplies. The page displays a table of all office supply items
          with columns for Item Code, Name, Image, Availability, and Actions.

          You can search for items by typing an item name or code into the search field. The table
          supports pagination — use "Next" and "Previous" to navigate pages. Each page shows the
          range of items displayed (e.g., "Showing 1 to 10 of 50 items").

          Stocked items show the available quantity and unit of measurement (UOM), along with an
          "Add" button to add them to your cart. Non-stocked items display italic "Not currently stocked"
          text and a "Request" button for submitting a department request.

      - title: Office Supplies - Adding Items to Cart
        slug: office-supplies-cart
        module: Office Services
        sequence: 1
        content: >
          Click the "Add" button on a stocked item to open the "Add Item to Cart" dialog. This dialog
          shows the Item Code, Item Name, an "Available" badge with quantity and UOM, and a quantity
          input field.

          Enter a valid quantity within the available range and click "Add to Cart". A success toast
          "Item added to cart" confirms the action, and the cart counter in the header increments.

          If you try to exceed available stock, an error toast "Cannot add X more. Only Y available."
          will appear. If an item is already in the cart, the dialog shows an "In Cart" badge with the
          existing quantity. The total (existing + new) cannot exceed available stock.

      - title: Office Supplies - Viewing and Managing Your Cart
        slug: office-supplies-manage-cart
        module: Office Services
        sequence: 2
        content: >
          Click the "View Cart" button (shopping cart icon with badge) in the page header. The
          "Office Supplies Cart" dialog opens showing your item count and total quantity.

          The cart displays a table with Item Code, Item Name, Warehouse, Requested quantity (editable),
          and a delete button. You can modify quantities directly (cannot exceed available stock or go
          below 1) and remove items using the trash icon.

          Below the cart items, enter a reason for your request in the required "Reason for Request"
          textarea. Optionally, link a referenced ticket using the searchable dropdown. The
          "Preview Order" button is only enabled when the cart has items and a reason is provided.

      - title: Office Supplies - Previewing and Submitting a Request
        slug: office-supplies-submit
        module: Office Services
        sequence: 3
        content: >
          Click "Preview Order" to open the "Office Supplies Request Preview" dialog. This shows a
          formatted document with KKIP letterhead, the heading "OFFICE SUPPLIES REQUEST", a draft
          reference number, your name, department, and date.

          Review the items table showing No, Item Code, Item Name, Warehouse, and Quantity. Verify
          the "Reason for Request" section. When satisfied, click "Submit Request".

          A success toast confirms submission and you are redirected to the home page. A new
          INVENTORY-REQUEST ticket is automatically created in the Helpdesk system.

      - title: Office Supplies - Requesting Non-Stocked Items
        slug: office-supplies-non-stocked
        module: Office Services
        sequence: 4
        content: >
          For items marked as "Not currently stocked", click the "Request" button to open the
          "Create Department Request" dialog. The Target Department is pre-filled with "Office Service"
          and the Title with "Office Supplies Inventory Request".

          Fill in the required description of the item you need. Select an urgency level from
          Normal (default), Urgent, Highly Urgent, or Extremely Urgent. Optionally link a
          referenced ticket and attach supporting files. Click submit to create the department request.

      - title: Office Supplies - Completing Goods Received Note (GRN)
        slug: office-supplies-grn
        module: Office Services
        sequence: 5
        content: >
          Once your supplies are ready for pickup, you will receive a notification. Navigate to
          the inventory request ticket. A RECEIVING task will be active.

          Click "Complete GRN" to open the GRN dialog showing items with Expected Quantity and
          editable Quantity Received fields. Enter the quantity received for each item (cannot
          exceed expected amounts). Submit the GRN to mark the request as RECEIVED.

      - title: Office Supplies - Providing Feedback
        slug: office-supplies-feedback
        module: Office Services
        sequence: 6
        content: >
          After receiving your supplies, a FEEDBACK task becomes active on the request ticket.
          Click "Leave Feedback" to open the feedback dialog.

          Rate the service from 1 to 5 stars and enter your feedback comments in the textarea.
          Both the rating and comments are required. Click "Submit Feedback" to complete the process.

      - title: Room Booking - Browsing Room Availability
        slug: room-booking-browse
        module: Office Services
        sequence: 7
        content: >
          Navigate to My Bookings > New Booking and click the "Meeting Room Booking" tab. The page
          shows a 7-day calendar selector and room availability cards in a 3-column grid.

          Click on a date to view room availability for that day. Use the arrow buttons to navigate
          between weeks. Each room card shows the room image, name, location, facilities (with
          quantity badges), available time slots, and booked slots (with booker name).

          Your own bookings display a green "Booked by me" badge. If a room is fully booked for
          the selected date, clicking it shows a warning toast.

      - title: Room Booking - Creating a Room Booking
        slug: room-booking-create
        module: Office Services
        sequence: 8
        content: >
          Click on a room card with available slots to open the booking form dialog. Fill in
          the required Meeting Purpose and Description fields.

          Select Start Time and End Time from the dropdowns (15-minute increments, 7 AM - 7 PM).
          Only available (non-booked) time slots are shown. Minimum booking duration is 30 minutes.

          Optional fields include Referenced Ticket, Invite Users (multi-select), and office
          service requests: Refreshments, Presentation Setup, Extra Tables (with quantity),
          Extra Chairs (with quantity), and Extra Cleanup. You can also add attachments and
          additional remarks.

          Review and accept the Terms and Conditions, then click "Create Booking". A success
          toast confirms submission. If you are not in top management, the booking goes to your
          HOD for approval. Top management bookings are auto-approved.

      - title: Room Booking - Managing Your Bookings
        slug: room-booking-manage
        module: Office Services
        sequence: 9
        content: >
          Navigate to My Bookings > "Meeting Room Bookings" tab to view your bookings. You can
          edit a booking by clicking "Edit Booking" on the card — this opens a dialog with
          pre-populated fields for date, time, purpose, and invited users. Room selection
          cannot be changed.

          To cancel a booking, click the red "Cancel" button. A confirmation dialog shows the
          booking details. Click "Delete" to permanently remove the booking. This also removes
          the associated calendar event and Outlook event (if connected).

      - title: Room Booking - Post-Booking Evaluation
        slug: room-booking-evaluation
        module: Office Services
        sequence: 10
        content: >
          After your booking date passes, an EVALUATE task becomes active. You will receive a
          notification. Navigate to the room booking ticket and click "Evaluate Booking".

          Enter your feedback about the room booking experience in the required textarea and
          submit the evaluation.

      - title: Vehicle Booking - Browsing Vehicle Availability
        slug: vehicle-booking-browse
        module: Office Services
        sequence: 11
        content: >
          Navigate to My Bookings > New Booking > "Vehicle Booking" tab. The page shows a 7-day
          calendar selector and vehicle availability cards in a 4-column grid.

          Click on a date to view vehicle availability. Use the search field to find vehicles by
          model name or license plate. Each card shows the vehicle image, model, license plate,
          available slots, and booked slots.

          Vehicles may show status indicators: "Under Maintenance" (orange, not bookable),
          "Exclusively used by [Entity]" (yellow), or "Available for Booking" (green).

      - title: Vehicle Booking - Creating a Booking (Same Day / Multi-Day)
        slug: vehicle-booking-create
        module: Office Services
        sequence: 12
        content: >
          Click on an available vehicle to open the booking form. Select a Purpose from the
          dropdown (Meeting Client, Site Inspection, Dispatch, etc.) or choose "Others" to enter
          a custom reason. Fill in the required Description and Location fields.

          For same-day bookings, leave "Returning on the same day?" checked and select pickup
          and return times. For multi-day bookings, uncheck the same-day option and select a
          return date. The system checks availability across all days.

          Choose a Driver Option: "I am the driver" (self-drive), "KKIP Employee" (search and
          select an employee), or "Require OS Driver" (Office Service assigns a driver later).

          Optionally attach files, invite users, and link a referenced ticket. Accept the
          terms and conditions and click "Create Booking".

      - title: Vehicle Booking - Managing Your Bookings
        slug: vehicle-booking-manage
        module: Office Services
        sequence: 13
        content: >
          Navigate to My Bookings > "Vehicle Bookings" tab with "Active" and "Completed"
          sub-tabs. Active bookings show vehicle details and action buttons.

          If keys have been released but not returned, a "Return Keys" button appears. Complete
          the key return flow including uploading a dashboard photo, entering mileage, and
          selecting fuel level. Click "New Vehicle Booking" to create a new booking.

      - title: Vehicle Booking - Post-Trip Evaluation
        slug: vehicle-booking-evaluation
        module: Office Services
        sequence: 14
        content: >
          After vehicle key return, an EVALUATE task becomes active. Click "Evaluate Booking"
          to open the evaluation dialog.

          Enter general trip feedback (max 2000 characters). Optionally check "Report a fine?"
          or "Report an accident?" to provide additional details. Both detail fields become
          required when their checkbox is checked. Submit the evaluation to complete the process.

      - title: Calendar - Viewing Your Calendar
        slug: calendar-view
        module: Calendar
        sequence: 15
        content: >
          Navigate to My Calendar to view your personal calendar. The sidebar shows a monthly
          calendar picker (dates with events have indicator dots), availability buttons, and
          your weekly availability schedule.

          Select a date to see events for that day. Events are color-coded by type: standard
          (OTHERS), blue (vehicle bookings), purple (room bookings), amber (user bookings).
          If you have no events, a green "You're free today!" message appears.

          If you have pending booking requests, a banner shows at the top with a "View Requests"
          link.

      - title: Calendar - Creating and Managing Events
        slug: calendar-events
        module: Calendar
        sequence: 16
        content: >
          Click "New Event" to create a custom calendar event. The dialog offers quick booking
          links for Vehicle, Meeting Room, and User bookings.

          Fill in the Event Name (required), date, start/end times (15-minute intervals), and
          optional location and description. After selecting times, you can invite users. Click
          "Create Event" to preview, then confirm to create.

          Edit events by clicking "Edit" on the event card (available for future events you own).
          Delete events by clicking the red "Delete" button and confirming in the dialog. Events
          sync with Outlook if connected.

      - title: Calendar - Responding to Event Invitations
        slug: calendar-invitations
        module: Calendar
        sequence: 17
        content: >
          When invited to an event, it appears on your calendar with a "Pending" status badge in
          orange. Click "Accept" to accept (badge turns green) or "Reject" to decline (badge
          turns red).

          Event organizers can click "Show Accepts" to view invitation statuses for all invitees,
          with color-coded badges for Pending, Accepted, and Rejected.

      - title: Calendar - Setting Your Availability
        slug: calendar-availability
        module: Calendar
        sequence: 18
        content: >
          Click "Set Weekly Hours" in the calendar sidebar to configure your recurring weekly
          availability. Enable days, set time ranges (default 9 AM - 5 PM), and add multiple
          slots per day. Save to update your weekly schedule.

          Click "Date-Specific Hours" to override availability for specific dates. Select a date,
          add custom hours, or mark it as unavailable. Dates with overrides are highlighted on
          the calendar.

  - name: Office Service Officer
    slug: office-service-officer
    description: >
      Office Service staff responsible for processing inventory requests, managing vehicle keys,
      room bookings, vehicle fleet, and driver assignments.
    sequence: 1
    sections:
      - title: Inventory Requests - Viewing and Managing Orders
        slug: inventory-orders-manage
        module: Office Services
        sequence: 0
        content: >
          Navigate to Office Services > Orders to view the "Office Supplies Orders" page. The page
          has three tabs: "New" (APPROVED and ASSIGNED requests), "Ready for Pick Up" (PROCESSED),
          and "Completed" (RECEIVED).

          The table shows Reference (IR number), Requested On, Requested By, Officer Assigned
          (with reassign button), Department, Item Names (up to 3 with "..." for more), and Actions.

          Use the department dropdown and date range filters to narrow results. Click the "IR" eye
          icon to view the request PDF, or click the ticket icon to navigate to the linked ticket.

      - title: Inventory Requests - Preparing Supplies
        slug: inventory-prepare-supplies
        module: Office Services
        sequence: 1
        content: >
          When assigned to an inventory request, navigate to the request ticket. An EXECUTE task
          named "Prepare Office Supplies" will be active.

          Click "Confirm Order Ready" to open the preparation dialog with item details. Click
          "Notify Requester" to confirm supplies are ready for pickup. The request status changes
          to PROCESSED and the requester receives a notification.

      - title: Inventory Requests - Reassigning Requests
        slug: inventory-reassign
        module: Office Services
        sequence: 2
        content: >
          On the Orders page, you can reassign requests to yourself by clicking the reassign
          button (UserPlus icon) in the "Officer Assigned" column. This button only appears when
          you are not the current officer and the request has no feedback.

          The reassignment dialog shows the IR Reference, Current Officer, and your name as the
          New Officer. Type "CONFIRM REASSIGN" exactly to enable the "Reassign to Me" button.
          Click to confirm and all active tasks transfer to you.

      - title: Vehicle Bookings - Managing Keys
        slug: vehicle-keys-manage
        module: Office Services
        sequence: 3
        content: >
          Navigate to Office Services > Bookings > "Vehicles" tab. Select a booking date on the
          calendar sidebar (dates with bookings show red dots).

          To release keys: Click "Release Keys" on a booking card. Select the user receiving the
          keys, optionally enter mileage before and fuel level before, and check "Require Shell
          Card" if needed. Click "Release Keys" to confirm.

          To process key returns: Click "Return Key" (blue button). Select who the keys are being
          returned to, upload a clear dashboard photo showing odometer and fuel level, enter
          mileage after, and select fuel level after (required). Click "Return Keys" to complete.

      - title: Vehicle Bookings - Editing and Cancelling
        slug: vehicle-bookings-admin
        module: Office Services
        sequence: 4
        content: >
          On the Bookings page, you can edit booking times by clicking "Edit Time". Change start
          and end times (minimum 30-minute slots) and provide a reason for the change.

          Change drivers by clicking "Change Driver". Select a new driver from the filtered list
          and provide a reason for the change.

          Cancel bookings by clicking the red "Cancel" button. Enter a cancellation reason in the
          textarea and confirm. The booking is removed and marked as CANCELLED.

      - title: Room Bookings - Admin Management
        slug: room-bookings-admin
        module: Office Services
        sequence: 5
        content: >
          Navigate to Office Services > Bookings > "Rooms" tab. A calendar sidebar and booking
          card list are displayed. Select a date to view bookings (dates with bookings show red dots).

          Each booking card shows room name, location, status badge, time slot, booker name,
          meeting purpose, and invited users count. You can edit or cancel bookings from this view.
          Empty dates show "No room bookings found for this date".

      - title: Vehicle Management - Fleet Overview
        slug: vehicle-fleet-overview
        module: Office Services
        sequence: 6
        content: >
          Navigate to Office Services > Vehicle Management to view the fleet. Vehicles display
          as cards in a 3-column grid showing image, model, license plate, manufacturing year,
          mileage, insurance expiry, and road tax expiry.

          Search by model or license plate. Sort by Purchase Year, Insurance Date, or Road Tax
          Date (ascending or descending). Insurance and road tax dates are color-coded: red
          (expired), amber (expiring within 30 days), or normal.

      - title: Vehicle Management - Vehicle Details and Maintenance
        slug: vehicle-details-maintenance
        module: Office Services
        sequence: 7
        content: >
          Click a vehicle card to open the details dialog with Overview and Maintenance tabs.

          Overview shows Basic Information (Model, Manufacture Year, Purchase Year), Status
          (Mileage, Last Serviced, Insurance Valid Until, Road Tax Valid Until), and document
          sections for Insurance and Road Tax with upload/view options. Click "Edit Details" to
          modify editable fields.

          Maintenance tab provides "Request Service" (Regular Service, Maintenance, or Emergency
          Repair) and "Put in Repair Mode" / "Remove from Repair Mode" toggle. Vehicles in repair
          mode show an orange "Under Maintenance" badge and cannot be booked.

      - title: Vehicle Management - Usage Type
        slug: vehicle-usage-type
        module: Office Services
        sequence: 8
        content: >
          Click "Change Usage" in the vehicle details to toggle between "Available for KKIP Staff
          Booking" and "Exclusively Used By Specific Entity". When selecting exclusive use, enter
          the entity name (e.g., "CEO Office", "IT Department").

          Available vehicles show a green "Available for Booking" badge. Exclusive vehicles show
          a yellow "Exclusively used by [Entity]" badge.

      - title: OS Driver Assignment
        slug: os-driver-assignment
        module: Office Services
        sequence: 9
        content: >
          When a vehicle booking requests an OS (outsourced) driver, a driver assignment task
          is created. Navigate to the booking ticket and click "Assign Driver".

          Select a driver from the searchable dropdown (filtered to OS department users) and
          confirm the assignment. The booking updates to show the assigned driver name.

      - title: Driver Bookings View
        slug: driver-bookings
        module: Office Services
        sequence: 10
        content: >
          Navigate to Office Services > Driver Bookings to view bookings assigned to you as a
          driver. Select a date on the calendar to see non-completed bookings for that day.

          Booking cards show vehicle image, model, license plate, time, booker name, driver name,
          fuel level, and key status. You can release keys from this view using the same key
          release flow as the admin bookings page.

  - name: Requesting HOD
    slug: requesting-hod
    description: >
      Head of Department responsible for approving or rejecting inventory requests, room bookings,
      and vehicle bookings submitted by department members.
    sequence: 2
    sections:
      - title: Inventory Requests - Approving Requests
        slug: inventory-approve
        module: Office Services
        sequence: 0
        content: >
          When a department member submits an inventory request, it enters PENDING-APPROVAL status.
          Navigate to the request ticket (via notifications or Helpdesk).

          The InventoryRequestProgressCard shows the request at the "Approval" step with a 4-step
          progress bar (Submitted, Approved, Executed, Received). Click "Review" to open the review
          dialog with a PDF preview on the left and action buttons on the right.

          Click "Approve" to approve the request. The status changes to APPROVED and the requester
          receives a notification. An Office Service officer will then be assigned.

      - title: Inventory Requests - Requesting Changes
        slug: inventory-request-changes
        module: Office Services
        sequence: 1
        content: >
          In the review dialog, click "Return" to request modifications. A dialog appears with
          a textarea for "Changes Requested". Enter the reason and click "Send".

          The requester receives a revision task. They can click "Revise Inventory Request" to
          open the edit dialog, modify items/quantities/reason, and resubmit. A new approval
          task is then created for you.

      - title: Inventory Requests - Rejecting Requests
        slug: inventory-reject
        module: Office Services
        sequence: 2
        content: >
          In the review dialog, click the red "Reject" button. Enter a rejection reason in the
          dialog and click "Send". The request is marked as rejected and the requester is notified.

      - title: Inventory Requests - Modifying and Approving
        slug: inventory-modify-approve
        module: Office Services
        sequence: 3
        content: >
          You can adjust items before approving. In the review dialog, click "Modify" to open the
          edit dialog with current items pre-populated.

          Change quantities using +/- buttons or direct input, add an update reason, then click
          "Update and Approve". The request is updated with new quantities and approved simultaneously.

      - title: Inventory Requests - Department Orders View
        slug: inventory-department-orders
        module: Office Services
        sequence: 4
        content: >
          Navigate to Department > Office Supplies Orders to monitor your department's requests.
          The page has four tabs: "Pending Approval", "Processing", "Ready for Pick Up", and
          "Completed".

          Use the requester and date range filters to narrow results. You can view request PDFs
          and navigate to linked tickets. Note: the reassign button is not available in this view.

      - title: Room Booking - Approving Bookings
        slug: room-booking-approve
        module: Office Services
        sequence: 5
        content: >
          When a department member creates a room booking, you receive a notification. Navigate to
          the room booking ticket. The RoomBookingApprovalCard shows details including room, date,
          time, requester, reason, and invited users.

          Click "Approve" to approve the booking. The requester receives notification and email,
          invited users receive email invitations, and the calendar event is created (with Outlook
          sync if connected). Click "Reject" to reject with a reason — the requester is notified.

      - title: Vehicle Booking - Approving Bookings
        slug: vehicle-booking-approve
        module: Office Services
        sequence: 6
        content: >
          When a department member creates a vehicle booking, you receive a notification. Navigate
          to the vehicle booking ticket. The VehicleBookingApprovalCard shows details including
          vehicle, date, time, location, driver type, invited users, reason, and description.

          Click "Approve" to approve (status changes to APPROVED, requester is notified).
          Click "Reject" to reject with a reason. Note: bookings by top management users or
          users whose HOD has top-management role are auto-approved.

      - title: Assigning Officers to Approved Requests
        slug: assign-officer
        module: Office Services
        sequence: 7
        content: >
          After approving an inventory request, the Office Service HOD assigns an officer.
          Navigate to the request ticket where a CONSULT task is active.

          Click "Assign Officer" to open a dialog showing a list of Office Service officers
          (radio group). Select an officer and confirm. The request status changes to ASSIGNED
          and the officer's name appears on the request.
