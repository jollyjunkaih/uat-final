features:
  - name: Asset Registration & Onboarding
    description: |
      Complete asset registration lifecycle including manual entry, bulk import, and auto-registration from purchase orders. Captures asset details such as type, category, location, supplier info, invoice number, serial number, model, brand, warranty period, purchase date, purchase cost, and product lifecycle stage. Generates unique asset IDs and supports QR code/barcode label generation and printing. Supports multi-image uploads per asset for comprehensive visual documentation. Asset categories include Property, Buildings, and Vehicles (Machinery is out of scope for this phase). Includes letter of indemnity workflow for custodian accountability. Supports linking of disposable/consumable items to parent assets. Corporate Asset naming convention enforced to prevent confusion across departments.
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend + Mobile App
    inScope: |
      Manual asset registration form, bulk CSV/Excel import, auto-registration from completed purchase orders, asset categorization — in-scope categories: Property, Buildings, Vehicles (Machinery is NOT in scope for this phase), QR code and barcode generation, label printing (customizable templates), multi-image upload per asset (not just single photo — supports gallery of images for comprehensive documentation), document attachment (warranty cards, invoices, manuals), unique asset ID assignment, serial number capture, model capture, brand capture, asset status management (Active, In Repair, Disposed, Lost), custodian/department assignment, warranty tracking with expiry alerts, letter of indemnity generation for custodian accountability, disposable/consumable item linking to parent asset (e.g., toner linked to printer), Corporate Asset naming convention and standardised labelling to prevent inter-department confusion, custodian retirement asset listing and handover (when a person is retiring, system lists all assets assigned to them for reassignment).
    outOfScope: |
      RFID tag programming, GPS real-time tracking hardware integration, asset insurance policy management, Machinery category (not in scope for this phase).
    sequence: 0
    uatFlows:
      - name: Register New Asset Manually
        description: User fills in asset registration form with all required fields including asset type, category, location, serial number, purchase details, and custodian assignment.
        preconditions: User has Asset Management module access with registration permissions.
        status: draft
        sequence: 0
      - name: Bulk Import Assets via CSV/Excel
        description: User uploads a CSV or Excel file containing multiple asset records. System validates data, reports errors, and creates asset records for valid entries.
        preconditions: User has admin access to Asset Management module. Import template is available.
        status: draft
        sequence: 1
      - name: Auto-Register Asset from Purchase Order
        description: Upon GRN completion in the procurement module, system prompts user to register received items as assets with pre-filled supplier and cost data.
        preconditions: A purchase order has been completed with GRN. Procurement module integration is active.
        status: draft
        sequence: 2
      - name: Generate and Print Asset Label
        description: User generates a QR code or barcode label for a registered asset and sends it to a connected label printer.
        preconditions: Asset is registered in the system. Label printer is configured.
        status: draft
        sequence: 3
      - name: Upload Asset Documents
        description: User attaches warranty cards, invoices, user manuals, or photos to an existing asset record.
        preconditions: Asset exists in the system.
        status: draft
        sequence: 4
      - name: View and Search Asset Register
        description: User browses the full asset register with search, filter (by category, location, department, status), and sort capabilities.
        preconditions: Assets exist in the system.
        status: draft
        sequence: 5
      - name: View Asset Detail
        description: User views complete asset information including specifications, assignment history, maintenance history, financial data, and attached documents.
        preconditions: Asset exists in the system.
        status: draft
        sequence: 6
      - name: List Assets for Retiring Custodian
        description: When a staff member is retiring or leaving, the system generates a complete list of all assets currently assigned to that person. Each asset must be reassigned or returned before the retirement process can be completed.
        preconditions: Staff member is flagged as retiring/leaving. Assets are assigned to the staff member.
        status: draft
        sequence: 7
      - name: Link Disposable Item to Asset
        description: User links a disposable/consumable item (e.g., toner cartridge, ink, cleaning supplies) to a parent asset. The system tracks consumption and replacement history of disposable items against the parent asset.
        preconditions: Parent asset is registered. Disposable item type exists in the system.
        status: draft
        sequence: 8
      - name: Upload Multiple Images for Asset
        description: User uploads multiple images (gallery) for an asset to provide comprehensive visual documentation from different angles or showing different components.
        preconditions: Asset is registered in the system.
        status: draft
        sequence: 9
  - name: Asset Tracking & Location Management
    description: |
      Real-time tracking of asset location and custodian assignment. Supports asset transfers between departments and locations, movement history logging, and custodian handover workflows. Enables QR/barcode scanning via mobile app for quick asset identification and location verification.
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend + Mobile App
    inScope: |
      Asset location assignment and updates, department/building/floor/room location hierarchy, custodian assignment and transfer, asset movement history log, QR code/barcode scanning for asset lookup (mobile), asset check-in/check-out for shared assets, location-based asset listing, transfer request and approval workflow, movement alerts for high-value assets.
    outOfScope: |
      GPS/IoT real-time location tracking, automated movement detection via sensors.
    sequence: 1
    uatFlows:
      - name: Scan Asset QR Code for Lookup
        description: User scans an asset's QR code or barcode using the mobile app to view full asset details including current location, custodian, and status.
        preconditions: Asset is registered with a generated QR/barcode label. Mobile app is installed.
        status: draft
        sequence: 0
      - name: Transfer Asset Between Departments
        description: User initiates an asset transfer request specifying the target department and new custodian. Transfer goes through approval workflow.
        preconditions: Asset is registered and active. User has transfer permissions.
        status: draft
        sequence: 1
      - name: Approve Asset Transfer
        description: HOD reviews and approves or rejects an asset transfer request.
        preconditions: A transfer request is pending approval. HOD is logged in.
        status: draft
        sequence: 2
      - name: Check-Out Shared Asset
        description: User checks out a shared asset (e.g., projector, camera) for temporary use with expected return date.
        preconditions: Asset is marked as shared/pooled and is currently available.
        status: draft
        sequence: 3
      - name: Check-In Shared Asset
        description: User returns a checked-out shared asset and confirms its condition.
        preconditions: Asset is currently checked out to the user.
        status: draft
        sequence: 4
      - name: View Asset Movement History
        description: User views the full movement and transfer history of an asset including dates, locations, and custodians.
        preconditions: Asset exists with recorded movements.
        status: draft
        sequence: 5
      - name: View Assets by Location
        description: User browses assets filtered by specific building, floor, room, or department location.
        preconditions: Assets are registered with location data.
        status: draft
        sequence: 6
  - name: Maintenance Management
    description: |
      End-to-end maintenance lifecycle management including preventive maintenance scheduling, corrective maintenance (fault reporting and fault monitoring), technician assignment, work order management, spare parts tracking, and maintenance history. Supports both internal technician assignment and external vendor service requests. Automated reminders for scheduled maintenance and warranty expiry. Includes letter of indemnity workflow to determine whether repair costs are borne by the user or the department based on fault assessment. Maintains full maintenance cost history linked to asset purchase requests and purchase orders, enabling financial decisions on whether to continue maintaining or replace/upgrade the asset (with mock screen for cost analysis dashboard).
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend + Mobile App
    inScope: |
      Fault/issue reporting with photos and videos (mobile and desktop), fault monitoring workflow (Letter of Indemnity → Fault Assessment → Determination of repair cost responsibility: user-borne or department-borne), preventive maintenance scheduling with automated reminders, corrective maintenance work orders, technician assignment (internal and external), work order status tracking (Reported, Assigned, In Progress, Completed, Verified), spare parts usage logging, maintenance cost tracking, maintenance cost history per asset linked to original purchase request and purchase order (for financial decision-making on asset replacement vs continued maintenance), maintenance cost analysis mock screen/dashboard for management review, SLA monitoring, warranty-based service routing (in-warranty to supplier, out-of-warranty to internal/external), maintenance history per asset, supplier fault report submission, maintenance KPI dashboard, letter of indemnity generation and tracking for fault accountability.
    outOfScope: |
      Spare parts inventory management (separate module), vendor procurement for parts.
    sequence: 2
    uatFlows:
      - name: Report Asset Fault via Mobile
        description: User scans asset QR code and submits a fault report with description, severity level, photos, and videos.
        preconditions: User has mobile app installed. Asset is registered with QR label.
        status: draft
        sequence: 0
      - name: Report Asset Fault via Desktop
        description: User searches for an asset and submits a fault report through the desktop interface.
        preconditions: User has Asset Management access.
        status: draft
        sequence: 1
      - name: Assign Technician to Work Order
        description: Maintenance coordinator reviews the fault report and assigns an internal technician or routes to external vendor.
        preconditions: A fault report has been submitted. Coordinator has maintenance management access.
        status: draft
        sequence: 2
      - name: Submit Fault Report to Supplier
        description: For in-warranty assets, maintenance coordinator generates and submits a formal fault report to the supplier.
        preconditions: Asset is within warranty period. Fault report exists.
        status: draft
        sequence: 3
      - name: Technician Updates Work Order Progress
        description: Assigned technician updates work order status, adds notes, logs time spent, and records spare parts used.
        preconditions: Work order is assigned to the technician.
        status: draft
        sequence: 4
      - name: Complete and Verify Maintenance Work
        description: Technician marks work as complete. Requester verifies the fix and confirms asset is operational.
        preconditions: Work order is marked as completed by technician.
        status: draft
        sequence: 5
      - name: Create Preventive Maintenance Schedule
        description: Admin creates a recurring preventive maintenance schedule for an asset or group of assets with frequency, checklist, and assigned team.
        preconditions: Assets are registered. User has maintenance admin access.
        status: draft
        sequence: 6
      - name: Execute Preventive Maintenance Task
        description: Technician receives a scheduled maintenance task, performs the checklist items, and records completion.
        preconditions: A preventive maintenance task is due. Technician is assigned.
        status: draft
        sequence: 7
      - name: View Maintenance History
        description: User views complete maintenance history for an asset including all work orders, costs, and downtime.
        preconditions: Asset exists with maintenance records.
        status: draft
        sequence: 8
      - name: Maintenance SLA Monitoring
        description: Admin views SLA compliance dashboard showing response times, resolution times, and overdue work orders.
        preconditions: Work orders exist in the system.
        status: draft
        sequence: 9
      - name: Issue Letter of Indemnity for Fault
        description: When a fault is reported, system initiates fault monitoring workflow. If the fault is determined to be caused by user negligence, a letter of indemnity is generated and the repair cost is assigned to the user. If the fault is due to normal wear or defect, repair cost is borne by the department.
        preconditions: A fault report has been submitted and assessed. Fault monitoring workflow is active.
        status: draft
        sequence: 10
      - name: View Maintenance Cost History for Asset
        description: User views the full maintenance cost history for an asset, cross-referenced with the original purchase request and purchase order amounts. The system displays a cost analysis summary to support financial decisions on whether to continue maintaining the asset or replace/upgrade it.
        preconditions: Asset has maintenance records and is linked to a purchase request/purchase order.
        status: draft
        sequence: 11
      - name: Maintenance Cost Analysis Dashboard (Mock Screen)
        description: Management views a mock screen dashboard showing cumulative maintenance costs per asset against original purchase cost, enabling data-driven decisions on asset replacement versus continued maintenance investment.
        preconditions: Assets exist with maintenance cost records and purchase history.
        status: draft
        sequence: 12
  - name: Asset Audit Management
    description: |
      Comprehensive asset audit workflow supporting audit planning, scheduling, execution via mobile scanning, discrepancy identification, reconciliation, and audit reporting. Enables physical verification of assets against the system register through QR/barcode scanning with condition assessment and location confirmation.
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend + Mobile App
    inScope: |
      Audit plan creation (full audit or by department/location/category), audit scheduling and assignment, mobile-based audit execution with QR/barcode scanning, asset condition assessment during audit, location verification, photo capture during audit, discrepancy detection (missing, unregistered, relocated, condition change), discrepancy resolution workflow, audit progress tracking (real-time), audit completion and sign-off, audit report generation (PDF), audit history and trail, unregistered asset flagging and on-the-spot registration.
    outOfScope: |
      Automated RFID mass-scanning audits, third-party auditor portal access.
    sequence: 3
    uatFlows:
      - name: Create Audit Plan
        description: Admin creates an audit plan specifying scope (full, department, location, or category), scheduled date, assigned auditors, and audit checklist criteria.
        preconditions: User has audit management permissions. Assets exist in the system.
        status: draft
        sequence: 0
      - name: Assign Auditors to Audit Plan
        description: Admin assigns one or more auditors to an audit plan with specific location or department assignments.
        preconditions: Audit plan is created in Draft status.
        status: draft
        sequence: 1
      - name: Start Audit Execution on Mobile
        description: Auditor opens assigned audit on mobile app, begins scanning assets via QR code/barcode at the designated location.
        preconditions: Audit plan is in Scheduled status. Auditor has mobile app with audit module access.
        status: draft
        sequence: 2
      - name: Scan and Verify Asset During Audit
        description: Auditor scans an asset's QR/barcode, confirms location, assesses condition (Good, Fair, Poor, Damaged), and captures photos if needed.
        preconditions: Audit is in progress. Auditor is at the asset location.
        status: draft
        sequence: 3
      - name: Flag Missing Asset
        description: Auditor marks an asset as missing when it cannot be found at its registered location during the audit.
        preconditions: Audit is in progress. Asset appears in the expected audit list but is not physically present.
        status: draft
        sequence: 4
      - name: Register Untagged Asset Found During Audit
        description: Auditor discovers an unregistered/untagged asset during audit and initiates on-the-spot registration via mobile.
        preconditions: Audit is in progress. A physical asset is found without a system record.
        status: draft
        sequence: 5
      - name: View Audit Progress in Real-Time
        description: Admin monitors audit progress showing scanned vs. expected assets, completion percentage, and flagged discrepancies.
        preconditions: An audit is in progress.
        status: draft
        sequence: 6
      - name: Review and Resolve Audit Discrepancies
        description: Admin reviews flagged discrepancies (missing, relocated, condition changes) and takes corrective action (update location, mark as lost, initiate investigation).
        preconditions: Audit is completed with discrepancies flagged.
        status: draft
        sequence: 7
      - name: Complete Audit and Generate Report
        description: Admin finalizes the audit, resolves all discrepancies, and generates a comprehensive audit report (PDF) with summary statistics.
        preconditions: All audit locations have been scanned. Discrepancies are reviewed.
        status: draft
        sequence: 8
      - name: View Audit History
        description: Admin views past audits with results, discrepancy rates, and trend analysis over time.
        preconditions: Previous audits have been completed.
        status: draft
        sequence: 9
  - name: Asset Depreciation & Financial Tracking
    description: |
      Automated depreciation calculation and financial tracking for all registered assets. Supports multiple depreciation methods, generates financial reports, and provides current book value visibility for informed asset investment decisions.
    module: Asset Management
    priority: medium
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Depreciation method configuration (straight-line, declining balance, sum-of-years-digits), automatic monthly/yearly depreciation calculation, current book value display per asset, depreciation schedule generation, asset cost center assignment, financial summary reports (total asset value, total depreciation, net book value by category/department), asset revaluation, insurance value tracking, salvage value configuration, useful life configuration per asset category.
    outOfScope: |
      Tax depreciation schedules, integration with external accounting systems, accounts payable/receivable.
    sequence: 4
    uatFlows:
      - name: Configure Depreciation Method for Asset Category
        description: Admin sets the default depreciation method, useful life, and salvage value percentage for an asset category.
        preconditions: User has finance module access. Asset categories exist.
        status: draft
        sequence: 0
      - name: View Asset Depreciation Schedule
        description: User views the full depreciation schedule for an asset showing yearly/monthly depreciation amounts and remaining book value.
        preconditions: Asset is registered with purchase cost and depreciation method configured.
        status: draft
        sequence: 1
      - name: Run Monthly Depreciation Calculation
        description: System runs automated monthly depreciation calculation for all active assets and updates book values.
        preconditions: Assets are registered with depreciation configurations.
        status: draft
        sequence: 2
      - name: Generate Financial Summary Report
        description: Admin generates a financial report showing total asset value, accumulated depreciation, and net book value by category, department, or location.
        preconditions: Assets exist with financial data.
        status: draft
        sequence: 3
      - name: Record Asset Revaluation
        description: Finance user records a revaluation for an asset, updating its book value with justification.
        preconditions: Asset exists. User has finance permissions.
        status: draft
        sequence: 4
      - name: Update Insurance Value
        description: User updates the insurance value and policy details for an asset.
        preconditions: Asset is registered.
        status: draft
        sequence: 5
  - name: Asset Disposal Management
    description: |
      End-to-end asset disposal workflow from disposal request through multi-level approval, disposal execution, environmental compliance documentation, financial write-off, and certificate generation. Supports multiple disposal methods including sale, donation, recycling, and scrapping. Disposal execution must follow and adhere to the approved Disposal Plan — any deviation from the plan requires re-approval.
    module: Asset Management
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Disposal request submission with reason and supporting documents, disposal method selection (Sale, Donation, Recycling, Scrapping, Trade-In), multi-level approval workflow (HOD, Finance, Senior Management), disposal valuation (current book value vs. disposal value), buyer/recipient information capture, environmental compliance checklist, disposal certificate generation (PDF), financial write-off processing, asset status update to Disposed, disposal history and audit trail, batch disposal for multiple assets, disposal analytics and reporting, disposal plan creation and adherence tracking (disposal must follow what has been planned — system enforces plan compliance and flags deviations), disposal plan vs. actual execution comparison report.
    outOfScope: |
      E-waste vendor management, auction platform integration, environmental regulatory submission.
    sequence: 5
    uatFlows:
      - name: Submit Disposal Request
        description: User selects one or more assets and submits a disposal request specifying the disposal method, reason, and supporting documentation.
        preconditions: User has disposal request permissions. Assets are in Active or Condemned status.
        status: draft
        sequence: 0
      - name: HOD Reviews Disposal Request
        description: Department HOD reviews the disposal request and approves or rejects it with comments.
        preconditions: Disposal request is in Pending HOD Approval status.
        status: draft
        sequence: 1
      - name: Finance Reviews Disposal Request
        description: Finance team reviews the disposal for financial impact, confirms book value, and approves or requests changes.
        preconditions: Disposal request has HOD approval and is in Pending Finance Review status.
        status: draft
        sequence: 2
      - name: Senior Management Approves Disposal
        description: For high-value assets, senior management provides final disposal approval.
        preconditions: Disposal has finance approval and asset value exceeds the threshold for senior management review.
        status: draft
        sequence: 3
      - name: Execute Asset Disposal
        description: Asset officer executes the disposal by recording disposal date, method, disposal value (if sold), buyer/recipient details, and completing the environmental compliance checklist.
        preconditions: Disposal request is fully approved.
        status: draft
        sequence: 4
      - name: Generate Disposal Certificate
        description: System generates a PDF disposal certificate documenting the asset details, disposal method, approvals, and compliance information.
        preconditions: Disposal has been executed.
        status: draft
        sequence: 5
      - name: Process Financial Write-Off
        description: Finance processes the financial write-off for disposed assets, removing them from the active asset register and recording the disposal in financial records.
        preconditions: Disposal is executed and certificate is generated.
        status: draft
        sequence: 6
      - name: View Disposal History
        description: User views the complete history of disposed assets with filters for date range, department, disposal method, and value.
        preconditions: Disposals have been completed.
        status: draft
        sequence: 7
      - name: Batch Disposal Request
        description: User selects multiple assets for batch disposal with a common reason and method.
        preconditions: Multiple assets are eligible for disposal.
        status: draft
        sequence: 8
      - name: Create and Approve Disposal Plan
        description: Admin creates a disposal plan specifying which assets are to be disposed, the planned method, timeline, and expected recovery value. The plan goes through approval workflow before any disposal can be executed.
        preconditions: Assets are identified for disposal. User has disposal planning permissions.
        status: draft
        sequence: 9
      - name: Execute Disposal per Approved Plan
        description: Asset officer executes disposal strictly following the approved disposal plan. The system validates that each disposal action matches the plan (method, timeline, recipient). Any deviation from the plan is flagged and requires re-approval.
        preconditions: Disposal plan is fully approved. Assets are ready for disposal.
        status: draft
        sequence: 10
      - name: Disposal Plan vs Actual Execution Report
        description: Admin generates a comparison report showing planned versus actual disposal execution, highlighting any deviations, delays, or value differences.
        preconditions: Disposal plan exists with completed executions.
        status: draft
        sequence: 11
  - name: Document & Knowledge Management
    description: |
      Digital document management for all asset-related documentation including user manuals, SOPs, warranty cards, service contracts, compliance certificates, and maintenance guides. Supports version control and easy retrieval via asset association.
    module: Asset Management
    priority: medium
    status: draft
    ecosystem: Admin Desktop App + Backend + Mobile App
    inScope: |
      Document upload and association with assets, document categorization (Manual, Warranty, Contract, Certificate, SOP, Photo, Video), version control for updated documents, document search and retrieval, mobile access to asset documents via QR scan, bulk document upload, document expiry tracking (warranties, contracts, certificates), expiry notification alerts.
    outOfScope: |
      Document creation/editing tools, OCR/text extraction from scanned documents.
    sequence: 6
    uatFlows:
      - name: Upload Document to Asset
        description: User uploads a document (manual, warranty, contract) and associates it with one or more assets.
        preconditions: Asset is registered. User has document management permissions.
        status: draft
        sequence: 0
      - name: View Asset Documents via Mobile Scan
        description: User scans asset QR code on mobile and accesses all associated documents.
        preconditions: Asset has documents attached. Mobile app is installed.
        status: draft
        sequence: 1
      - name: Track Document Expiry
        description: System sends notifications for upcoming warranty, contract, or certificate expirations.
        preconditions: Documents with expiry dates are attached to assets.
        status: draft
        sequence: 2
      - name: Search Documents Across Assets
        description: User searches for documents across the entire asset register by name, type, or associated asset.
        preconditions: Documents exist in the system.
        status: draft
        sequence: 3
  - name: Reporting & Analytics Dashboard
    description: |
      Comprehensive reporting and analytics capabilities providing real-time visibility into asset portfolio health, utilization, costs, and compliance. Includes pre-built reports and customizable dashboards for data-driven asset management decisions.
    module: Asset Management
    priority: medium
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Asset overview dashboard (total assets, by status, by category, by department), asset value summary (purchase cost, current book value, depreciation), maintenance KPIs (MTTR, MTBF, cost per asset, SLA compliance), audit compliance dashboard (last audit date, discrepancy rates), asset utilization reports, cost analysis by category/department/location, asset aging report, warranty expiry report, disposal summary report, custom report builder with filters and export (PDF, Excel), scheduled report generation and email distribution.
    outOfScope: |
      Predictive analytics/AI-based forecasting, integration with external BI tools (Power BI, Tableau).
    sequence: 7
    uatFlows:
      - name: View Asset Overview Dashboard
        description: User views the main dashboard showing asset counts by status, category, and department with key metrics.
        preconditions: Assets exist in the system. User has reporting access.
        status: draft
        sequence: 0
      - name: Generate Asset Register Report
        description: User generates a full or filtered asset register report and exports it as PDF or Excel.
        preconditions: Assets exist in the system.
        status: draft
        sequence: 1
      - name: View Maintenance KPI Dashboard
        description: Admin views maintenance performance metrics including response times, resolution rates, and costs.
        preconditions: Maintenance work orders exist.
        status: draft
        sequence: 2
      - name: Generate Depreciation Report
        description: Finance user generates a depreciation report showing book values and depreciation for a given period.
        preconditions: Assets with depreciation data exist.
        status: draft
        sequence: 3
      - name: View Asset Aging Report
        description: User views a report showing assets by age, approaching or exceeding useful life.
        preconditions: Assets with purchase dates exist.
        status: draft
        sequence: 4
      - name: Schedule Automated Report
        description: Admin configures a report to be automatically generated and emailed on a recurring schedule.
        preconditions: User has reporting admin access.
        status: draft
        sequence: 5
  - name: Asset Label & Identification Management
    description: |
