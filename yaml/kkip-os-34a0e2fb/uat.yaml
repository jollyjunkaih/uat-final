              driver role). Enter a reason in the "Reason for Driver Change" textarea. Click "Update". Verify the driver updates.
            sequence: 1
            imageFileName: null
      - name: Admin Cancels Vehicle Booking
        description: Admin cancels an existing vehicle booking.
        preconditions: Admin is on the Bookings page with an active vehicle booking.
        status: draft
        sequence: 12
        steps:
          - name: Click Cancel
            description:
              Click "Cancel" (red/destructive button) on a booking card. Verify the "Cancel Booking" dialog (red title)
