            imageFileName: f6-user-booking-browse-availability
      - name: Respond to User Booking Request
        description: Target user accepts or rejects a booking request from their calendar.
        preconditions: A user booking request has been sent to the current user.
        status: draft
        sequence: 3
        steps:
          - name: View pending request on calendar
            description:
              Navigate to My Calendar and select the booking date. Verify the user booking appears as an amber-accented
              event card with "Pending Response" orange badge, "Requested by [Name]" in a blue box, and Accept/Reject buttons.
            sequence: 0
            imageFileName: f6-flow0-my-calendar
          - name: Accept the request
            description: Click "Accept" on the booking event card. Verify the status changes to "You Accepted" with a green badge.
            sequence: 1
