  - name: Vehicle Management
    description:
      Vehicle fleet management including viewing vehicle inventory, checking vehicle details, maintenance status,
      insurance/road tax tracking, service requests, and managing vehicle usage type.
    module: Office Services
    priority: medium
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope:
      Vehicle inventory browsing, vehicle search and sorting, vehicle detail viewing (overview and maintenance tabs),
      changing vehicle usage type (bookable vs exclusive), vehicle status indicators, insurance/road tax expiry tracking,
      document uploads for insurance and road tax, service requests, repair mode toggling.
    outOfScope: Vehicle registration (asset management), vehicle depreciation, vehicle disposal, vehicle purchase workflow.
    sequence: 3
    uatFlows:
      - name: Browse Vehicle Inventory
        description: Admin views the vehicle fleet with search and sorting capabilities.
        preconditions: User has Office Services access.
        status: draft
        sequence: 0
        steps:
          - name: Navigate to Vehicle Management
            description:
              Click on "Office Services" dropdown in the top navigation bar, then select "Vehicle Management".. Verify the page shows vehicle cards in a 3-column
              responsive grid layout.
            sequence: 0
            imageFileName: f4-flow0-vehicle-management
          - name: Verify vehicle card information
            description:
              Verify each vehicle card shows vehicle image, model name, license plate, manufacturing year,
              current mileage (formatted with commas and "km"), insurance expiration date (color-coded), and road tax
              expiration date (color-coded).
            sequence: 1
            imageFileName: f4-flow0-vehicle-management
          - name: Search by model
            description: Enter a vehicle model name in the search field. Verify cards filter to matching vehicles.
            sequence: 2
            imageFileName: f4-flow0-vehicle-management
          - name: Search by license plate
            description: Clear search and enter a license plate number. Verify the matching vehicle card appears.
            sequence: 3
            imageFileName: f4-flow0-vehicle-management
          - name: Sort by Purchase Year Newest
            description: Select "Purchase Year (Newest)" from the sort dropdown. Verify vehicles are sorted with newest first.
            sequence: 4
            imageFileName: f4-flow0-vehicle-management
          - name: Sort by Purchase Year Oldest
            description: Select "Purchase Year (Oldest)" sort option. Verify vehicles are sorted with oldest first.
            sequence: 5
            imageFileName: f4-flow0-vehicle-management
          - name: Sort by Insurance Date
            description:
              Select "Insurance (Latest)" or "Insurance (Earliest)" sort options. Verify vehicles are sorted by
              insurance expiry date accordingly.
            sequence: 6
            imageFileName: f4-flow0-vehicle-management
          - name: Sort by Road Tax Date
            description:
              Select "Road Tax (Latest)" or "Road Tax (Earliest)" sort options. Verify vehicles are sorted by road
              tax validity accordingly.
            sequence: 7
            imageFileName: f4-flow0-vehicle-management
      - name: View Vehicle Details
        description: Admin views detailed information about a specific vehicle.
        preconditions: Admin is on the Vehicle Management page.
        status: draft
        sequence: 1
        steps:
          - name: Click on a vehicle card
            description:
              Click on a vehicle card. Verify the VehicleDetailsDialog opens with title "{Model} ({Number Plate})" and
              two tabs - Overview and Maintenance.
            sequence: 0
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Review Overview tab - Basic Information
            description:
              Verify the Overview tab shows "Basic Information" section with Model (editable in edit mode),
              Manufacture Year (editable number), and Purchase Year (editable number).
            sequence: 1
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Review Overview tab - Status Information
            description:
              Verify "Status Information" section shows Current Mileage (read-only, in km), Last Serviced
              (read-only, date or "Not serviced yet"), Insurance Valid Until (editable date picker), and Road Tax Valid Until
              (editable date picker).
            sequence: 2
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Check insurance expiry color coding
            description:
              Verify the insurance expiration date is color-coded - red text if expired, amber text if expiring within
              30 days, normal otherwise.
            sequence: 3
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Check road tax validity color coding
            description: Verify the road tax validity date is color-coded similarly to insurance.
            sequence: 4
            imageFileName: f4-flow1-vehicle-details-overview
          - name: View and upload insurance document
            description:
              Verify the Insurance Document section shows expiration date and "View Document" button (if uploaded)
              or "Upload" button to add a new document.
            sequence: 5
            imageFileName: f4-flow1-vehicle-details-overview
          - name: View and upload road tax document
            description: Verify the Road Tax Document section shows similarly with expiry and upload/view options.
            sequence: 6
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Edit vehicle details
            description:
              Click "Edit Details" button. Verify fields become editable. Make changes and click "Save Changes".
              Verify updates are saved.
            sequence: 7
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Switch to Maintenance tab
            description:
              Click "Maintenance" tab. Verify the maintenance section displays with "Request Service" (wrench icon)
              and "Put in Repair Mode"/"Remove from Repair Mode" (car icon) action buttons.
            sequence: 8
            imageFileName: f4-flow1-vehicle-details-overview
      - name: Request Vehicle Service
        description: Admin submits a service request for a vehicle.
        preconditions: Admin has a vehicle selected in the details dialog, Maintenance tab.
        status: draft
        sequence: 2
        steps:
          - name: Click Request Service
            description:
              Click "Request Service" button (wrench icon) on the Maintenance tab. Verify the "Request Service for
              {Vehicle Model}" dialog opens.
            sequence: 0
            imageFileName: f4-flow1-vehicle-maintenance-tab
          - name: Select service type
            description:
              Select a service type from the dropdown - options are "Regular Service", "Maintenance", or
              "Emergency Repair". Verify the field is required.
            sequence: 1
            imageFileName: f4-flow1-vehicle-maintenance-tab
          - name: Enter description
            description:
              Enter a description in the textarea (placeholder "Describe the service needed or any issues with the
              vehicle"). Verify the field is required.
            sequence: 2
            imageFileName: f4-flow1-vehicle-maintenance-tab
          - name: Submit service request
            description: Click "Submit Request" (shows "Submitting..." while processing). Verify a success toast appears.
            sequence: 3
            imageFileName: f4-flow1-vehicle-maintenance-tab
      - name: Toggle Vehicle Repair Mode
        description: Admin puts a vehicle in or removes it from repair mode.
        preconditions: Admin has a vehicle selected in the details dialog, Maintenance tab.
        status: draft
        sequence: 3
        steps:
          - name: Put vehicle in repair mode
            description:
              Click "Put in Repair Mode" button (car icon, orange styling). Verify the vehicle's underMaintenance status
              changes and the vehicle card shows an "Under Maintenance" badge in orange.
            sequence: 0
            imageFileName: f4-flow1-vehicle-maintenance-tab
          - name: Verify vehicle not bookable
            description:
              Navigate to vehicle booking. Verify the vehicle in repair mode shows the "Under Maintenance" badge and
              cannot be booked.
            sequence: 1
            imageFileName: f4-flow1-vehicle-maintenance-tab
          - name: Remove from repair mode
            description:
              Return to vehicle details. Click "Remove from Repair Mode". Verify the maintenance badge is removed and
              the vehicle becomes available for booking again.
            sequence: 2
            imageFileName: f4-flow1-vehicle-maintenance-tab
      - name: Change Vehicle Usage Type
        description: Admin changes a vehicle between bookable and exclusively used.
        preconditions: Admin has a vehicle selected in the details dialog.
        status: draft
        sequence: 4
        steps:
          - name: Click Change Usage
            description:
              Click the "Change Usage" button in the vehicle details dialog. Verify the "Change Vehicle Usage" dialog
              opens with description "Set whether this vehicle is available for all KKIP staff to book or exclusively used by
              a specific entity."
            sequence: 0
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Set to Exclusively Used
            description:
              Select "Exclusively Used By Specific Entity" radio option. Verify a text input appears (placeholder
              "Enter entity name (e.g., CEO Office, IT Department)"). Enter an entity name.
            sequence: 1
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Confirm change
            description:
              Click "Save" (disabled if exclusive selected but no entity name). Verify the vehicle card shows
              "Exclusively used by [Entity]" badge in yellow.
            sequence: 2
            imageFileName: f4-flow1-vehicle-details-overview
          - name: Revert to Available for Booking
            description:
              Repeat the flow and select "Available for KKIP Staff Booking" radio option. Click "Save". Verify the
              badge changes to "Available for Booking" in green.
            sequence: 3
            imageFileName: f4-flow1-vehicle-details-overview
      - name: Verify Vehicle Status Indicators
        description: Verify different vehicle status badges display correctly on the fleet page.
        preconditions: Vehicles with different statuses exist in the system.
        status: draft
        sequence: 5
        steps:
          - name: Under Maintenance badge
            description:
              Locate a vehicle marked as under maintenance. Verify it shows an "Under Maintenance" badge in orange
              with an orange border on the card.
            sequence: 0
            imageFileName: f4-flow0-vehicle-management
          - name: Exclusively used badge
            description: Locate a vehicle set as exclusively used. Verify it shows "Exclusively used by [Entity]" badge in yellow.
            sequence: 1
            imageFileName: f4-flow0-vehicle-management
          - name: Available for booking badge
            description:
              Locate a vehicle available for booking (no exclusive user assigned). Verify it shows "Available for
              Booking" badge in green.
            sequence: 2
            imageFileName: f4-flow0-vehicle-management
          - name: Insurance and road tax expiry indicators
            description:
              Verify expired insurance/road tax dates show in red, dates expiring within 30 days show in amber,
              and valid dates show in normal color.
            sequence: 3
            imageFileName: f4-flow0-vehicle-management
  - name: Fuel Log Management
    description: Fuel and mileage data tracking for vehicles captured during the key release and return process.
    module: Office Services
    priority: medium
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope:
      Fuel level recording during key release, fuel level and mileage recording during key return, dashboard photo
      capture, Shell card tracking. Fuel data is captured as part of the vehicle booking key management flow (no
      separate fuel log UI page exists in the admin desktop app).
    outOfScope: Standalone fuel log creation page, fuel cost reporting, fuel budget management, fuel log editing.
    sequence: 4
    uatFlows:
      - name: Record Fuel Data During Key Release
        description: Admin records initial fuel/mileage data when releasing vehicle keys.
        preconditions: An approved vehicle booking exists. Admin is on the Office Services Bookings page.
        status: draft
        sequence: 0
        steps:
          - name: Open Release Keys dialog
            description: Click "Release Keys" on a vehicle booking card. Verify the dialog opens with booking details.
            sequence: 0
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Record mileage before trip
            description: Enter the current odometer reading in the "Mileage Before (km)" field. This is an optional field.
            sequence: 1
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Record fuel level before trip
            description:
              Select the current fuel/battery level from the "Fuel / Battery Level Before" dropdown (0%, 25%, 50%,
              75%, 100%). This is an optional field.
            sequence: 2
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Track Shell card requirement
            description: Check "Require Shell Card" if the driver needs a fuel card for the trip.
            sequence: 3
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Confirm and save
            description: Click "Release Keys". Verify fuel data is saved with the booking record.
            sequence: 4
            imageFileName: f3-flow9-admin-vehicle-bookings
      - name: Record Fuel Data During Key Return
        description: Admin records final fuel/mileage data and dashboard photo when returning vehicle keys.
        preconditions: Vehicle keys have been released for a booking. Admin is on the Bookings page.
        status: draft
        sequence: 1
        steps:
          - name: Open Return Keys dialog
            description:
              Click "Return Key" on the booking card. Verify the dialog opens with a blue info banner about uploading
              a dashboard photo.
            sequence: 0
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Upload dashboard photo
            description:
              Upload a clear photo of the vehicle dashboard showing odometer reading and fuel level using the
              "Dashboard Picture" file input. Verify this is a required field (minimum 1 file).
            sequence: 1
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Record mileage after trip
            description: Enter the final odometer reading in the "Mileage After (km)" field. This is an optional field.
            sequence: 2
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Record fuel level after trip
            description:
              Select the final fuel/battery level from the "Fuel / Battery Level After" dropdown (0%, 25%, 50%, 75%,
              100%). Verify this is a required field.
            sequence: 3
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Confirm and save
