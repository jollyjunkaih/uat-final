  - name: Vehicle Booking
    description: Complete vehicle booking lifecycle including vehicle browsing, availability checking, booking creation with driver selection, approval workflow, key management, fuel tracking, booking cancellation, and post-trip evaluation.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Vehicle availability browsing, vehicle booking creation (single-day and multi-day), driver type selection (self-drive, KKIP employee, OS driver), approval workflow, auto-approval for top management, key release, key return with dashboard photo, fuel/mileage tracking, booking cancellation, post-trip evaluation with fine/accident reporting, Shell card requests, terms and conditions.
    outOfScope: Vehicle registration, vehicle disposal, vehicle depreciation, vehicle purchase workflow.
    sequence: 2
