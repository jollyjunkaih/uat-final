features:
  - name: Office Services - Inventory Request (E-Office Supplies)
    description:
      End-to-end office supplies request lifecycle including browsing items, cart management, submission,
      approval, officer assignment, order preparation, goods receiving, and feedback collection.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope:
      Browsing office supply items, adding items to cart, submitting inventory requests, HOD approval workflow,
      officer assignment, order preparation, GRN completion, feedback collection, request modification, rejection,
      reassignment, department request for non-stocked items.
    outOfScope:
      Stock replenishment, vendor purchase orders, warehouse stock management (inventory levels admin),
      IBS-Concrete requests.
    sequence: 0
    uatFlows:
      - name: Browse Office Supplies Catalog
        description:
          User navigates to the e-office supplies page, browses available items, searches for specific items, and
          views item details.
        preconditions: User is logged in and has access to Office Services module.
        status: draft
        sequence: 0
        steps:
          - name: Navigate to E-Office Supplies page
            description:
              Click on "User Modules" dropdown in the top navigation bar, then select "New Office Supplies Order". Alternatively, navigate directly to /user/office-supplies. Verify the page loads with heading
              "Office Supplies Request" and a table of office supply items.
            sequence: 0
            imageFileName: f1-flow0-step0-navigate-eoffice-supplies
          - name: Verify table columns
            description:
              Confirm the table displays columns - Item Code, Name, Image, Availability, and Actions. Stocked items
              show available quantity and UOM. Non-stocked items show italic "Not currently stocked" text.
            sequence: 1
            imageFileName: f1-flow0-step0-navigate-eoffice-supplies
          - name: Search for an item by name
            description:
              Type an item name into the search field (placeholder "Search by item name or code..."). Verify the
              table filters to show matching results.
            sequence: 2
            imageFileName: f1-flow0-step2-search-item-by-name
          - name: Search for an item by code
            description: Clear the search field and type an item code. Verify the table filters accordingly.
            sequence: 3
            imageFileName: f1-flow0-step3-search-item-by-code
          - name: Verify pagination
            description:
              If more than one page of items exists, click "Next" to navigate to the next page. Verify page counter
              "Page X of Y" updates and "Showing X to Y of Z items" text updates.
            sequence: 4
            imageFileName: f1-flow0-step4-verify-pagination
          - name: Verify action buttons for stocked vs non-stocked items
            description:
              Verify stocked items show an "Add" button (plus icon) for adding to cart. Verify non-stocked items
              show a "Request" button that opens the Create Department Request dialog.
            sequence: 5
            imageFileName: f1-flow0-step0-navigate-eoffice-supplies
      - name: Add Items to Cart
        description: User adds stocked items to the cart with specified quantities.
        preconditions: User is on the E-Office Supplies page with stocked items available.
        status: draft
        sequence: 1
        steps:
          - name: Click Add button on a stocked item
            description:
              Click the "Add" button on a stocked item row. Verify the "Add Item to Cart" dialog opens showing
              Item Code, Item Name, an "Available" badge with quantity and UOM, and a quantity input field labeled
              "Quantity to Add (UOM)".
            sequence: 0
            imageFileName: f1-flow1-add-items-to-cart
          - name: Enter valid quantity
            description: Enter a quantity within the available range (e.g., 5 if 10 available). Verify no validation error is shown.
            sequence: 1
            imageFileName: f1-flow1-add-items-to-cart
          - name: Submit add to cart
            description:
              Click "Add to Cart" button. Verify the dialog closes and the cart counter badge in the header increments.
              Verify a success toast "Item added to cart" appears.
            sequence: 2
            imageFileName: f1-flow1-add-items-to-cart
          - name: Add another item to cart
            description:
              Click "Add" on a different stocked item, enter quantity, and add to cart. Verify the cart counter updates
              to show 2 items.
            sequence: 3
            imageFileName: f1-flow1-add-items-to-cart
          - name: Attempt to exceed available quantity
            description:
              Click "Add" on an item and enter a quantity exceeding available stock. Verify an error toast
              "Cannot add X more. Only Y available." appears and submission is prevented.
            sequence: 4
            imageFileName: f1-flow1-add-items-to-cart
          - name: Add same item again
            description:
              Click "Add" on an item already in cart. Verify the dialog shows an "In Cart" badge with existing cart
              quantity. Confirm the total (existing + new) cannot exceed available stock.
            sequence: 5
            imageFileName: f1-flow1-add-items-to-cart
      - name: Request Non-Stocked Item via Department Request
        description: User submits a department request for a non-stocked item.
        preconditions: User is on the E-Office Supplies page with non-stocked items visible.
        status: draft
        sequence: 2
        steps:
          - name: Click Request button on non-stocked item
            description:
              Click the "Request" button on a non-stocked item row. Verify the "Create Department Request" dialog
              opens with fields pre-filled.
            sequence: 0
            imageFileName: f1-flow2-request-nonstocked-item
          - name: Verify pre-filled fields
            description:
              Verify "Target Department" is pre-filled with "Office Service" and "Title" is pre-filled with
              "Office Supplies Inventory Request".
            sequence: 1
            imageFileName: f1-flow2-request-nonstocked-item
          - name: Fill in description
            description: Enter a description of the requested item. Verify the field is required.
            sequence: 2
            imageFileName: f1-flow2-request-nonstocked-item
          - name: Select urgency level
            description:
              Select an urgency level from the dropdown options - Normal (default), Urgent, Highly Urgent,
              or Extremely Urgent.
            sequence: 3
            imageFileName: f1-flow2-request-nonstocked-item
          - name: Link a referenced ticket (optional)
            description: Optionally search for and select a referenced ticket from the searchable dropdown.
            sequence: 4
            imageFileName: f1-flow2-request-nonstocked-item
          - name: Attach files (optional)
            description: Optionally upload supporting files using the file input.
            sequence: 5
            imageFileName: f1-flow2-request-nonstocked-item
          - name: Submit department request
            description: Submit the request. Verify a success toast appears and the request is created.
            sequence: 6
            imageFileName: f1-flow2-request-nonstocked-item
      - name: View and Manage Cart
        description:
          User opens the cart dialog, reviews items, modifies quantities, removes items, and enters a reason for the
          request.
        preconditions: User has items in the cart.
        status: draft
        sequence: 3
        steps:
          - name: Open cart dialog
            description:
              Click the "View Cart" button (shopping cart icon with badge) in the page header. Verify the
              "Office Supplies Cart" dialog opens showing item count and total quantity badge
              (e.g., "3 Items (15 total qty)").
            sequence: 0
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Verify Cart Items card
            description:
              Verify the "Cart Items" card shows a table with columns - Item Code, Item Name, Warehouse,
              Requested (editable quantity input), and Actions (delete button with trash icon).
            sequence: 1
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Modify item quantity in cart
            description:
              Change the quantity of an item using the quantity input field. Verify the value updates and
              quantity cannot exceed available stock or go below 1.
            sequence: 2
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Remove an item from cart
            description: Click the delete (trash) button on an item row. Verify the item is removed and the cart badge updates.
            sequence: 3
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Enter reason for request
            description:
              In the "Reason for Request" card, type a reason in the textarea (placeholder "Enter the reason for
              requesting these items..."). This is a required field.
            sequence: 4
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Link a referenced ticket (optional)
            description:
              In the "Referenced Ticket (Optional)" card, use the searchable dropdown (placeholder "Search by
              reference number...") to find and select a ticket. Verify the ticket appears as "#reference - ticket name".
            sequence: 5
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Verify Preview Order button state
            description:
              Confirm the "Preview Order" button (with Eye icon) is disabled when the cart is empty or reason is
              blank, and enabled when both are filled.
            sequence: 6
            imageFileName: f1-flow3-4-cart-and-preview
      - name: Preview and Submit Inventory Request
        description: User previews the formatted request document and submits it.
        preconditions: Cart has items and reason is filled.
        status: draft
        sequence: 4
        steps:
          - name: Click Preview Order
            description:
              Click "Preview Order" from the cart dialog. Verify the "Office Supplies Request Preview" dialog opens
              showing KKIP letterhead, centered heading "OFFICE SUPPLIES REQUEST", Request No (K1-IR-DRAFT in blue),
              Requester name (blue), Department (yellow), and Date.
            sequence: 0
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Review items table
            description:
              Verify the items table shows columns No, Item Code (yellow, monospace), Item Name (yellow),
              Warehouse (yellow), and Qty (green with count and UOM). Verify all cart items are listed correctly.
            sequence: 1
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Review reason for request
            description: Verify the "Reason for Request" section displays the entered reason in a yellow background box.
            sequence: 2
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Submit request
            description:
              Click "Submit Request". Verify a success toast "Office supplies request submitted successfully" appears.
              Verify the user is navigated to the home page (/user/home).
            sequence: 3
            imageFileName: f1-flow3-4-cart-and-preview
          - name: Verify ticket creation
            description:
              Navigate to Helpdesk Tickets. Verify a new ticket of type INVENTORY-REQUEST is created with the correct
              reference number.
            sequence: 4
            imageFileName: f1-flow3-4-cart-and-preview
      - name: HOD Approves Inventory Request
        description: Department HOD reviews and approves an inventory request.
        preconditions: An inventory request has been submitted and is in PENDING-APPROVAL status. HOD is logged in.
        status: draft
        sequence: 5
        steps:
          - name: Navigate to ticket
            description:
              HOD navigates to the inventory request ticket (via notifications or Helpdesk). Verify the
              InventoryRequestProgressCard shows the request is at the "Approval" step with a 4-step progress bar
              (Submitted, Approved, Executed, Received).
            sequence: 0
            imageFileName: null
          - name: Click Review button
            description:
              Click "Review" on the active approval task. Verify the InventoryRequestReviewDialog opens with PDF preview
              on the left and action buttons on the right.
            sequence: 1
            imageFileName: null
          - name: Review request PDF
            description: Verify the PDF shows request details including items, quantities, requester, department, and reason.
            sequence: 2
            imageFileName: null
          - name: Click Approve
            description: Click the "Approve" button. Verify the request status changes to APPROVED and the progress card updates.
            sequence: 3
            imageFileName: null
          - name: Verify notification to requester
            description: Log in as the requester. Verify a notification is received about the approval.
            sequence: 4
            imageFileName: null
      - name: HOD Requests Changes on Inventory Request
        description: HOD reviews and returns the request for modifications.
        preconditions: An inventory request is in PENDING-APPROVAL status. HOD is logged in.
        status: draft
        sequence: 6
        steps:
          - name: Open review dialog
            description: Open the InventoryRequestReviewDialog for the pending request.
            sequence: 0
            imageFileName: null
          - name: Click Return button
            description: Click the "Return" button. Verify a dialog appears with a textarea for "Changes Requested".
            sequence: 1
            imageFileName: null
          - name: Enter change request reason
            description:
              Type the reason for requested changes and click "Send". Verify the task is updated with CHANGES-REQUESTED
              status.
            sequence: 2
            imageFileName: null
          - name: Verify requester receives revision task
            description:
              Log in as requester. Verify a SUBMISSION task is created for revision. Verify the progress card shows the
              request needs revision.
            sequence: 3
            imageFileName: null
          - name: Requester revises and resubmits
            description:
              Click "Revise Inventory Request". Open InventoryRequestEditDialog. Modify items/quantities/reason. Click
              "Update". Verify a new approval task is created for HOD.
            sequence: 4
            imageFileName: null
      - name: HOD Rejects Inventory Request
        description: HOD rejects the inventory request.
        preconditions: An inventory request is in PENDING-APPROVAL status.
        status: draft
        sequence: 7
        steps:
          - name: Open review dialog
            description: Open the InventoryRequestReviewDialog for the pending request.
            sequence: 0
            imageFileName: null
          - name: Click Reject button
            description: Click the "Reject" button (red). Verify a dialog appears for entering rejection reason.
            sequence: 1
            imageFileName: null
          - name: Enter rejection reason and confirm
            description: Enter a reason for rejection and click "Send". Verify the request is marked as rejected.
            sequence: 2
            imageFileName: null
          - name: Verify requester is notified
            description: Log in as requester. Verify a notification is received about the rejection.
            sequence: 3
            imageFileName: null
      - name: HOD Modifies Items and Approves
        description: HOD adjusts item quantities and directly approves.
        preconditions: An inventory request is in PENDING-APPROVAL status.
        status: draft
        sequence: 8
        steps:
          - name: Open review dialog
            description: Open the InventoryRequestReviewDialog for the pending request.
            sequence: 0
            imageFileName: null
          - name: Click Modify button
            description: Click "Modify". Verify the InventoryRequestEditDialog opens with current items pre-populated.
            sequence: 1
            imageFileName: null
          - name: Modify item quantities
            description: Change quantities using +/- buttons or direct input. Add an update reason in the textarea.
            sequence: 2
            imageFileName: null
          - name: Click Update and Approve
            description: Click "Update and Approve". Verify the request is updated with new quantities and approved simultaneously.
            sequence: 3
            imageFileName: null
      - name: Office Service HOD Assigns Officer
        description: After approval, Office Service HOD assigns an officer to prepare the supplies.
        preconditions: Inventory request is APPROVED. Office Service HOD is logged in.
        status: draft
        sequence: 9
        steps:
          - name: Navigate to request ticket
            description:
              Navigate to the inventory request ticket. Verify the progress shows APPROVED status and a CONSULT task is
              active.
            sequence: 0
            imageFileName: null
          - name: Click Assign Officer
            description:
              Click "Assign Officer" on the active task. Verify a dialog shows with a list of Office Service officers
              (radio group).
            sequence: 1
            imageFileName: null
          - name: Select officer and confirm
            description:
              Select an officer from the list and confirm. Verify the request status changes to ASSIGNED and the
              officer's name appears.
            sequence: 2
            imageFileName: null
      - name: Assigned Officer Prepares Supplies
        description: The assigned officer confirms the office supplies are ready for pickup.
        preconditions: Request is ASSIGNED. Officer is logged in.
        status: draft
        sequence: 10
        steps:
          - name: Navigate to request ticket
            description:
              Navigate to the assigned inventory request ticket. Verify an EXECUTE task named "Prepare Office Supplies"
              is active.
            sequence: 0
            imageFileName: null
          - name: Click Confirm Order Ready
            description: Click "Confirm Order Ready". Verify the PrepareOfficeSuppliesDialog opens with item details.
            sequence: 1
            imageFileName: null
          - name: Confirm supplies are ready
            description:
              Click "Notify Requester". Verify the request status changes to PROCESSED and the requester receives a
              notification that supplies are ready for pickup.
            sequence: 2
            imageFileName: null
      - name: Requester Completes Goods Received Note (GRN)
        description: Requester picks up supplies and confirms received quantities.
        preconditions: Request is PROCESSED (ready for pickup). Requester is logged in.
        status: draft
        sequence: 11
        steps:
          - name: Navigate to request ticket
            description:
              Navigate to the inventory request ticket. Verify a RECEIVING task is active and the progress shows items
              are ready for pickup.
            sequence: 0
            imageFileName: null
          - name: Click Complete GRN
            description:
              Click "Complete GRN". Verify the InventoryGRNDialog opens showing items with Expected Quantity and editable
              Quantity Received fields.
            sequence: 1
            imageFileName: null
          - name: Enter received quantities
            description: Enter the quantity received for each item. Verify quantities cannot exceed expected amounts.
            sequence: 2
            imageFileName: null
          - name: Submit GRN
            description: Submit the GRN form. Verify the request status changes to RECEIVED and the progress card updates.
            sequence: 3
            imageFileName: null
      - name: Requester Provides Feedback
        description: After receiving supplies, the requester provides a rating and comments.
        preconditions: Request is RECEIVED. Requester is logged in.
        status: draft
        sequence: 12
        steps:
          - name: Navigate to request ticket
            description: Navigate to the inventory request ticket. Verify a FEEDBACK task is active.
            sequence: 0
            imageFileName: null
          - name: Click Leave Feedback
            description:
              Click "Leave Feedback". Verify the InventoryRequestFeedbackDialog opens with title
              "Provide Feedback for [IR Reference Number]".
            sequence: 1
            imageFileName: null
          - name: Rate the service
            description:
              Click on stars to set a rating (1-5). Verify the selected rating displays correctly (e.g., "(3 / 5)").
              Verify the rating is required.
            sequence: 2
            imageFileName: null
          - name: Enter feedback comments
            description:
              Type feedback comments in the textarea (placeholder "Please share your feedback about the inventory
              request process..."). Verify the field is required.
            sequence: 3
            imageFileName: null
          - name: Submit feedback
            description: Click "Submit Feedback". Verify the feedback is saved and the task is completed.
            sequence: 4
            imageFileName: null
      - name: View Submitted Feedback
        description: View previously submitted feedback for a completed request.
        preconditions: Feedback has been submitted for a completed inventory request.
        status: draft
        sequence: 13
        steps:
          - name: Navigate to completed request
            description: Navigate to the completed inventory request ticket or the department orders page.
            sequence: 0
            imageFileName: null
          - name: Click Feedback button on table
            description:
              Click the feedback button (MessageSquare icon) on the request row in the orders table. This button only
              appears for RECEIVED requests that have both feedbackRating and feedbackComments. Verify the
              InventoryRequestFeedbackViewDialog opens.
            sequence: 1
            imageFileName: null
          - name: Verify feedback details
            description:
              Verify the dialog title shows "Feedback for [IR Reference Number]" with submission date. Verify it
              displays 5 stars (filled/empty), "X out of 5 stars" text, and the feedback comments in a gray background box.
            sequence: 2
            imageFileName: null
      - name: Reassign Inventory Request to Another Officer
        description: An officer reassigns an inventory request to themselves.
        preconditions:
          Inventory request is assigned to another officer and not yet completed. Current user is an Office Service
          officer.
        status: draft
        sequence: 14
        steps:
          - name: Navigate to orders page
            description: Navigate to Office Services > Orders. Locate the request in the table.
            sequence: 0
            imageFileName: null
          - name: Click Reassign button
            description:
              Click the reassign button (UserPlus icon) in the "Officer Assigned" column. This button only appears
              when the current user is NOT the current officer and the request has no feedback. Verify the
              "Reassign Inventory Request" dialog opens.
            sequence: 1
            imageFileName: null
          - name: Review reassignment details
            description:
              Verify the dialog shows IR Reference, Current Officer (or "Unassigned"), and New Officer (logged-in
              user name).
            sequence: 2
            imageFileName: null
          - name: Type confirmation text
            description:
              Type "CONFIRM REASSIGN" in the confirmation input field. Verify the "Reassign to Me" button becomes
              enabled only when the exact phrase is typed.
            sequence: 3
            imageFileName: null
          - name: Confirm reassignment
            description: Click "Reassign to Me". Verify the officer is changed and active tasks are transferred.
            sequence: 4
            imageFileName: null
      - name: Admin Manages Inventory Request Orders
        description: Admin views and filters inventory requests on the orders management page.
        preconditions: User has Office Services admin access.
        status: draft
        sequence: 15
        steps:
          - name: Navigate to Orders page
            description:
              Click on "Office Services" dropdown in the top navigation bar, then select "Orders".. Verify the page loads with title "Office Supplies Orders" and
              three tabs - "New", "Ready for Pick Up", "Completed".
            sequence: 0
            imageFileName: null
          - name: View New tab
            description: Click "New" tab. Verify it shows requests with APPROVED and ASSIGNED statuses.
            sequence: 1
            imageFileName: null
          - name: View Ready for Pick Up tab
            description: Click "Ready for Pick Up" tab. Verify it shows PROCESSED status requests.
            sequence: 2
            imageFileName: null
          - name: View Completed tab
            description: Click "Completed" tab. Verify it shows RECEIVED status requests.
            sequence: 3
            imageFileName: null
          - name: Verify table columns
            description:
              Verify the table shows columns - Reference (IR number, bold), Requested On (date), Requested By (name),
              Officer Assigned (with optional reassign button), Department, Item Name (up to 3 items with "..." if more),
              and Actions.
            sequence: 4
            imageFileName: null
          - name: Filter by department
            description:
              Use the department dropdown filter. Verify the table filters to show only requests from the selected
              department.
            sequence: 5
            imageFileName: null
          - name: Filter by date range
            description: Set a date range filter on "Requested On". Verify only requests within the range are shown.
            sequence: 6
            imageFileName: null
          - name: View request PDF
            description:
              Click the "IR" button (Eye icon) on a request row. Verify the PDF viewer dialog opens with the formatted
              request document.
            sequence: 7
            imageFileName: null
          - name: Navigate to request ticket
            description:
              Click the "Ticket" button (ArrowDownUp icon) on a request row (only visible if request has a linked
              ticketId). Verify navigation to the ticket detail page.
            sequence: 8
            imageFileName: null
      - name: Department HOD Views Office Supplies Orders
        description: Department HOD views and monitors inventory requests from their department.
        preconditions: User is a Department HOD with access to Office Supplies Orders.
        status: draft
        sequence: 16
        steps:
          - name: Navigate to Department Office Supplies Orders
            description:
              Navigate to Department > Office Supplies Orders. Verify the page loads with title "Office Supplies Orders"
              and four tabs - "Pending Approval", "Processing", "Ready for Pick Up", "Completed".
            sequence: 0
            imageFileName: null
          - name: View Pending Approval tab
            description:
              Click "Pending Approval" tab. Verify it shows requests with APPROVED and ASSIGNED statuses from the
              department.
            sequence: 1
            imageFileName: null
          - name: View Processing tab
            description: Click "Processing" tab. Verify it shows requests with PROCESSING status.
            sequence: 2
            imageFileName: null
          - name: View Ready for Pick Up tab
            description: Click "Ready for Pick Up" tab. Verify it shows PROCESSED status requests.
            sequence: 3
            imageFileName: null
          - name: View Completed tab
            description: Click "Completed" tab. Verify it shows RECEIVED status requests with feedback button available.
            sequence: 4
            imageFileName: null
          - name: Filter by requester
            description: Use the requester dropdown filter to filter by a specific department member.
            sequence: 5
            imageFileName: null
          - name: Filter by date range
            description: Set a date range filter on "Requested On". Verify results filter accordingly.
            sequence: 6
            imageFileName: null
          - name: Verify no reassign button
            description:
              Verify the Department HOD cannot see the reassign button in the Officer Assigned column (allowReassign
              is false for this view).
            sequence: 7
            imageFileName: null
  - name: Room Booking
    description:
      Complete meeting room booking lifecycle including room discovery, availability checking, booking creation
      with office service requests, approval workflow, editing, cancellation, and post-booking evaluation.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope:
      Room availability browsing, room booking creation, office service requests (refreshments, presentation, extra
      tables/chairs, cleanup), HOD approval, auto-approval for top management, booking editing, booking deletion,
      post-booking evaluation, invited user management, Outlook calendar sync.
    outOfScope: Room CRUD management (creating/editing rooms), room facility management.
    sequence: 1
    uatFlows:
      - name: Browse Room Availability
        description: User views available meeting rooms and their time slots for a selected date.
        preconditions: User is logged in and meeting rooms are configured in the system.
        status: ready_for_test
        sequence: 0
        steps:
          - name: Navigate to new booking page
            description:
              Navigate to My Bookings > New Booking. Click the "Meeting Room Booking" tab. Verify the page shows a
              7-day calendar selector and room availability cards in a 3-column grid.
            sequence: 0
            imageFileName: f2-flow0-browse-room-availability
          - name: Select a date
            description:
              Click on a date in the 7-day calendar selector. Verify room availability cards update for the selected
              date.
            sequence: 1
            imageFileName: f2-flow0-browse-room-availability
          - name: Navigate to next week
            description: Click the right arrow to navigate to the next week. Verify the calendar updates with new dates.
            sequence: 2
            imageFileName: f2-flow0-browse-room-availability
          - name: View room card details
            description:
              Verify each room card shows room image, room name, location text, "Facilities" section (with name
              and quantity badges in blue), "Available" section with time slots, and "Booked" section with booker name
              and time slots.
            sequence: 3
            imageFileName: f2-flow0-browse-room-availability
          - name: Identify personal bookings
            description:
              Verify that your own bookings are shown with a green "Booked by me" badge, while others show the
              booker's name with a UserCircle icon.
            sequence: 4
            imageFileName: f2-flow0-browse-room-availability
          - name: Click unavailable room
            description:
              Click on a room card that has no available slots. Verify a warning toast "This room is fully booked
              for the selected date. Please choose another date or room." is shown and the booking form does not open.
            sequence: 5
            imageFileName: f2-flow0-browse-room-availability
      - name: Create Room Booking
        description: User creates a new room booking with all required and optional fields.
        preconditions: User is on the new booking page, Meeting Room Booking tab, with available rooms displayed.
        status: draft
        sequence: 1
        steps:
