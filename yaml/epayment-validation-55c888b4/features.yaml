  - name: Payment Voucher Approval Workflow (Amount-Based Routing)
    description: |
      Automated approval workflow triggered upon payment voucher creation with amount-based routing across three tiers: Tier 1 (≤ RM 50,000): Finance HOD approval → Finance AP uploads M2E payment slip. Tier 2 (RM 50,001 - RM 500,000): Finance HOD approval → GSVP Corporate Services approval → Finance AP uploads M2E payment slip. Tier 3 (> RM 500,000): Finance HOD approval → GSVP Corporate Services approval → Finance AP submits cheque deposit slip. Approval tasks require digital signatures. Each approval level has a 2-business-day SLA, and the final payment upload task has a 3-business-day SLA.
    module: Finance - Payment Validation
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      Amount-based tier routing (RM 50k / RM 500k thresholds). Finance HOD approval with digital signature (APPROVE task, 2 business day SLA). GSVP Corporate Services approval with digital signature for Tier 2 and Tier 3 (APPROVE task, 2 business day SLA). Development vs Corporate GSVP routing based on isDevelopment flag. Finance AP M2E payment slip upload for Tier 1 and Tier 2 (SUBMISSION task, 3 business day SLA). Finance AP cheque deposit slip upload for Tier 3 (SUBMISSION task, 3 business day SLA). Task auto-generation with descriptive names (e.g., "Finance HOD: Verify Invoice Payment for PO {referenceNumber}"). Rejection at any level with comments and requester notification. Sequential approval progression.
    outOfScope: Parallel approvals, delegation of approval authority, dynamic threshold configuration, automatic payment execution.
    sequence: 4
    mockScreens: []
    processFlows: []
    uatFlows:
      - name: "Tier 1: Finance HOD Approves Payment Voucher (≤ RM 50,000)"
        description: Finance HOD receives an APPROVE task for a payment voucher totaling RM 50,000 or less, reviews it, provides a digital signature, and approves. Workflow proceeds to M2E payment slip upload.
        preconditions: Payment voucher created with totalAmount ≤ RM 50,000. Finance HOD is logged in.
        status: draft
        sequence: 0
      - name: "Tier 2: GSVP Corporate Approves Payment Voucher (RM 50,001 - RM 500,000)"
        description: After Finance HOD approval, GSVP Corporate Services receives an APPROVE task, reviews the high-value payment, provides a digital signature, and approves. Workflow proceeds to M2E payment slip upload.
        preconditions: Finance HOD has approved. Payment voucher totalAmount is between RM 50,001 and RM 500,000.
        status: draft
        sequence: 1
      - name: "Tier 3: GSVP Corporate Approves Payment Voucher (> RM 500,000)"
        description: After Finance HOD approval, GSVP Corporate Services approves a very high-value payment voucher. Workflow proceeds to cheque deposit slip submission instead of M2E.
        preconditions: Finance HOD has approved. Payment voucher totalAmount exceeds RM 500,000.
        status: draft
        sequence: 2
      - name: Finance HOD Rejects Payment Voucher
        description: Finance HOD rejects the payment voucher with comments. Requester receives "Payment Voucher Rejected" notification. Workflow stops.
        preconditions: APPROVE task is ACTIVE and assigned to Finance HOD.
        status: draft
        sequence: 3
      - name: GSVP Corporate Rejects Payment Voucher
        description: GSVP Corporate rejects the payment voucher after Finance HOD approval. Requester is notified. Workflow stops.
        preconditions: Finance HOD has approved. APPROVE task is ACTIVE and assigned to GSVP Corporate.
        status: draft
        sequence: 4
