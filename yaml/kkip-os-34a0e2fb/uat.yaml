            sequence: 3
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Enter mileage after
            description: Enter the final odometer reading in the "Mileage After (km)" number input
              (placeholder "Enter odometer reading"). This field is optional.
            sequence: 4
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Select fuel level after
            description:
              Select the final fuel/battery level from the "Fuel / Battery Level After" dropdown (0%, 25%, 50%, 75%,
              100%). Verify this field is required.
            sequence: 5
            imageFileName: f3-flow9-admin-vehicle-bookings
          - name: Confirm key return
            description:
              Click "Return Keys" (blue button). Verify a success toast appears, the booking card updates to show
              "Keys Returned" (disabled button), and the vehicle's fuel amount is updated in the system.
            sequence: 6
            imageFileName: f3-flow9-admin-vehicle-bookings
      - name: Admin Edits Vehicle Booking Details
        description: Admin edits time, driver, or other details of an existing vehicle booking.
        preconditions: Admin is on the Bookings page with an active vehicle booking.
        status: draft
        sequence: 11
        steps:
          - name: Edit booking time
            description:
              Click "Edit Time" on a booking card. Verify the "Edit Booking Time" dialog (blue title) opens showing
              Vehicle (model), ID (license plate), Date, Current Time, and Booked By. Change start and end times using the
