features:
  - name: Office Services - Inventory Request (E-Office Supplies)
    description: End-to-end office supplies request lifecycle including browsing items, cart management, submission,
      approval, officer assignment, order preparation, goods receiving, and feedback collection.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Browsing office supply items, adding items to cart, submitting inventory requests, HOD approval workflow,
      officer assignment, order preparation, GRN completion, feedback collection, request modification, rejection,
      reassignment.
    outOfScope: Stock replenishment, vendor purchase orders, warehouse stock management (inventory levels admin),
      IBS-Concrete requests.
    sequence: 0
    uatFlows:
      - name: Browse Office Supplies Catalog
        description: User navigates to the e-office supplies page, browses available items, searches for specific items, and
          views item details.
        preconditions: User is logged in and has access to Office Services module.
        status: draft
        sequence: 0
        steps:
          - name: Navigate to E-Office Supplies page
            description: Click on "E-Office Supplies" in the Office Services sidebar menu. Verify the page loads with a table of
              office supply items.
            sequence: 0
            imageFileName: null
          - name: Verify table columns
            description: Confirm the table displays Item Code, Item Name, Availability (stocked/not stocked badge), and Action
              buttons (Add or Request).
            sequence: 1
            imageFileName: null
          - name: Search for an item by name
            description: Type an item name into the search field. Verify the table filters to show matching results.
            sequence: 2
            imageFileName: null
          - name: Search for an item by code
            description: Clear the search field and type an item code. Verify the table filters accordingly.
            sequence: 3
            imageFileName: null
          - name: Verify pagination
            description: If more than one page of items exists, click "Next" to navigate to the next page. Verify page counter
              updates and items change.
            sequence: 4
            imageFileName: null
          - name: Verify item image preview
            description: Click on an item image thumbnail. Verify a preview dialog opens showing the full item image.
            sequence: 5
            imageFileName: null
      - name: Add Items to Cart
        description: User adds stocked items to the cart with specified quantities.
        preconditions: User is on the E-Office Supplies page with stocked items available.
        status: draft
        sequence: 1
        steps:
          - name: Click Add button on a stocked item
            description: Click the "Add" button on a stocked item row. Verify the AddToCartDialog opens showing Item Code, Item
              Name, Available Quantity, and UOM.
            sequence: 0
            imageFileName: null
          - name: Enter valid quantity
            description: Enter a quantity within the available range (e.g., 5 if 10 available). Verify no validation error is shown.
            sequence: 1
            imageFileName: null
          - name: Submit add to cart
            description: Click "Add to Cart" button. Verify the dialog closes and the cart counter badge in the header increments.
            sequence: 2
            imageFileName: null
          - name: Add another item to cart
            description: Click "Add" on a different stocked item, enter quantity, and add to cart. Verify the cart counter updates
              to show 2 items.
            sequence: 3
            imageFileName: null
          - name: Attempt to exceed available quantity
            description: Click "Add" on an item and enter a quantity exceeding available stock. Verify a validation error message
              appears and submission is prevented.
            sequence: 4
            imageFileName: null
          - name: Add same item again
            description: Click "Add" on an item already in cart. Verify the dialog shows existing cart quantity. Confirm the total
              (existing + new) cannot exceed available stock.
            sequence: 5
            imageFileName: null
      - name: View and Manage Cart
        description: User opens the cart dialog, reviews items, modifies quantities, removes items, and enters a reason for the
          request.
        preconditions: User has items in the cart.
        status: draft
        sequence: 2
        steps:
          - name: Open cart dialog
            description: Click the cart icon/button in the page header. Verify the WarehouseCartDialog opens showing all cart items
              with Item Code, Item Name, Warehouse, Requested Qty, and Delete action.
            sequence: 0
            imageFileName: null
          - name: Modify item quantity in cart
            description: Change the quantity of an item using the quantity input field. Verify the value updates.
            sequence: 1
            imageFileName: null
          - name: Remove an item from cart
            description: Click the delete (X) button on an item. Verify the item is removed and the cart updates.
            sequence: 2
            imageFileName: null
          - name: Enter reason for request
            description: Type a reason in the "Reason for Request" textarea. This is a required field.
            sequence: 3
            imageFileName: null
          - name: Link a referenced ticket (optional)
            description: Click the "Referenced Ticket" searchable dropdown and search for a ticket by reference number. Select one.
              Verify the ticket reference appears.
            sequence: 4
            imageFileName: null
          - name: Verify Preview Order button state
            description: Confirm the "Preview Order" button is disabled when the cart is empty or reason is blank, and enabled when
              both are filled.
            sequence: 5
            imageFileName: null
      - name: Preview and Submit Inventory Request
        description: User previews the formatted request document and submits it.
        preconditions: Cart has items and reason is filled.
        status: draft
        sequence: 3
        steps:
          - name: Click Preview Order
            description: Click "Preview Order" from the cart dialog. Verify the InventoryRequestPreviewDialog opens showing KKIP
              letterhead, Request No (K1-IR-DRAFT), Requester name, Department, Date, and items table.
            sequence: 0
            imageFileName: null
          - name: Review request details
            description: Verify all items, quantities, warehouse, reason, and requester information are displayed correctly in the
              preview.
            sequence: 1
            imageFileName: null
          - name: Submit request
            description: Click "Submit Request". Verify a loading spinner appears, then a success toast message is shown. Verify the
              user is navigated to the home page.
            sequence: 2
            imageFileName: null
          - name: Verify ticket creation
            description: Navigate to Helpdesk Tickets. Verify a new ticket of type INVENTORY-REQUEST is created with the correct
              reference number.
            sequence: 3
            imageFileName: null
      - name: HOD Approves Inventory Request
        description: Department HOD reviews and approves an inventory request.
        preconditions: An inventory request has been submitted and is in PENDING-APPROVAL status. HOD is logged in.
        status: draft
        sequence: 4
        steps:
          - name: Navigate to ticket
            description: HOD navigates to the inventory request ticket (via notifications or Helpdesk). Verify the
              InventoryRequestProgressCard shows the request is at the "Approval" step.
            sequence: 0
            imageFileName: null
          - name: Click Review button
            description: Click "Review" on the active approval task. Verify the InventoryRequestReviewDialog opens with PDF preview
              on the left and action buttons on the right.
            sequence: 1
            imageFileName: null
          - name: Review request PDF
            description: Verify the PDF shows request details including items, quantities, requester, department, and reason.
            sequence: 2
            imageFileName: null
          - name: Click Approve
            description: Click the "Approve" button. Verify the request status changes to APPROVED and the progress card updates.
            sequence: 3
            imageFileName: null
          - name: Verify notification to requester
            description: Log in as the requester. Verify a notification is received about the approval.
            sequence: 4
            imageFileName: null
      - name: HOD Requests Changes on Inventory Request
        description: HOD reviews and returns the request for modifications.
        preconditions: An inventory request is in PENDING-APPROVAL status. HOD is logged in.
        status: draft
        sequence: 5
        steps:
          - name: Open review dialog
            description: Open the InventoryRequestReviewDialog for the pending request.
            sequence: 0
            imageFileName: null
          - name: Click Return button
            description: Click the "Return" button. Verify a dialog appears with a textarea for "Changes Requested".
            sequence: 1
            imageFileName: null
          - name: Enter change request reason
            description: Type the reason for requested changes and click "Send". Verify the task is updated with CHANGES-REQUESTED
              status.
            sequence: 2
            imageFileName: null
          - name: Verify requester receives revision task
            description: Log in as requester. Verify a SUBMISSION task is created for revision. Verify the progress card shows the
              request needs revision.
            sequence: 3
            imageFileName: null
          - name: Requester revises and resubmits
            description: Click "Revise Inventory Request". Open InventoryRequestEditDialog. Modify items/quantities/reason. Click
              "Update". Verify a new approval task is created for HOD.
            sequence: 4
            imageFileName: null
      - name: HOD Rejects Inventory Request
        description: HOD rejects the inventory request.
        preconditions: An inventory request is in PENDING-APPROVAL status.
        status: draft
        sequence: 6
        steps:
          - name: Open review dialog
            description: Open the InventoryRequestReviewDialog for the pending request.
            sequence: 0
            imageFileName: null
          - name: Click Reject button
            description: Click the "Reject" button (red). Verify a dialog appears for entering rejection reason.
            sequence: 1
            imageFileName: null
          - name: Enter rejection reason and confirm
            description: Enter a reason for rejection and click "Send". Verify the request is marked as rejected.
            sequence: 2
            imageFileName: null
          - name: Verify requester is notified
            description: Log in as requester. Verify a notification is received about the rejection.
            sequence: 3
            imageFileName: null
      - name: HOD Modifies Items and Approves
        description: HOD adjusts item quantities and directly approves.
        preconditions: An inventory request is in PENDING-APPROVAL status.
        status: draft
        sequence: 7
        steps:
          - name: Open review dialog
            description: Open the InventoryRequestReviewDialog for the pending request.
            sequence: 0
            imageFileName: null
          - name: Click Modify button
            description: Click "Modify". Verify the InventoryRequestEditDialog opens with current items pre-populated.
            sequence: 1
            imageFileName: null
          - name: Modify item quantities
            description: Change quantities using +/- buttons or direct input. Add an update reason in the textarea.
            sequence: 2
            imageFileName: null
          - name: Click Update and Approve
            description: Click "Update and Approve". Verify the request is updated with new quantities and approved simultaneously.
            sequence: 3
            imageFileName: null
      - name: Office Service HOD Assigns Officer
        description: After approval, Office Service HOD assigns an officer to prepare the supplies.
        preconditions: Inventory request is APPROVED. Office Service HOD is logged in.
        status: draft
        sequence: 8
        steps:
          - name: Navigate to request ticket
            description: Navigate to the inventory request ticket. Verify the progress shows APPROVED status and a CONSULT task is
              active.
            sequence: 0
            imageFileName: null
          - name: Click Assign Officer
            description: Click "Assign Officer" on the active task. Verify a dialog shows with a list of Office Service officers
              (radio group).
            sequence: 1
            imageFileName: null
          - name: Select officer and confirm
            description: Select an officer from the list and confirm. Verify the request status changes to ASSIGNED and the
              officer's name appears.
            sequence: 2
            imageFileName: null
      - name: Assigned Officer Prepares Supplies
        description: The assigned officer confirms the office supplies are ready for pickup.
        preconditions: Request is ASSIGNED. Officer is logged in.
        status: draft
        sequence: 9
        steps:
          - name: Navigate to request ticket
            description: Navigate to the assigned inventory request ticket. Verify an EXECUTE task is active.
            sequence: 0
            imageFileName: null
          - name: Click Confirm Order Ready
            description: Click "Confirm Order Ready". Verify the PrepareOfficeSuppliesDialog opens.
            sequence: 1
            imageFileName: null
          - name: Confirm supplies are ready
            description: Click "Notify Requester". Verify the request status changes to PROCESSED and the requester receives a
              notification that supplies are ready for pickup.
            sequence: 2
            imageFileName: null
      - name: Requester Completes Goods Received Note (GRN)
        description: Requester picks up supplies and confirms received quantities.
        preconditions: Request is PROCESSED (ready for pickup). Requester is logged in.
        status: draft
        sequence: 10
        steps:
          - name: Navigate to request ticket
            description: Navigate to the inventory request ticket. Verify a RECEIVING task is active and the progress shows items
              are ready for pickup.
            sequence: 0
            imageFileName: null
          - name: Click Complete GRN
            description: Click "Complete GRN". Verify the InventoryGRNDialog opens showing items with Expected Quantity and editable
              Quantity Received fields.
            sequence: 1
            imageFileName: null
          - name: Enter received quantities
            description: Enter the quantity received for each item. Verify quantities cannot exceed expected amounts.
            sequence: 2
            imageFileName: null
          - name: Submit GRN
            description: Submit the GRN form. Verify the request status changes to RECEIVED and the progress card updates.
            sequence: 3
            imageFileName: null
      - name: Requester Provides Feedback
        description: After receiving supplies, the requester provides a rating and comments.
        preconditions: Request is RECEIVED. Requester is logged in.
        status: draft
        sequence: 11
        steps:
          - name: Navigate to request ticket
            description: Navigate to the inventory request ticket. Verify a FEEDBACK task is active.
            sequence: 0
            imageFileName: null
          - name: Click Leave Feedback
            description: Click "Leave Feedback". Verify the InventoryRequestFeedbackDialog opens with star rating and comments
              fields.
            sequence: 1
            imageFileName: null
          - name: Rate the service
            description: Click on stars to set a rating (1-5). Verify the selected rating displays correctly (e.g., "3 / 5").
            sequence: 2
            imageFileName: null
          - name: Enter feedback comments
            description: Type feedback comments in the textarea. Verify the field is required.
            sequence: 3
            imageFileName: null
          - name: Submit feedback
            description: Click submit. Verify the feedback is saved and visible on the InventoryRequestDocumentsCard.
            sequence: 4
            imageFileName: null
      - name: View Submitted Feedback
        description: View previously submitted feedback for a completed request.
        preconditions: Feedback has been submitted for a completed inventory request.
        status: draft
        sequence: 12
        steps:
          - name: Navigate to request ticket
            description: Navigate to the completed inventory request ticket.
            sequence: 0
            imageFileName: null
          - name: View feedback on documents card
            description: Verify the InventoryRequestDocumentsCard shows the star rating and comments.
            sequence: 1
            imageFileName: null
          - name: Open detailed feedback dialog
            description: Click the feedback action on the inventory request table. Verify the InventoryRequestFeedbackViewDialog
              opens showing full star rating, comments, and submission date.
            sequence: 2
            imageFileName: null
      - name: Reassign Inventory Request to Another Officer
        description: An officer reassigns an inventory request to themselves.
        preconditions: Inventory request is assigned to another officer and not yet completed. Current user is an Office Service
          officer.
        status: draft
        sequence: 13
        steps:
          - name: Navigate to orders page
            description: Navigate to Office Services > Orders. Locate the request in the table.
            sequence: 0
            imageFileName: null
          - name: Click Reassign button
            description: Click the reassign button in the "Officer Assigned" column. Verify the ReassignInventoryRequestDialog opens
              showing current officer and new officer details.
            sequence: 1
            imageFileName: null
          - name: Type confirmation text
            description: Type "CONFIRM REASSIGN" in the confirmation input. Verify the confirm button becomes enabled.
            sequence: 2
            imageFileName: null
          - name: Confirm reassignment
            description: Click confirm. Verify the officer is changed and active tasks are transferred.
            sequence: 3
            imageFileName: null
      - name: Admin Manages Inventory Request Orders
        description: Admin views and filters inventory requests on the orders management page.
        preconditions: User has Office Services admin access.
        status: draft
        sequence: 14
        steps:
          - name: Navigate to Orders page
            description: Navigate to Office Services > Orders. Verify the page loads with three tabs - New, Ready for Pick Up,
              Completed.
            sequence: 0
            imageFileName: null
          - name: View New tab
            description: Click "New" tab. Verify it shows requests with APPROVED and ASSIGNED statuses.
            sequence: 1
            imageFileName: null
          - name: View Ready for Pick Up tab
            description: Click "Ready for Pick Up" tab. Verify it shows PROCESSED status requests.
            sequence: 2
            imageFileName: null
          - name: View Completed tab
            description: Click "Completed" tab. Verify it shows RECEIVED status requests.
            sequence: 3
            imageFileName: null
          - name: Filter by department
            description: Use the department dropdown filter. Verify the table filters to show only requests from the selected
              department.
            sequence: 4
            imageFileName: null
          - name: Filter by date range
            description: Set a date range filter on "Requested On". Verify only requests within the range are shown.
            sequence: 5
            imageFileName: null
          - name: Search by reference or item
            description: Use the search field to search by IR reference number or item name. Verify results update accordingly.
            sequence: 6
            imageFileName: null
          - name: View request PDF
            description: Click the "IR" button on a request row. Verify the PDF viewer opens with the formatted request document.
            sequence: 7
            imageFileName: null
          - name: Navigate to request ticket
            description: Click the "Ticket" button on a request row. Verify navigation to the ticket detail page.
            sequence: 8
            imageFileName: null
  - name: Room Booking
    description: Complete meeting room booking lifecycle including room discovery, availability checking, booking creation
      with office service requests, approval workflow, editing, cancellation, and post-booking evaluation.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Room availability browsing, room booking creation, office service requests (refreshments, presentation, extra
      tables/chairs, cleanup), HOD approval, auto-approval for top management, booking editing, booking deletion,
      post-booking evaluation, invited user management, Outlook calendar sync.
    outOfScope: Room CRUD management (creating/editing rooms), room facility management.
    sequence: 1
    uatFlows:
      - name: Browse Room Availability
        description: User views available meeting rooms and their time slots for a selected date.
        preconditions: User is logged in and meeting rooms are configured in the system.
        status: ready_for_test
        sequence: 0
        steps:
          - name: Navigate to new booking page
            description: Navigate to My Bookings > New Booking. Click the "Rooms" tab. Verify the page shows a calendar selector and
              room availability cards.
            sequence: 0
            imageFileName: 0bd1ebff-78a1-4abe-81ef-5e1d781b535b-test-html-to-image
          - name: Select a date
            description: Click on a date in the 7-day calendar selector. Verify room availability cards update for the selected
              date.
            sequence: 1
            imageFileName: null
          - name: Navigate to next week
            description: Click the right arrow to navigate to the next week. Verify the calendar updates with new dates.
            sequence: 2
            imageFileName: null
          - name: View room card details
            description: Verify each room card shows room image, room name, location, facilities list (with name and quantity),
              available time slots (green), and booked time slots (with booker name).
            sequence: 3
            imageFileName: null
          - name: Identify personal bookings
            description: Verify that your own bookings are shown with a "Booked by me" badge, while others show the booker's name.
            sequence: 4
            imageFileName: null
          - name: Click unavailable room
            description: Click on a room card that has no available slots. Verify a warning message is shown indicating no available
              slots.
            sequence: 5
            imageFileName: null
      - name: Create Room Booking
        description: User creates a new room booking with all required and optional fields.
        preconditions: User is on the new booking page, Rooms tab, with available rooms displayed.
        status: draft
        sequence: 1
        steps:
          - name: Click on an available room
            description: Click on a room card that has available time slots. Verify the RoomBookingForm dialog opens with room name
              and facilities displayed.
            sequence: 0
            imageFileName: null
          - name: Enter meeting purpose
            description: Fill in the "Purpose" text input field with the meeting reason. Verify the field is required.
            sequence: 1
            imageFileName: null
          - name: Enter meeting description
            description: Fill in the "Description" textarea with meeting details. Verify the field is required.
            sequence: 2
            imageFileName: null
          - name: Select start time
            description: Open the "Start Time" dropdown. Verify only available time slots are shown (15-minute increments, 7 AM - 7
              PM range). Select a start time.
            sequence: 3
            imageFileName: null
          - name: Select end time
            description: Open the "End Time" dropdown. Verify it shows times that are at least 30 minutes after the start time and
              within available ranges. Select an end time.
            sequence: 4
            imageFileName: null
          - name: Link a referenced ticket (optional)
            description: Search for and select a referenced ticket from the searchable dropdown. Verify the ticket reference
              appears.
            sequence: 5
            imageFileName: null
          - name: Invite users (optional)
            description: Open the "Invite Users" multi-select dropdown. Search for and select multiple users. Verify selected users
              are shown as chips.
            sequence: 6
            imageFileName: null
          - name: Request refreshments
            description: Check the "Require Refreshment" checkbox. Verify it is checked.
            sequence: 7
            imageFileName: null
          - name: Request presentation setup
            description: Check the "Require Presentation Setup" checkbox. Verify it is checked (triggers IT HOD task).
            sequence: 8
            imageFileName: null
          - name: Request extra tables
            description: Check the "Require Extra Tables" checkbox. Verify a quantity input appears. Enter a quantity (e.g., 3).
              Verify validation requires quantity > 0.
            sequence: 9
            imageFileName: null
          - name: Request extra chairs
            description: Check the "Require Extra Chairs" checkbox. Verify a quantity input appears. Enter a quantity. Verify
              validation requires quantity > 0.
            sequence: 10
            imageFileName: null
          - name: Request extra cleanup
            description: Check the "Require Extra Cleanup" checkbox. Verify it is checked.
            sequence: 11
            imageFileName: null
          - name: Enter additional remarks
            description: Type additional notes in the "Additional Remarks" textarea.
            sequence: 12
            imageFileName: null
          - name: Add attachments (optional)
            description: Click the file upload component and select one or more files. Verify files are attached.
            sequence: 13
            imageFileName: null
          - name: Accept terms and conditions
            description: Click the "terms and conditions" link. Verify the Terms & Conditions dialog opens showing general terms,
              room usage, equipment, conduct, and cancellation policies. Close the dialog. Check the "I agree" checkbox.
            sequence: 14
            imageFileName: null
          - name: Submit booking
            description: Click "Create Booking". Verify a success toast appears with message about pending approval. Verify a "View
              Booking" action link in the toast navigates to My Bookings.
            sequence: 15
            imageFileName: null
      - name: Room Booking Auto-Approval (Top Management)
        description: A top-management user creates a room booking and it is automatically approved.
        preconditions: User has "top-management" role or their HOD has "top-management" role.
        status: draft
        sequence: 2
        steps:
          - name: Create room booking as top-management user
            description: Log in as a user with top-management role. Create a room booking following the standard flow.
            sequence: 0
            imageFileName: null
          - name: Verify auto-approval
            description: Verify the booking status is immediately set to APPROVED (not PENDING). Verify no approval task is created
              for HOD.
            sequence: 1
            imageFileName: null
          - name: Verify event schedule created
            description: Navigate to My Calendar. Verify the room booking appears as a purple event on the booking date.
            sequence: 2
            imageFileName: null
          - name: Verify service tasks created
            description: If office services were requested (refreshment, presentation, tables, etc.), verify the appropriate tasks
              were automatically created for tea lady, IT HOD, or Office Service HOD.
            sequence: 3
            imageFileName: null
          - name: Verify Outlook sync (if connected)
            description: If the user has Outlook connected, verify the event appears in Outlook calendar.
            sequence: 4
            imageFileName: null
      - name: Room Booking HOD Approval
        description: HOD reviews and approves a pending room booking.
        preconditions: A room booking is in PENDING status. HOD is logged in.
        status: draft
        sequence: 3
        steps:
          - name: Receive notification
            description: HOD receives a notification about the pending room booking approval.
            sequence: 0
            imageFileName: null
          - name: Navigate to approval task
            description: Navigate to the room booking ticket. Verify the RoomBookingApprovalCard shows booking details including
              room, date, time, requester, reason, and invited users.
            sequence: 1
            imageFileName: null
          - name: Approve the booking
            description: Click "Approve" on the active approval task. Confirm the approval. Verify the booking status changes to
              APPROVED.
            sequence: 2
            imageFileName: null
          - name: Verify requester notification
            description: Verify the requester receives an in-app notification and approval email.
            sequence: 3
            imageFileName: null
          - name: Verify invited users notification
            description: Verify invited users receive email invitations for the meeting.
            sequence: 4
            imageFileName: null
          - name: Verify calendar event
            description: Verify the event schedule is created and synced to Outlook (if requester has Outlook connected).
            sequence: 5
            imageFileName: null
      - name: HOD Rejects Room Booking
        description: HOD reviews and rejects a pending room booking.
        preconditions: A room booking is in PENDING status.
        status: draft
        sequence: 4
        steps:
          - name: Navigate to approval task
            description: Navigate to the room booking ticket and open the approval task.
            sequence: 0
            imageFileName: null
          - name: Reject the booking
            description: Click "Reject". Enter a rejection reason in the dialog. Confirm rejection. Verify the booking status
              changes to REJECTED.
            sequence: 1
            imageFileName: null
          - name: Verify requester notification
            description: Verify the requester receives a rejection notification and email.
            sequence: 2
            imageFileName: null
      - name: Check Room Availability
        description: Verify the room availability checking mechanism prevents double bookings.
        preconditions: A room booking already exists for a specific date and time.
        status: draft
        sequence: 5
        steps:
          - name: View existing booking on room card
            description: Navigate to new booking and select the date with the existing booking. Verify the booked time slot is shown
              on the room card.
            sequence: 0
            imageFileName: null
          - name: Attempt overlapping booking
            description: Click on the same room and attempt to select a time slot that overlaps with the existing booking. Verify
              the conflicting time slots are not available in the dropdown.
            sequence: 1
            imageFileName: null
          - name: Verify non-overlapping booking works
            description: Select a time slot that does not overlap with existing bookings. Verify the booking can be submitted
              successfully.
            sequence: 2
            imageFileName: null
      - name: Edit Room Booking
        description: User edits an existing room booking's details.
        preconditions: User has an active (non-completed) room booking.
        status: draft
        sequence: 6
        steps:
          - name: Navigate to My Bookings
            description: Navigate to My Bookings > Meeting Room Bookings tab. Locate the booking to edit.
            sequence: 0
            imageFileName: null
          - name: Click Edit button
            description: Click the Edit button on the booking card. Verify the EditRoomBookingDialog opens with current booking
              details pre-populated.
            sequence: 1
            imageFileName: null
          - name: Change booking date
            description: Change the booking date using the date input. Verify the available time slots update for the new date.
            sequence: 2
            imageFileName: null
          - name: Change time slots
            description: Select new start and end times from the available slots. Verify only non-conflicting slots are available
              (excluding current booking).
            sequence: 3
