  - name: User Booking (Appointment Scheduling)
    description:
      User-to-user appointment booking including discovering available users, creating meeting requests,
      accepting/rejecting requests, and managing booking requests.
    module: Calendar
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope:
      User availability browsing, user booking creation (in-person and virtual), booking request approval/rejection,
      booking requests management page (To Approve and My Requests tabs), booking editing, booking deletion, Outlook
      calendar sync on acceptance.
    outOfScope: Recurring appointments, group bookings (multi-user target).
    sequence: 6
    uatFlows:
      - name: Browse User Availability
        description: User views available employees and their time slots for scheduling meetings.
        preconditions: User is logged in and other users have configured their availability.
        status: draft
        sequence: 0
        steps:
          - name: Navigate to Appointment tab
            description:
              Navigate to My Bookings > New Booking. Click the "Appointment" tab. Verify a calendar selector, search
              field (placeholder "Search by name, department, or designation..."), and user availability cards are displayed
              in a 3-column grid.
            sequence: 0
            imageFileName: f6-user-booking-browse-availability
          - name: Select a date
            description:
              Click on a date in the 7-day calendar selector. Verify user cards update to show availability for the
              selected date. Current user is excluded from the list.
            sequence: 1
            imageFileName: f6-user-booking-browse-availability
          - name: Search for a user
            description: Type a user name, department, or designation in the search field. Verify cards filter to matching users.
            sequence: 2
            imageFileName: f6-user-booking-browse-availability
          - name: View user card details
            description:
              Verify each user card shows profile picture (rounded), user name, designation (with briefcase icon),
              department (with building icon), available time slots (green), and booked time slots (red with status badges).
            sequence: 3
            imageFileName: f6-user-booking-browse-availability
          - name: View booked slot details
            description:
              Verify booked slots show time range, status badge (Pending in orange, Accepted in green, Rejected in red),
              and booker name if not booked by current user.
            sequence: 4
            imageFileName: f6-user-booking-browse-availability
          - name: Verify empty state
            description:
              Search for a non-existent user. Verify "No users found matching your search" or "No users available"
              message appears.
            sequence: 5
            imageFileName: f6-user-booking-browse-availability
      - name: Create In-Person User Booking
        description: User creates an in-person meeting request with another user.
        preconditions: User is on the Appointment tab with available users displayed.
        status: draft
        sequence: 1
        steps:
          - name: Click on a user card
            description:
              Click on a user card with available time slots. Verify the UserBookingForm dialog (500px width) opens
              showing user header with profile picture, name, designation (briefcase icon), and department (building icon)
              on a gray background.
            sequence: 0
            imageFileName: f6-user-booking-browse-availability
          - name: View form section header
            description: Verify the form shows "Booking Details" section header below the user info.
            sequence: 1
            imageFileName: f6-user-booking-browse-availability
          - name: Enter meeting purpose
            description:
              Fill in the "Purpose" text input (placeholder "e.g., Project Discussion, Code Review, 1-on-1 Meeting").
              Verify the field is required (validation "Purpose is required").
            sequence: 2
            imageFileName: f6-user-booking-browse-availability
          - name: Select In-Person meeting type
            description: Select "In-Person Meeting" from the "Meeting Type" dropdown. Verify a "Location" field appears below.
            sequence: 3
            imageFileName: f6-user-booking-browse-availability
          - name: Enter location
            description: Fill in the "Location" field (placeholder "e.g., Meeting Room A, Office 301") for the in-person meeting.
            sequence: 4
            imageFileName: f6-user-booking-browse-availability
          - name: Select start time
            description:
              Select a start time from the "Start Time" dropdown. Verify options are filtered based on the user's
              available slots and existing bookings (12-hour format).
            sequence: 5
            imageFileName: f6-user-booking-browse-availability
          - name: Select end time
            description:
              Select an end time from the "End Time" dropdown. Verify options are filtered based on start time and
              remaining availability.
            sequence: 6
            imageFileName: f6-user-booking-browse-availability
          - name: Enter notes (optional)
            description:
              Optionally enter additional notes in the "Notes" textarea (placeholder "Add any additional notes or
              agenda items...", 3 rows).
            sequence: 7
            imageFileName: f6-user-booking-browse-availability
          - name: Review info box
            description:
              Verify the blue info box states "Note - This booking request will be sent to [user name] for approval.
              You'll be notified once they respond."
            sequence: 8
            imageFileName: f6-user-booking-browse-availability
          - name: Send booking request
            description:
              Click "Send Booking Request". Verify a success toast "Booking request sent to [user name]" appears and
              the form closes.
            sequence: 9
            imageFileName: f6-user-booking-browse-availability
          - name: Verify request appears in My Requests
            description:
              Navigate to Booking Requests page. Verify the request appears in the "My Requests" tab with PENDING status
              and "Awaiting Response" badge in orange.
            sequence: 10
            imageFileName: f6-user-booking-browse-availability
      - name: Create Virtual User Booking
        description: User creates a virtual meeting request.
        preconditions: User is on the Appointment tab.
        status: draft
        sequence: 2
        steps:
          - name: Open user booking form
            description: Click on a user card to open the booking form.
            sequence: 0
