    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: |
      QR code generation for each registered asset, barcode generation (Code 128, Code 39), customizable label templates (with asset ID, name, department, QR/barcode), batch label generation for multiple assets, label preview before printing, integration with label printers (Toshiba, Zebra, Brother), label reprint for damaged labels, label size configuration, label history tracking.
    outOfScope: |
