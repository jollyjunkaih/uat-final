_generatedAt: 2026-03-17T00:00:00.000Z
metadata:
  title: KKIP Procurement Module - User Guide
  version: '2.0'
  lastUpdated: null
  description: >
    Comprehensive user guide for the KKIP Procurement Module covering Purchase Requests (PR),
    Request for Quotations (RFQ), Quotation Analysis (QA), Purchase Orders (PO), Goods Received Notes (GRN),
    Services Received Notes (SRN), Invoice Processing, Letter of Awards (LOA), Tender Management (RFT/ITT),
    Material Price Agreements (MPA), Supplier Management, Item Management, Templates, and Reporting.
    Reference number formats: K1-PR-{yyMMdd}-{ref}, K1-RFQ-{yyMMdd}-{ref}, K1-PO-{yyMMdd}-{ref},
    K1-QUOT-{yyMMdd}-{ref}, K1-QA-{yyMMdd}-{ref}, K1-TND-{yyMMdd}-{ref}.
    Instructions are organized by user role across the Admin Desktop App and Vendor Web Portal.

roles:
  # ============================================================
  # ROLE 0: REQUESTER (Department Staff)
  # ============================================================
  - name: Requester (Department Staff)
    slug: requester
    description: >
      End users who submit purchase requests for goods, services, or works on behalf of their department.
      This role covers creating purchase requests, tracking request progress, receiving goods (GRN),
      evaluating services (SRN), uploading invoices, and viewing purchase order status.
      Requesters interact primarily with the Admin Desktop App.
    sequence: 0
    sections:
      # --- PR Creation ---
      - title: Purchase Request - Creating a New Request
        slug: pr-create
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              Navigate to the Helpdesk or Department module and create a new ticket targeting the Procurement department.
              Fill in the ticket title and description. Once the ticket is created, the Purchase Request form opens automatically.
            imageFileName: r0-s0-pr-create
            sequence: 0
          - instruction: >
              The Purchase Request form contains the following fields. Location (TextInput, required, default "KKIP Main Office") specifies
              where goods should be delivered. Award By (DatePicker, required, default 15 business days from today) is the target date for
              awarding the procurement. These fields appear at the top of the form.
            imageFileName: r0-s0-pr-create
            sequence: 1
          - instruction: >
              Reason (TextAreaInput, required, max length enforced) describes why the procurement is needed. Referenced Ticket (SelectInputWithSearch,
              optional) lets you link to an existing helpdesk ticket - type to search with 300ms debounce, showing "Searching..." or
              "No tickets found" messages.
            imageFileName: r0-s0-pr-create
            sequence: 2
          - instruction: >
              Source of Funds (SelectInput, required, default "kkip") has two options - "kkip" or "government". Cost Estimation (NumberInput,
              required, minimum 1, integer only) is the estimated total cost. Approved Budget (NumberInput, required, minimum 1, integer only)
              is the budget approved for this purchase.
            imageFileName: r0-s0-pr-create
            sequence: 3
          - instruction: >
              Budget Reference (TextInput, optional) and Project Title (TextInput, optional) provide additional context for the procurement.
              These fields are displayed in the budget information section of the preview.
            imageFileName: r0-s0-pr-create
            sequence: 4
          - instruction: >
              If your Division HOD and Department HOD are different people, a Choose Approver field (SelectInput, required) appears with
              options "division" or "department". This determines who receives the approval task. If they are the same person, this field is hidden.
            imageFileName: r0-s0-pr-create
            sequence: 5
          - instruction: >
              The Is this an inventory restock request? checkbox (optional, default false) appears for warehouse-related purchases.
              When checked, a Warehouse to Restock dropdown (SelectInput) appears letting you select the target warehouse.
              When unchecked, the warehouse field is hidden and its value is cleared.
            imageFileName: r0-s0-pr-create
            sequence: 6
          - instruction: >
              The Items section is a dynamic array (minimum 1 item required). Click "Add Items" to add a new row. Each item has:
              Item Name (TextInput, required if no item code assigned), Specifications (TextAreaInput, optional, large max length),
              Quantity (NumberInput, required, must be positive > 0), and UOM (SelectInputWithSearch, required if no item code, options from
              PROCUREMENT_UOM_OPTIONS list).
            imageFileName: r0-s0-pr-create
            sequence: 7
          - instruction: >
              For each item, you can click "Assign Item Code" to open the SelectItemDialog and search the item catalog. Once assigned,
              the item shows the catalog name and a badge with the item code. You can click "Re-Assign Item Code" to change it, or
              "Input Item Manually" to clear the assignment and type the item name manually. Items with assigned codes inherit the catalog
              name and UOM.
            imageFileName: r0-s0-pr-create
            sequence: 8
          - instruction: >
              Attachments section uses either FileSelectInput (for new requests) or TicketFileSelectInput (if the PR is linked to an
              existing ticket). Accepted formats are PDF, PNG, JPEG, and JPG with a maximum of 20MB per file and 30MB total. Attachments
              appear as badges in the preview - existing files show blue badges, new files show green badges with "(New)" label.
            imageFileName: r0-s0-pr-create
            sequence: 9
          - instruction: >
              The form supports auto-save to IndexedDB when enabled. All fields including location, awardBy, isUrgent, urgentReason,
              reason, budgetReference, referencedTicketId, sourceOfFunds, costEstimation, approvedBudget, approver, projectTitle,
              isInventoryRestock, warehouseId, items, attachments, and existingFileIds are persisted. If you navigate away before
              submitting, your draft is preserved and loaded when you return. Drafts are deleted on successful submission.
            imageFileName: r0-s0-pr-create
            sequence: 10
          - instruction: >
              Click "Preview Purchase Request" to open the PurchaseRequestPreviewDialog. The preview shows a KKIP letterhead document
              with: Request No. (K1-PR-DRAFT for new, K1-PR-{yyMMdd}-{ref} for existing), Requester name, Location (yellow highlight),
              Project Title (yellow highlight, if provided), Date Created, Deliver By, Approver (Division HOD or Department HOD),
              and Urgent Reason (red highlight, if marked urgent).
            imageFileName: r0-s0-pr-create
            sequence: 11
          - instruction: >
              The preview also shows Budget Information (if any budget field is populated): Cost Estimation, Approved Budget, Source of
              Funds, and Budget Reference - all with yellow highlighting. Below that is the Requested Items table with columns No, Item Name,
              Specifications, Quantity, and UOM (items highlighted in yellow). The Reason for Request appears with preserved whitespace
              and yellow highlighting. Attachments are listed at the bottom.
            imageFileName: r0-s0-pr-create
            sequence: 12
          - instruction: >
              Click "Submit Request" in the preview dialog to submit. The button is disabled if no items exist or while submitting.
              On success, a confirmation toast appears. The PR enters PENDING-APPROVAL status and a task is created for your HOD
              (or Division HOD based on approver selection). The reference number is generated as K1-PR-{yyMMdd}-{ref}.
            imageFileName: r0-s0-pr-create
            sequence: 13

      # --- PR Urgent Request ---
      - title: Purchase Request - Marking a Request as Urgent
        slug: pr-urgent
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              On the Purchase Request form, check the "Is this request urgent?" checkbox. This immediately opens the UrgentRequestDialog
              modal where you must provide a justification for the urgency.
            imageFileName: r0-s1-pr-urgent
            sequence: 0
          - instruction: >
              Enter your urgent reason in the dialog. When you confirm, the urgentReason field is set on the form. If you uncheck the
              urgent checkbox later, the urgentReason is cleared to null. The urgent reason appears in the preview with a red URGENT
              badge in the header and the reason text highlighted in red in the info grid.
            imageFileName: r0-s1-pr-urgent
            sequence: 1
          - instruction: >
              Urgent requests follow the same approval chain but are visually flagged with the urgency level throughout the workflow.
              On the Purchase Requests listing page, urgent requests show an "Urgent" badge in the Urgency column (vs "Normal" for
              standard requests).
            imageFileName: r0-s1-pr-urgent
            sequence: 2

      # --- PR Revision ---
      - title: Purchase Request - Revising a Returned Request
        slug: pr-revise
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              If your HOD or Procurement returns your PR with requested changes, you receive a notification. Navigate to the ticket
              where a REVISE task will be ACTIVE. The reviewer's comments explaining what changes are needed are visible on the task.
            imageFileName: r0-s2-pr-revise
            sequence: 0
          - instruction: >
              Click "Revise Purchase Request" to open the edit form. The form is pre-populated with all your original data including
              items, budget fields, attachments, and reason. Modify the requested fields - you can adjust quantities, update
              specifications, add or remove items, change budget figures, or update the reason.
            imageFileName: r0-s2-pr-revise
            sequence: 1
          - instruction: >
              After making changes, click "Preview Update" (this button only appears when the form has changes, indicated by isDirty=true).
              The preview dialog shows "Update Request" instead of "Submit Request". On resubmission, a new approval task is created
              for the reviewer and the PR returns to the approval flow.
            imageFileName: r0-s2-pr-revise
            sequence: 2

      # --- PR Tracking ---
      - title: Purchase Request - Tracking Your Requests
        slug: pr-tracking
        module: Procurement
        sequence: 3
        steps:
          - instruction: >
              Navigate to Procurement > Purchase Requests. The page has 5 tabs: New (APPROVED status - awaiting procurement processing),
              Ongoing (PROCESSING status - being handled by procurement), Completed (COMPLETED status - fully awarded), Cancelled
              (CANCELLED status), and KIV (KIV status - kept in view / on hold).
            imageFileName: r0-s3-pr-tracking
            sequence: 0
          - instruction: >
              Use the filter controls to narrow results: Procurement Officer (dropdown), Requesting Department (dropdown from departments
              context), Requested On (date range picker), and Urgency (boolean toggle for urgent only). The search bar accepts reference
              numbers or item names.
            imageFileName: r0-s3-pr-tracking
            sequence: 1
          - instruction: >
              The table columns are: Request Ref. (sortable by id), Requester (shows department + first name), Items (up to 3 items
              displayed with "..." for more), Date Column (header changes per tab - Approved Date, Processed Date, Awarded Date, or
              Cancelled Date - shows a badge with days elapsed and formatted date, color-coded red if > 3 days, yellow if 1-3 days),
              Urgency (Urgent/Normal badge), Officer (assigned procurement officer or "Unassigned"), and Actions.
            imageFileName: r0-s3-pr-tracking
            sequence: 2
          - instruction: >
              Actions column contains: View button (eye icon) to open the PR detail, Reassign button (user icon, visible only if PR
              is not yet awarded and you have permission) to change the assigned procurement officer, and a Ticket link button to
              navigate to the associated helpdesk ticket. Pagination defaults to 40 items per page (max 100).
            imageFileName: r0-s3-pr-tracking
            sequence: 3

      # --- PR Cancellation ---
      - title: Purchase Request - Cancelling a Request
        slug: pr-cancel
        module: Procurement
        sequence: 4
        steps:
          - instruction: >
              To cancel a PR you own, click "Cancel Request" on the ticket view. This opens the CancelPurchaseRequestDialog with a
              destructive red warning: "This action cannot be undone. The purchase request will be permanently cancelled."
            imageFileName: r0-s4-pr-cancel
            sequence: 0
          - instruction: >
              Fill in the Reason for Cancellation (textarea, required, non-empty) explaining why you are cancelling. Then type
              "CANCEL REQUEST" exactly in the confirmation text field. Both fields must be filled to enable the "Cancel Request" button
              (destructive red variant). Click "Keep Request" (outline variant) to abort.
            imageFileName: r0-s4-pr-cancel
            sequence: 1
          - instruction: >
              On confirmation, a CANCEL task is created with status COMPLETED and your cancellation reason as comments. The system
              invalidates queries for purchase-request, tasks, and tickets. A success toast confirms the cancellation. The PR status
              changes to CANCELLED.
            imageFileName: r0-s4-pr-cancel
            sequence: 2

      # --- GRN ---
      - title: Goods Received Note (GRN) - Receiving Delivered Items
        slug: grn-create
        module: Procurement
        sequence: 5
        steps:
          - instruction: >
              When a Purchase Order is approved and issued, a GRN task is created for the requester. Navigate to the ticket where
              the GRN task is ACTIVE. Click the task to open the GoodsReceivedNoteDialog.
            imageFileName: r0-s5-grn-create
            sequence: 0
          - instruction: >
              The GRN form contains: DO Reference Number (TextInput, required, min 1 character) for the Delivery Order reference,
              and Comments (TextAreaInput, optional) for any notes about the delivery.
            imageFileName: r0-s5-grn-create
            sequence: 1
          - instruction: >
              The Items Table is dynamically generated from the PO items. Fixed columns show: Item Name (read-only), Quantity Ordered
              (read-only), Already Delivered (read-only, grouped from previous GRNs), Quantity Received (NumberInput, max limited to
              orderedQty minus alreadyReceived), and UOM (read-only).
            imageFileName: r0-s5-grn-create
            sequence: 2
          - instruction: >
              If the PO is linked to a warehouse (orderData.warehouseId exists), two additional columns appear: Has Expiry (Checkbox)
              and Expiry Date (DatePicker, auto-set to today when Has Expiry is checked, required only if Has Expiry is true).
            imageFileName: r0-s5-grn-create
            sequence: 3
          - instruction: >
              Attachments section requires at least 1 file (when ticketId exists). Upload images of received items and/or the Delivery
              Order document using the TicketFileSelectInput. Files appear in SelectedFilesDisplay with individual remove buttons.
              The label reads "(Image of items and/or Delivery Order)".
            imageFileName: r0-s5-grn-create
            sequence: 4
          - instruction: >
              If the supplier cannot fulfill the order, click "Supplier Unable to Fulfill" (destructive button, visible only when a
              task is present). A confirmation AlertDialog appears requiring you to type "CONFIRM" exactly. On confirmation, the task
              is completed with appropriate status.
            imageFileName: r0-s5-grn-create
            sequence: 5
          - instruction: >
              Click "Preview Goods Received Note" to see the GRN preview before submission. On submit, the GRN is created and
              linked to the PO. If partial delivery, the PO status changes to PARTIAL-DELIVERY. If all items are fully received,
              status changes to DELIVERY-COMPLETED.
            imageFileName: r0-s5-grn-create
            sequence: 6

      # --- SRN ---
      - title: Services Received Note (SRN) - Evaluating Services
        slug: srn-create
        module: Procurement
        sequence: 6
        steps:
          - instruction: >
              For service-type POs, a Services Received Note task is created instead of a GRN. Navigate to the ticket and open the
              ServicesReceivedNoteDialog. The form includes DO Reference Number (TextInput, required) and Comments (TextAreaInput, optional).
            imageFileName: r0-s5-grn-create
            sequence: 0
          - instruction: >
              Select the Evaluation Type from 4 options: CONSULTANT, CONTRACTOR, SERVICE-PROVIDER, or SOLICITOR. Each type has
              different evaluation stage fields. If a previous SRN exists for this PO (hasExistingSrn=true), the evaluation type
              and timeline fields are locked with an info message "Evaluation Timeline Already Set".
            imageFileName: r0-s5-grn-create
            sequence: 1
          - instruction: >
              CONSULTANT evaluation stages: Post-Tender Stage (number), Implementation Stage (number), and Completion Stage (number).
              CONTRACTOR stages: Pre-Award Stage, Mobilization Stage, Implementation Stage Type (interval or milestones with
              sub-fields for interval number/type/repeats/startedOn or milestone entries), Completion Stage, and Defects Liability
              Period (number).
            imageFileName: r0-s5-grn-create
            sequence: 2
          - instruction: >
              SERVICE-PROVIDER stages: Pre-Award Stage, Initial Stage, Mid-Term Stage (with interval sub-fields: number,
              intervalType, repeats, startedOn), and Final Stage. SOLICITOR stages: Pre-Appointment Assessment, Mid-Engagement
              Evaluation, and Final Evaluation. All stage values are numeric scores.
            imageFileName: r0-s5-grn-create
            sequence: 3
          - instruction: >
              Upload attachments using TicketFileSelectInput with SelectedFilesDisplay. The SRN form auto-saves to IndexedDB
              every 2000ms via the srnDraftsService. The flow is: fill form, preview, submit, and see a success screen with a
              "Complete" button to close.
            imageFileName: r0-s5-grn-create
            sequence: 4

      # --- Invoice Upload ---
      - title: Invoice Upload - Submitting Vendor Invoices
        slug: invoice-upload
        module: Procurement
        sequence: 7
        steps:
          - instruction: >
              When a delivery is completed, an invoice submission task may be created. Open the InvoiceUploadDialog from the ticket.
              First, select the Purchase Order from the dropdown. Only POs with status APPROVED, ACCEPTED-BY-VENDOR, PARTIAL-DELIVERY,
              or DELIVERY-COMPLETED that do not already have an invoice are shown. Options display as
              "{referenceNumber} - RM {total} ({vendorName})".
            imageFileName: r0-s5-grn-create
            sequence: 0
          - instruction: >
              Fill in: Supplier Reference (TextInput, required, min 1 char), Invoice Amount (NumberInput, required, positive),
              Invoice Date (DatePicker, required), External Reference (TextInput, required, min 1 char), Payment Terms (SelectInput,
              default NET30, options: NET30, NET15, NET45, NET60, COD), and Due On (DatePicker, required).
            imageFileName: r0-s5-grn-create
            sequence: 1
          - instruction: >
              Upload the invoice document via TicketFileSelectInput (required, minimum 1 file when ticketId exists). Files appear
              in SelectedFilesDisplay with remove buttons. On submit, the invoice is created and linked to the PO. If a matching
              INVOICE SUBMISSION task exists, it is marked as COMPLETED. The PO status transitions to INVOICE-SUBMITTED.
            imageFileName: r0-s5-grn-create
            sequence: 2

  # ============================================================
  # ROLE 1: REQUESTING HOD (Head of Department / Division Head)
  # ============================================================
  - name: Requesting HOD (Head of Department)
    slug: requesting-hod
    description: >
      Department Heads or Division Heads who approve or return purchase requests from their team.
      They review the request details, attached documents, and budget justification before approving,
      declining, or returning with comments. This is the first approval gate in the procurement workflow.
    sequence: 1
    sections:
      # --- PR Approval ---
      - title: Purchase Request - Reviewing and Approving
        slug: pr-hod-review
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              When a requester submits a PR, you receive a notification and an APPROVE task becomes ACTIVE on the ticket.
              Open the PurchaseRequestReviewDialog which shows a 75/25 split layout: the left panel (3/4 width) displays
              the PR as a PDF document, and the right panel (1/4 width) shows attachments, referenced ticket info, and
              action buttons.
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              The right panel shows: Attachments section listing all files from the PR (using AttachmentPreview components,
              or "No attachments available" if empty), and Referenced Ticket section (if the PR has a referencedTicketId)
              displayed as a card with the Ticket Number (clickable link opening in new window) and Subject line.
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Three action buttons appear at the bottom of the right panel: Approve (green, Check icon) - marks the task as
              COMPLETED with completedOn timestamp, moving the PR to APPROVED status. Decline (red, X icon) - opens a "Reason
              for Rejecting" dialog with a required textarea. Return (outline, FileEdit icon) - opens a "Changes Requested"
              dialog with a required textarea (min 1 character to enable Send button).
            imageFileName: common-my-tasks
            sequence: 2
          - instruction: >
              If you click Decline, the rejection reason dialog appears. Enter the reason (required, min 1 char) and click
              "Send". The task status is set to REJECTED and the requester is notified. The PR status changes to CANCELLED.
            imageFileName: common-my-tasks
            sequence: 3
          - instruction: >
              If you click Return, the changes requested dialog appears. Enter your comments explaining what needs to change
              (required, min 1 char) and click "Send". The task status is set to CHANGES-REQUESTED. A new REVISE task is
              created for the requester with your comments attached. The PR stays in PENDING-APPROVAL status until resubmitted.
            imageFileName: common-my-tasks
            sequence: 4
          - instruction: >
              After approval, the PR status changes to APPROVED and a task is created for the Procurement department.
              The approval matrix for PRs is simple: Requestor submits, then Requesting HOD (department or division HOD)
              approves. Once approved, Procurement takes over.
            imageFileName: common-my-tasks
            sequence: 5

      # --- PO Approval ---
      - title: Purchase Order - Reviewing and Approving (HOD Tier)
        slug: po-hod-review
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              After Procurement HOD verifies a PO, the Requesting HOD receives an approval task. Open the
              PurchaseOrderReviewDialog which has 3 tabs: Purchase Request (PR document + attachments), RFQ and QA
              (RFQ information sub-tab + Quotation Analysis sub-tab, or Master Price Agreement cards if no QA), and
              Purchase Order (PO document + action sidebar).
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              On the Purchase Order tab, the left panel (3/5 width) shows the PO PDF document. The right panel (2/5 width)
              shows action buttons and PurchaseOrderSignatures component. The approval button label varies based on your
              role and the PO amount.
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Button label logic: If the PO total is below the Corporate HOD max amount, you see "Approve" (final approval
              at this tier). If the total exceeds your tier limit, you see "Recommend" (forwarding to the next approval tier).
              You can also click "Return" to send back with comments (opens RequestChangesDialog with required textarea).
            imageFileName: common-my-tasks
            sequence: 2
          - instruction: >
              Corporate approval tiers for HOD: PO amount 0-1,000 RM - HOD can approve directly. PO amount 1,001-5,000 RM -
              HOD recommends, routes to Procurement HOD. If your Division HOD is different from Department HOD, the system
              may create a GVP (Group Vice President) approval task before routing to GSVP.
            imageFileName: common-my-tasks
            sequence: 3

      # --- Approval Tracking ---
      - title: Approval Tracking - Monitoring Your Approvals
        slug: hod-approval-tracking
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              Navigate to Procurement > Approval Tracking to see all items pending your approval. The page has 5 tabs:
              All, Purchase Orders, Letter of Awards, QC Paper (Quotation Committee Paper), and TC Paper (Tender Committee
              Paper). Each tab filters by taskReferenceObject type. Only ACTIVE APPROVE tasks assigned to you are shown.
            imageFileName: r1-s2-hod-approval-tracking
            sequence: 0
          - instruction: >
              Filter by Assigned User (dropdown) to see approvals assigned to specific people. The table shows custom
              columns based on task type (ApprovalTrackingTaskColumn). Search by reference number. Pagination defaults
              to 40 items per page (max 100).
            imageFileName: r1-s2-hod-approval-tracking
            sequence: 1

  # ============================================================
  # ROLE 2: PROCUREMENT OFFICER
  # ============================================================
  - name: Procurement Officer
    slug: procurement-officer
    description: >
      Procurement staff responsible for processing approved purchase requests, creating RFQs, performing
      quotation analysis, issuing purchase orders, managing suppliers, and overseeing the full procurement
      lifecycle. This is the most feature-rich role with access to all procurement operational functions.
    sequence: 2
    sections:
      # --- PR Review & Sourcing ---
      - title: Purchase Request - Reviewing and Assigning Sourcing Type
        slug: po-pr-review
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              When a PR is approved by the HOD, a consultation task is created for Procurement. Open the
              ReviewPurchaseRequestDialog which shows a 60/40 split layout: left panel (3/5 width) displays the PR as a
              PDF document, right panel (2/5 width) shows sourcing type selection and action buttons.
            imageFileName: r2-s0-po-pr-review
            sequence: 0
          - instruction: >
              The right panel contains a Sourcing Type Card with a 2x2 button grid: "Non-Contract RFQ" (opens
              CreateSimpleRFQDialog for direct RFQ creation), "Contract RFQ" (opens CreateRFTOrRFQDialog with isTender=false
              for contractual RFQ), "RFP" (DISABLED - not yet implemented), and "RFT" (opens CreateRFTOrRFQDialog with
              isTender=true for Request for Tender).
            imageFileName: r2-s0-po-pr-review
            sequence: 1
          - instruction: >
              If the PR has a Referenced Ticket (referencedTicketId and referencedTicketRefNumber exist), a card is displayed
              showing the ticket number as a clickable link (opens in new window) and the ticket name if available.
            imageFileName: r2-s0-po-pr-review
            sequence: 2
          - instruction: >
              Bottom action buttons: "Split PR" opens the SplitPurchaseRequestDialog to divide items into multiple PRs.
              "Return" opens a Changes Requested dialog (textarea, min 1 char for Send button) which sets the task to
              CHANGES-REQUESTED status and creates a revision task for the requester.
            imageFileName: r2-s0-po-pr-review
            sequence: 3

      # --- Split PR ---
      - title: Purchase Request - Splitting a Request
        slug: po-split-pr
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              The SplitPurchaseRequestDialog shows a 2-column drag-and-drop grid. The original PR group (labeled "Current"
              with a green badge) shows on the left. Click "Add New PR" to create additional PR groups (labeled "New PR {n}"
              with gray badges). Each group is a card showing the group label, badge, item count, and a drop zone.
            imageFileName: r2-s1-po-split-pr
            sequence: 0
          - instruction: >
              Drag items between groups using the GripVertical handle on each item card. Items display their name,
              specification, quantity, and UOM. The drop zone shows "Drop items here" when empty. Items cannot be
              duplicated across groups. New PR groups can be deleted with the red trash icon (not available on the
              original group).
            imageFileName: r2-s1-po-split-pr
            sequence: 1
          - instruction: >
              The "Split Purchase Request" button is enabled only when at least one new PR group contains items (canSubmit
              validation). On submit, the system creates new PRs with the assigned items from each new group while keeping
              the remaining items in the original PR. A success toast confirms the split.
            imageFileName: r2-s1-po-split-pr
            sequence: 2

      # --- Create Simple RFQ (Non-Contract) ---
      - title: RFQ - Creating a Non-Contractual RFQ
        slug: po-create-simple-rfq
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              The CreateSimpleRFQDialog opens from the "Non-Contract RFQ" sourcing type button. It shows a scrollable table
              of unprocessed items from the PR with columns: Select (checkbox), Item, Specification, Quantity, UOM, and Action.
              A "Select all" checkbox in the header selects/deselects all items.
            imageFileName: r2-s0-po-pr-review
            sequence: 0
          - instruction: >
              For each item row: if an itemId is assigned, the item cell shows the catalog name + badge (itemCode) with
              "Re-assign Item Code" and "Input Item Manually" buttons. If no itemId, a TextInput for name appears with an
              "Assign Item Code" button. The Specification column uses TextAreaInput (max MEDIUM_TEXT_INPUT_MAX_LENGTH).
              Quantity uses NumberInput and UOM uses SelectInput with PROCUREMENT_UOM_OPTIONS.
            imageFileName: r2-s0-po-pr-review
            sequence: 1
          - instruction: >
              If an item has active Material Price Agreements (MPA), a green "Price Agreement" badge with info icon appears.
              Hovering/clicking shows a popover with: Vendor Name, Reference Number, Unit Price, Effective Unit Price, UOM,
              External Reference (if exists), and Scope (specific projects/departments or "All Projects and Departments").
            imageFileName: r2-s0-po-pr-review
            sequence: 2
          - instruction: >
              Two action buttons at the top right: "Create PO" (validates all selected items have price agreements and the
              scope covers the requesting department - opens IssuePODialog) and "Create RFQ" (validates all selected items
              have itemId assigned - opens CreateRFQDialog). Validation failures show toast messages explaining what is missing.
            imageFileName: r2-s0-po-pr-review
            sequence: 3

      # --- Create RFQ ---
      - title: RFQ - Creating and Sending an RFQ to Suppliers
        slug: po-create-rfq
        module: Procurement
        sequence: 3
        steps:
          - instruction: >
              The CreateRFQDialog shows a 2-column layout: left side (2/3 width) displays a live RFQ document preview, and
              right side (1/3 width) shows the form fields and supplier selection.
            imageFileName: r2-s0-po-pr-review
            sequence: 0
          - instruction: >
              Form fields: Quotation Closing Date (DatePicker, required, minimum 2 days before today, default 5 business days
              from today). Additional Attachments (TicketFileSelectInput) for supplementary documents.
            imageFileName: r2-s0-po-pr-review
            sequence: 1
          - instruction: >
              Suppliers to Invite card: Click "Select Suppliers" (shown when no suppliers selected) to open the
              SelectMultipleSupplierDialog. Selected suppliers appear as a numbered scrollable list (max-h-40). Click the
              "Edit" button (visible when suppliers are already selected) to modify the selection.
            imageFileName: r2-s0-po-pr-review
            sequence: 2
          - instruction: >
              Click "Create RFQ" (top-right, disabled if creating OR no suppliers selected OR no items). On submit,
              the system creates the RFQ with adminId, validUntil date, requestId, minimumQuotes=3, items, fileIds, and
              vendorIds. A success toast appears with a "View RFQ" navigation link. The reference number format is
              K1-RFQ-{yyMMdd}-{ref}. The RFQ enters ACTIVE status.
            imageFileName: r2-s0-po-pr-review
            sequence: 3

      # --- RFQ Management ---
      - title: RFQ - Managing Sent RFQs
        slug: po-manage-rfqs
        module: Procurement
        sequence: 4
        steps:
          - instruction: >
              Navigate to Procurement > Sent RFQs. The page has 3 main tabs: "Non Contractual RFQ" (with sub-tabs
              Unprocessed/Processed/Cancelled), "Contractual RFQ" (with sub-tabs Active/Closed), and "RFT" (with sub-tabs
              Active/Closed).
            imageFileName: r2-s0-po-pr-review
            sequence: 0
          - instruction: >
              URL search parameters control the view: pageNumber (default 1), perPage (default 40, max 100), mainTab
              (non-contractual/contractual/rft), subTab (active/closed/parallel), rfqId (optional direct navigation),
              sort (validUntil/requestedOn/invitationToBidEndOn/id), and order (asc/desc).
            imageFileName: r2-s0-po-pr-review
            sequence: 1
          - instruction: >
              Non-Contractual RFQ tab uses AdminRFQColumns table with filter columns for Procurement officer and Closing
              date. Sort defaults to validUntil ascending. Sub-tab status mapping: Unprocessed=ACTIVE, Processed=PROCESSED,
              Cancelled=CANCELLED.
            imageFileName: r2-s0-po-pr-review
            sequence: 2
          - instruction: >
              Contractual RFQ and RFT tabs use TenderColumns table with sort options "Bid Closing Date", "Requested On",
              and "RFQ ID"/"RFT ID". Filter columns for Department and Bid closing date. An order toggle button switches
              between "Ascending" and "Descending" with ArrowUpDown icon.
            imageFileName: r2-s0-po-pr-review
            sequence: 3

      # --- Extend RFQ Validity ---
      - title: RFQ - Extending Validity Period
        slug: po-extend-rfq
        module: Procurement
        sequence: 5
        steps:
          - instruction: >
              Open the ExtendRFQValidityPeriodDialog from an RFQ detail view. The header shows a Clock icon with
              "Change RFQ Validity Date {rfq.referenceNumber}". A table displays Currently Invited & Submitted Suppliers
              with columns: Supplier Name and Status (green "Submitted" badge if quotation exists, yellow "Invited (Pending)"
              if no quotation).
            imageFileName: r2-s0-po-pr-review
            sequence: 0
          - instruction: >
              The form contains: New Quotation Closing Date (DatePicker, must be in future, defaults to current validUntil
              date). Click "Change RFQ Closing Date" to update (disabled while pending). On submit, the RFQ validUntil is
              updated and a LOG task is created recording the date change. Success toast: "RFQ Validity Date changed
              successfully!"
            imageFileName: r2-s0-po-pr-review
            sequence: 1

      # --- Invite Additional Suppliers ---
      - title: RFQ - Inviting Additional Suppliers
        slug: po-invite-suppliers
        module: Procurement
        sequence: 6
        steps:
          - instruction: >
              Open the InviteOtherSuppliersDialog from an RFQ detail. The header shows a Users icon with "Invite Additional
              Suppliers - RFQ {rfq.referenceNumber}". The Currently Invited & Submitted Suppliers table shows existing
              suppliers with their submission status (green "Submitted" or yellow "Invited (Pending)").
            imageFileName: r2-s0-po-pr-review
            sequence: 0
          - instruction: >
              Under "Additional Suppliers to Invite", click "Search for suppliers" (when empty) or the Edit icon button
              (when suppliers are selected) to open SelectMultipleSupplierDialog. Selected suppliers appear as a numbered
              scrollable list (max-h-32).
            imageFileName: r2-s0-po-pr-review
            sequence: 1
          - instruction: >
              Click "Invite {count} Additional Supplier(s)" (disabled if no new suppliers selected). On submit, the
              inviteSuppliersMutation sends additionalVendorIds. The form resets, a success toast confirms, and the
              onSubmit callback executes.
            imageFileName: r2-s0-po-pr-review
            sequence: 2

      # --- Quotation Analysis ---
      - title: Quotation Analysis - Comparing and Selecting Vendors
        slug: po-quotation-analysis
        module: Procurement
        sequence: 7
        steps:
          - instruction: >
              Navigate to the Quotation Analysis page (route: procurement/quotation-analysis) with the RFQ ID parameter.
              The page loads all quotations for the RFQ and displays a complex comparison table. The main state tracks:
              selectedQuotationItems, comments, justifications, descriptions, and additionalPOVendors.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 0
          - instruction: >
              The ScrollableQuotationTable displays vendor columns side by side. Each vendor column shows: quotation items
              with prices, financial summary (discount, delivery charges, additional charges, tax, total), payment terms,
              delivery period, and terms & conditions. The vendor with the lowest total gets a "Best Price" badge (orange).
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 1
          - instruction: >
              For each item row per vendor, you can set: Quantity to Award (NumberInput, clamped to 0 through supplierQuantity)
              and Period to Award (NumberInput, visible only if item.period exists and quantity > 0). Selecting a quantity
              adds the item to selectedQuotationItems.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 2
          - instruction: >
              Additional PO vendors can be added: click "Create Additional PO" on a vendor column to add them to the
              additionalPOVendors set (purple background with "New Additional PO" badge). Click "Cancel Additional PO" to
              reverse. Existing POs with editable statuses (PENDING-APPROVAL or CANCELLED) show a "View Current PO" button
              (Eye icon).
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 3
          - instruction: >
              Below the item rows, per-vendor fields appear for selected vendors: Additional Terms in PO (TextAreaInput,
              comments, max LARGE_TEXT_INPUT_MAX_LENGTH), Justification for Selection (TextAreaInput, required for selected
              vendors), and Description (TextAreaInput, optional).
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 4
          - instruction: >
              Auto-save runs every 2000ms via useContinuousAutoSave, storing selectedQuotationItems, comments,
              justifications, and descriptions to the quotationAnalysisDraftsService (IndexedDB). Drafts are validated
              against current quotations on load, removing stale items. In edit mode (qaId provided), existing QA data
              and current POs are pre-loaded.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 5
          - instruction: >
              The "Link to Contract" button opens SelectContractDialog to associate a contract with the QA. A selected
              contract shows its details in a card with an X button to remove. The "Download Draft QA" button exports the
              current analysis to Excel using the exportQADraftToExcel helper function.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 6
          - instruction: >
              Click "Preview Purchase Orders" to validate selections and trigger the PO preview. The system validates that
              all required fields are populated. The preview opens the PurchaseOrderPreviewDialog. On final submission, the
              QA is created with reference K1-QA-{yyMMdd}-{ref}, and POs are generated for each selected vendor.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 7

      # --- Direct Award ---
      - title: Direct Award - Awarding Without Competitive Bidding
        slug: po-direct-award
        module: Procurement
        sequence: 8
        steps:
          - instruction: >
              The DirectAwardDialog opens from the RFQ detail when awarding directly to a single vendor. It shows a
              2-column layout: left (1/2 width) shows the PO Preview with calculated totals (subtotal, tax, delivery,
              discount, total), right (1/2 width) shows item quantities and direct award information.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 0
          - instruction: >
              Right column - Item Quantities Card: Each quotation item shows the item name, supplier item name (if different),
              price per unit (formatted currency), and an editable Quantity field (NumberInput, min=0, step=0.01). The PO
              preview updates live as quantities change.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 1
          - instruction: >
              Right column - Direct Award Information Card: Justification (Textarea, required, placeholder "Please provide
              the reason for direct award...") with helper text "Explain why this supplier is being awarded directly without
              competitive bidding". Description (Textarea, optional) for additional PO context.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 2
          - instruction: >
              Click "Create Purchase Order" (disabled if creating OR justification is empty OR quotation data still loading).
              On submit, items are separated into requestedItems (with requestForQuotationItemId) and additionalItems.
              A success toast with "View Purchase Orders" link appears. Navigation redirects to /procurement/purchase-orders.
            imageFileName: r2-s7-po-quotation-analysis
            sequence: 3

      # --- Issue PO ---
      - title: Purchase Order - Issuing from Price Agreements
        slug: po-issue-po
        module: Procurement
        sequence: 9
        steps:
          - instruction: >
              The IssuePODialog opens from CreateSimpleRFQDialog when items have matching price agreements. It shows a
              two-column layout: left panel is a vendor selection card list, right panel shows the PO form and items.
              Vendors are grouped by their price agreement vendor, displaying item count and selected count. The selected
              vendor has a blue background highlight.
            imageFileName: r2-s9-po-issue-po
            sequence: 0
          - instruction: >
              For each vendor, items are shown in VendorItemCards with editable Quantity fields (NumberInput, max limited
              to item.quantity, type-clamped). A Contract section shows the selected contract details (name, department,
              period) with a "Link to Contract" button to open SelectContractDialog, and an X button to remove the contract.
            imageFileName: r2-s9-po-issue-po
            sequence: 1
          - instruction: >
              Description field (TextAreaInput, optional, label "Purchase Order Description (Optional)") adds context to
              the PO. Click "Preview" (validates at least one item has selectedQuantity > 0) to open POPreviewDialog showing
              vendor information, items list, and summary (Subtotal, Tax, Total).
            imageFileName: r2-s9-po-issue-po
            sequence: 2
          - instruction: >
              In the preview, click "Create Purchase Order" to submit or "Back to Edit" to return. On creation, the PO
              is generated with reference K1-PO-{yyMMdd}-{ref} and enters PENDING-APPROVAL status. The system routes
              it to the appropriate approval tier based on the total amount.
            imageFileName: r2-s9-po-issue-po
            sequence: 3

      # --- PO Management ---
      - title: Purchase Orders - Managing and Tracking
        slug: po-management
        module: Procurement
        sequence: 10
        steps:
          - instruction: >
              Navigate to Procurement > Purchase Orders. The page has 4 tabs: Pending Approval (PENDING-APPROVAL status),
              Approved & Issued (PARTIAL-DELIVERY, APPROVED, ACCEPTED-BY-VENDOR statuses), Delivered (DELIVERY-COMPLETED),
              and Rejected (CANCELLED).
            imageFileName: r2-s10-po-management
            sequence: 0
          - instruction: >
              Filter controls: Procurement Officer (dropdown), Requesting Department (dropdown), Vendor (dropdown),
              Amount range (number inputs for min/max), and Issued On (date range picker). Search accepts PO reference
              numbers or item names. Pagination defaults to 40 per page (max 100).
            imageFileName: r2-s10-po-management
            sequence: 1
          - instruction: >
              Table columns: PO ID (sortable by id), Issued On / Drafted On (sortable, header changes based on draft
              status), Vendor (truncated name), Req. Dept. (requesting department), Items (up to 3 with "..." for more),
              Amount (RM) (formatted number with green badge), and Actions (View PO button + Ticket button if ticketId exists).
            imageFileName: r2-s10-po-management
            sequence: 2

      # --- Quotations View ---
      - title: Quotations - Viewing Submitted Quotations
        slug: po-quotations
        module: Procurement
        sequence: 11
        steps:
          - instruction: >
              Navigate to Procurement > Quotations. This is a single-view page (no tabs) showing quotations with
              PENDING status. Filter by Vendor (dropdown) and Created On (date range). Search by reference, vendor name,
              or item name. Pagination defaults to 40 per page (max 100).
            imageFileName: r2-s11-po-quotations
            sequence: 0
          - instruction: >
              Table columns: Quotation ID (sortable), Vendor (truncated), Items (up to 3 with "..."), Created On
              (sortable, formatted date), and Actions (View button + Ticket button if ticketId exists). Click View to
              open the quotation detail dialog.
            imageFileName: r2-s11-po-quotations
            sequence: 1

      # --- LOA Management ---
      - title: Letter of Awards - Managing LOAs
        slug: po-loa-management
        module: Procurement
        sequence: 12
        steps:
          - instruction: >
              Navigate to Procurement > Letter of Awards. The page has 3 main tabs: Draft LOAs (DRAFT status), Approved LOAs
              (APPROVED status), and Signed by Vendor (VENDOR-SIGNED status). The Approved and Signed tabs each have 5
              sub-tabs for contract date filtering.
            imageFileName: r2-s12-po-loa-management
            sequence: 0
          - instruction: >
              Contract date sub-tabs: Not Set (both contractStartDate and contractEndDate are null), Not Started
              (contractStartDate >= tomorrow), Active (contractStartDate <= yesterday AND contractEndDate >= tomorrow),
              Expiring Soon (contractEndDate between today and +30 days), and Expired (contractEndDate <= yesterday).
            imageFileName: r2-s12-po-loa-management
            sequence: 1
          - instruction: >
              Filter controls: Procurement Officer, Requesting Department, Vendor, and Issued On (date range). Table
              columns: LOA ID (sortable), Vendor (truncated), Admin (procurement officer), Reference (external reference
              or '-'), Amount (RM) (formatted or '-'), Type (badge: "Express LOA" vs "Standard LOA"), Issued On (sortable),
              and conditionally Contract Period (start - end date, or '?' if missing). Actions include View LOA and
              Ticket link buttons.
            imageFileName: r2-s12-po-loa-management
            sequence: 2

      # --- Listings ---
      - title: Listings - Consolidated PR/PO/LOA View
        slug: po-listings
        module: Procurement
        sequence: 13
        steps:
          - instruction: >
              Navigate to Procurement > Listings for a unified view. Three tabs: Purchase Requests (APPROVED, PROCESSING,
              COMPLETED statuses), Purchase Orders (all statuses), and Letter of Awards (APPROVED, VENDOR-SIGNED statuses).
              Each tab shows the same columns and filters as the dedicated pages but in a single consolidated interface.
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- Supplier Management ---
      - title: Supplier Management - Managing Vendor Accounts
        slug: po-supplier-mgmt
        module: Procurement
        sequence: 14
        steps:
          - instruction: >
              Navigate to Procurement > Supplier Management. The page has 6 tabs with count badges: Approved (APPROVED
              status), Newly Registered (REGISTERED status), Under Review (UNDER-REVIEW status), Unregistered (DB-SEEDED
              status), Not Approved (NOT-APPROVED status), and Missing Email (faultyEmail=true filter).
            imageFileName: r2-s15-po-supplier-mgmt
            sequence: 0
          - instruction: >
              Standard tabs show a Business Category filter (dropdown). The Under Review tab has additional filters:
              Business Category, Pending Vendor Updates (boolean toggle), and Pending Review (dropdown with options:
              PROCUREMENT, FINANCE, TECHNICAL, PROCUREMENT-RECOMMENDATION, CHAIRMAN-REVIEW) to track where in the
              evaluation process each vendor stands.
            imageFileName: r2-s15-po-supplier-mgmt
            sequence: 1
          - instruction: >
              To create an adhoc (unregistered) supplier, click the "Create Adhoc Supplier" button (top right). The
              dialog form requires Company Name (required) and Email (required, valid email format). On the Newly
              Registered tab, a "Begin Registration Evaluation" button starts the formal vendor review process.
            imageFileName: r2-s15-po-supplier-mgmt
            sequence: 2
          - instruction: >
              Click a supplier row to open the Supplier Info Modal showing full vendor details. The vendor evaluation
              workflow progresses through: REGISTERED (vendor completes registration) -> UNDER-REVIEW (procurement begins
              evaluation) -> review stages (PROCUREMENT, FINANCE, TECHNICAL, PROCUREMENT-RECOMMENDATION, CHAIRMAN-REVIEW)
              -> APPROVED or NOT-APPROVED.
            imageFileName: r2-s15-po-supplier-mgmt
            sequence: 3

      # --- Item Management ---
      - title: Item Management - Managing the Item Catalog
        slug: po-item-mgmt
        module: Procurement
        sequence: 15
        steps:
          - instruction: >
              Navigate to Procurement > Item Management. This is a single-view page with 4 cascading category filters:
              Main Category, Group Category, Subgroup One Category, and Subgroup Two Category (each displayed as
              "code: name" format). Selecting a parent category filters the child options.
            imageFileName: r2-s16-po-item-mgmt
            sequence: 0
          - instruction: >
              The table uses ItemColumns with role-based rendering. Two action buttons at the top right: "Create New Item"
              and "Add Categories". Items can be edited and deleted from the table row actions.
            imageFileName: r2-s16-po-item-mgmt
            sequence: 1
          - instruction: >
              Before deleting an item, a validation dialog shows the count of Requested Items and Assets that reference
              the item. If either count is > 0, deletion is blocked with a warning. This prevents orphaning references
              in active purchase requests or asset records.
            imageFileName: r2-s16-po-item-mgmt
            sequence: 2

      # --- Price Agreements ---
      - title: Material Price Agreements (MPA) - Managing Vendor Pricing
        slug: po-price-agreements
        module: Procurement
        sequence: 16
        steps:
          - instruction: >
              Navigate to Procurement > Price Agreements. The page has 3 tabs with icons: By Vendor (Building2 icon),
              By Item (Package icon), and Historical Pricing (History icon). Each tab has Active/Expired status sub-filters.
              A "Create Agreement" button (Plus icon) opens the MaterialPriceAgreementCreateDialog.
            imageFileName: r2-s17-po-price-agreements
            sequence: 0
          - instruction: >
              The MPA create form fields: Vendor (SelectInputWithSearch, required, name-based search), Item
              (SelectInputWithSearch, required, name-based search), Department/Project Scope (MultiSelectDropdown,
              optional - defaults to "All Projects and Departments"), Unit Price (TextInput number format, required,
              minimum 0.01), Tax Rate (SelectInput, options: 0%, 5%, 6%, 7%, 8%, 10%).
            imageFileName: r2-s17-po-price-agreements
            sequence: 1
          - instruction: >
              Additional MPA fields: UOM (SelectInput from PROCUREMENT_UOM_OPTIONS), Payment Terms (SelectInput, options:
              COD, NET 7, NET 30, NET 60, NET 90, OTHERS), Agreement Effective On (DatePicker, required), Agreement
              Expires On (DatePicker, required), External Agreement Reference Number (TextInput, optional), and
              Supporting Files (FileSelectInput, required, minimum 1 file).
            imageFileName: r2-s17-po-price-agreements
            sequence: 2
          - instruction: >
              Click a price agreement row to open the MPAViewAndModifyDialog for viewing details or making modifications.
              MPAs can be linked to POs - when a PO is created from items with active price agreements, the MPA reference
              is recorded on the PO items.
            imageFileName: r2-s17-po-price-agreements
            sequence: 3

      # --- Templates ---
      - title: Templates - Managing Clause and TnC Templates
        slug: po-templates
        module: Procurement
        sequence: 17
        steps:
          - instruction: >
              Navigate to Procurement > Templates. Three tabs: LOA Clauses (type: LOA), Quotation TnC Templates
              (type: QUOTATION), and Tender TnC Templates (type: TENDER). Each tab shows a card with title, description,
              and a "Create Template" button (Plus icon).
            imageFileName: r2-s18-po-templates
            sequence: 0
          - instruction: >
              The table uses loaClauseTemplateColumns with an onView callback. Click a template to open the
              LOAClauseTemplateViewDialog. Create new templates via LOAClauseTemplateCreateDialog. Templates are used
              when generating LOA documents, quotation terms, and tender terms and conditions.
            imageFileName: r2-s18-po-templates
            sequence: 1

      # --- Contracts ---
      - title: Contracts - Managing Vendor Contracts
        slug: po-contracts
        module: Procurement
        sequence: 18
        steps:
          - instruction: >
              Navigate to Procurement > Contracts. The page delegates to the ContractsTable component with dynamic status
              filtering, search, and pagination (default 10 per page). A Create button is enabled (showCreateButton=true).
              Description: "Manage contracts with contractors, track expiry dates, and link purchase orders and letter of
              awards."
            imageFileName: r2-s19-po-contracts
            sequence: 0

      # --- Officer Report ---
      - title: Officer Report - Monitoring Procurement Workload
        slug: po-officer-report
        module: Procurement
        sequence: 19
        steps:
          - instruction: >
              Navigate to Procurement > Officer Report. Two main tabs: Purchase Requests and Request For Quotations.
              If you are a HOD, an officer filter dropdown appears with "All Officers" (default) and individual officer
              names. Non-HOD users see only their own data.
            imageFileName: r2-s20-po-officer-report
            sequence: 0
          - instruction: >
              Purchase Requests tab shows 6 clickable stat cards: "New (Today)" (approved today, ShoppingBasket icon),
              "New (< 2 days)" (approved within 2 days), "New (> 2 days)" (approved more than 2 days ago), "Ongoing
              (< 5 days)" (processing less than 5 days, Clock icon), "Ongoing (> 5 days)" (processing more than 5 days),
              and "Completed" (awarded, CheckCircle2 icon). Click a card to filter the table below.
            imageFileName: r2-s20-po-officer-report
            sequence: 1
          - instruction: >
              The PR data table shows columns: Request Ref. (160px), Requester (200px, dept + first name), Items (up to 3),
              Date Column (150px, dynamic header based on filter - Approved/Processed/Awarded Date, with badge showing days
              elapsed and formatted date), Urgency (100px badge), Officer (120px), and Actions (200px - View, Reassign if
              not awarded and user is procurement officer, Ticket link).
            imageFileName: r2-s20-po-officer-report
            sequence: 2
          - instruction: >
              RFQ tab shows 4 clickable stat cards: "Active RFQs" (ACTIVE status, validUntil >= today end, Activity icon),
              "Closing Today" (validUntil between today start and end, CalendarX icon), "Closed (< 5 days)" (validUntil
              between 5 days ago and yesterday, CalendarCheck icon), and "Closed (> 5 days)" (validUntil <= 5 days ago).
            imageFileName: r2-s20-po-officer-report
            sequence: 3
          - instruction: >
              The RFQ data table columns: RFQ ID (160px), Administrator (120px), Items (up to 3), Closing Date (120px),
              Quotes (100px badge with color coding: green if quotations/minimumQuotes >= 100%, yellow if 50-99%, red
              if < 50%), and Actions (View RFQ + Ticket buttons with text labels).
            imageFileName: r2-s20-po-officer-report
            sequence: 4

      # --- Reports ---
      - title: Reports - Procurement Analytics and Reporting
        slug: po-reports
        module: Procurement
        sequence: 20
        steps:
          - instruction: >
              Navigate to Procurement > Reports. Six tabs: Purchase Order, Purchase Request, Vendor Evaluation,
              Procurement Cycle, Item, and Executive Procurement (default tab). The page delegates to the
              CorporateSpendingReport component which handles all report visualizations and data.
            imageFileName: r2-s21-po-reports
            sequence: 0

  # ============================================================
  # ROLE 3: PROCUREMENT HOD (Head of Procurement Department)
  # ============================================================
  - name: Procurement HOD
    slug: procurement-hod
    description: >
      Head of the Procurement department responsible for verifying purchase orders before they proceed to
      higher-level approvals. Also reviews tender submissions and acts as the second approval gate in the
      procurement workflow. Button label shows "Verify" for PO reviews.
    sequence: 3
    sections:
      - title: Purchase Order - Verification
        slug: proc-hod-po-verify
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              When a PO is submitted by a Procurement Officer, it first routes to the Procurement HOD for verification.
              Open the PurchaseOrderReviewDialog. The 3-tab layout shows PR details (tab 1), RFQ and QA details (tab 2),
              and the PO document with action buttons (tab 3). Your approval button label shows as "Verify".
            imageFileName: r3-s0-proc-hod-po-verify
            sequence: 0
          - instruction: >
              On the Purchase Order tab, review the PO document (left 3/5), then use the right panel (2/5) buttons.
              Click "Verify" to approve and route to the next tier. Click "Return" to send back with comments via
              RequestChangesDialog (required textarea, min 1 char). Returning sets the task to CHANGES-REQUESTED and
              creates an UPDATE submission task for the officer, invalidating all active approval tasks.
            imageFileName: r3-s0-proc-hod-po-verify
            sequence: 1
          - instruction: >
              After verification, the PO routes to the Requesting HOD for approval. Corporate tier: amounts 1,001-5,000 RM
              are final at Procurement HOD level. Development tier: amounts 501-10,000 RM are final at this level.
              Above these thresholds, the PO continues up the approval chain.
            imageFileName: r3-s0-proc-hod-po-verify
            sequence: 2

      - title: Tender - Procurement HOD Review
        slug: proc-hod-tender-review
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              For tender submissions, Procurement HOD reviews after the Requesting HOD approval. The review determines
              the next routing: if the tender is a Quotation (isQuotation=true), the Procurement HOD review directly
              triggers handleCallForTenderApproved (setting status to PRETENDER-APPROVED). If it is a full RFT, the
              system creates a Budget Officer verification task.
            imageFileName: r3-s1-proc-hod-tender-review
            sequence: 0
          - instruction: >
              The Procurement HOD can approve (routing to budget verification or direct approval) or return with
              changes. Returning creates a SUBMISSION task for the officer and clears any queued verification tasks.
            imageFileName: r3-s1-proc-hod-tender-review
            sequence: 1

  # ============================================================
  # ROLE 4: GSVP / GVP (Group Senior Vice President / Group Vice President)
  # ============================================================
  - name: GSVP / GVP (Group Senior Vice President)
    slug: gsvp
    description: >
      Senior management approver for purchase orders above Procurement HOD limits and below Quotation
      Committee thresholds. Corporate GSVP handles amounts 5,001-50,000 RM. Development GSVP handles
      amounts 10,001-50,000 RM. GVP (Group Vice President) may be involved when the requester's
      Division HOD differs from Department HOD.
    sequence: 4
    sections:
      - title: Purchase Order - GSVP/GVP Approval
        slug: gsvp-po-approval
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              After the Requesting HOD recommends a PO that exceeds their tier limit, it routes to GSVP. If the
              requester has a separate Division HOD (divisionHodId exists and differs from departmentHodId), a GVP
              task is created first. The GVP approval then routes to GSVP.
            imageFileName: r4-s0-gsvp-po-approval
            sequence: 0
          - instruction: >
              Open the PurchaseOrderReviewDialog with 3 tabs. Review the full audit trail: PR details, RFQ/QA comparison,
              and the PO document. Your button label varies: for Development subsidiaries, the label follows the
              Development approval matrix. For Corporate, it follows the Corporate matrix.
            imageFileName: r4-s0-gsvp-po-approval
            sequence: 1
          - instruction: >
              Corporate tier: amounts 5,001-50,000 RM - GSVP can approve directly. Above 50,000 RM - routes to
              Quotation Committee (QC). Development tier: amounts 10,001-50,000 RM - GSVP approves. Above 50,000 RM -
              routes to QC. You can also "Return" with comments to send back for changes.
            imageFileName: r4-s0-gsvp-po-approval
            sequence: 2

      - title: Tender - GSVP/GVP Review
        slug: gsvp-tender-review
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              For tenders, after budget verification by the Finance HOD, the system routes to GVP (Development) or
              GSVP (Corporate) based on the subsidiary type. The GSVP/GVP reviews the tender details and approves or
              returns. After GSVP/GVP approval, the system creates a CEO approval task (if no existing ACTIVE CEO task).
            imageFileName: r4-s1-gsvp-tender-review
            sequence: 0

  # ============================================================
  # ROLE 5: QUOTATION COMMITTEE (QC)
  # ============================================================
  - name: Quotation Committee (QC)
    slug: quotation-committee
    description: >
      Committee-based approval for purchase orders in the Corporate 50,001-250,000 RM tier and Development
      50,001-500,000 RM tier. The QC process involves three stages: QC Secretary review, QC Committee Member
      review (minimum 2 of 3 members must approve), and QC Chairman final approval. Members use "Endorse"
      as their button label.
    sequence: 5
    sections:
      - title: QC - Secretary Review
        slug: qc-secretary-review
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              The QC Secretary receives the first task in the committee approval flow. They review the PO documentation
              including PR, RFQ/QA, and the PO itself via the PurchaseOrderReviewDialog. The Secretary verifies
              completeness and accuracy before routing to committee members.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 0
          - instruction: >
              On approval, the system creates QC Committee Review tasks for 3 committee members simultaneously. The
              Secretary can also return the PO with comments. The QC Secretary can add QC Comments via the
              QCCommentsDialog (optional textarea) which are auto-posted to the ticket if provided.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 1

      - title: QC - Committee Member Review
        slug: qc-member-review
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              Three QC Committee members receive parallel approval tasks. Each member reviews independently using the
              PurchaseOrderReviewDialog. Their button label shows as "Endorse". On the QC task, an additional QC Comments
              section appears where existing QC comments are displayed.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 0
          - instruction: >
              The system tracks committee member approvals. When minimum 2 out of 3 members have endorsed (threshold met),
              the system automatically creates the QC Chairman task. The remaining member's task is not invalidated but
              becomes informational.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 1

      - title: QC - Chairman Final Approval
        slug: qc-chairman-approval
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              The QC Chairman receives the final approval task after minimum committee endorsement. They review all prior
              endorsements and comments. The Chairman can approve (completing the QC tier) or return with comments.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 0
          - instruction: >
              On Chairman approval: if the PO total is within the QC tier limit (Corporate 250,000 RM / Development
              500,000 RM), the PO is fully approved and handlePOApproved is triggered. If the total exceeds QC limits,
              the system routes to the CEO for final approval.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 1

      - title: Quotation Committee Paper - Submission and Review
        slug: qc-paper
        module: Procurement
        sequence: 3
        steps:
          - instruction: >
              For tenders, the QC/TC Paper captures the committee's evaluation. The TenderCommitteePaperFormDialog is
              a complex 2-column form: left shows a live document preview, right shows the form fields. Mode can be
              "create" or "update".
            imageFileName: r5-s0-qc-secretary-review
            sequence: 0
          - instruction: >
              Form fields: Project Introduction (TextAreaInput, required), Scope Justification (TextAreaInput, required),
              Objectives (dynamic TextInput array, min 1, with Add/Remove buttons), Require Recall (Checkbox for quotation
              recall), Recommended Bid IDs (multi-select, conditional), and Recommendation Reason (TextAreaInput, required
              if recall is not checked).
            imageFileName: r5-s0-qc-secretary-review
            sequence: 1
          - instruction: >
              Additional fields: Bid Summaries (TextAreaInput array, one per bid submission), Bid Comparison files
              (FileUpload for analysis documents), Final Summary (TextAreaInput), and Override Quotation toggle (only
              shown if mixed bid amounts - some above and some below QC threshold).
            imageFileName: r5-s0-qc-secretary-review
            sequence: 2
          - instruction: >
              Auto-save features: Backend draft saved to tenderUpdatePendingApproval.tcQcPaperDraft, IndexedDB fallback
              via tenderCommitteePaperDraftsService, keyboard shortcut Cmd+S (Mac) / Ctrl+S (Windows), auto-save on
              window blur, visibility change, and beforeunload events. A "Save Progress" button enables manual saves.
              Last saved indicator shows "X minutes ago".
            imageFileName: r5-s0-qc-secretary-review
            sequence: 3
          - instruction: >
              On submit: if a taskId exists, the task status is set to COMPLETED. Otherwise, the tender is updated
              directly. The system determines isQuotation based on bid amounts vs QC threshold. Success clears drafts
              from both backend and IndexedDB.
            imageFileName: r5-s0-qc-secretary-review
            sequence: 4

  # ============================================================
  # ROLE 6: CEO (Chief Executive Officer)
  # ============================================================
  - name: CEO (Chief Executive Officer)
    slug: ceo
    description: >
      Final approval authority for purchase orders in the Corporate 250,001-500,000 RM tier and Development
      500,001-1,000,000 RM tier. Also the final approval for tender call-for-tender submissions. Amounts
      exceeding CEO limits are routed to the Board of Directors (BOD). Subsidiary-specific limits apply:
      KKIP Utilities and KKIP Mega Aerospace have their own CEO maximum values.
    sequence: 6
    sections:
      - title: Purchase Order - CEO Approval
        slug: ceo-po-approval
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              POs exceeding the QC tier limit route to the CEO. Open the PurchaseOrderReviewDialog and review all
              3 tabs. The CEO validates the total does not exceed their tier limit. Corporate max: 500,000 RM.
              Development max: 1,000,000 RM. Subsidiary overrides apply for KKIP Utilities
              (MAX_VALUE_KKIP_UTILITIES_CEO_PO_APPROVAL) and KKIP Mega Aerospace (MAX_VALUE_KKIP_MEGA_CEO_PO_APPROVAL).
            imageFileName: r4-s0-gsvp-po-approval
            sequence: 0
          - instruction: >
              If the PO total is within CEO limits, approval triggers handlePOApproved (sets issuedOn, creates GRN task,
              updates item pricing history, sends notifications). If above CEO limits, the system routes to BOD.
              The CEO can also return with comments to send back for revisions.
            imageFileName: r4-s0-gsvp-po-approval
            sequence: 1

      - title: Tender - CEO Approval
        slug: ceo-tender-approval
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              For tenders, the CEO is the final approval step in the call-for-tender chain (step 6 of 6 in the
              approval matrix). After GSVP/GVP review, the CEO task is created (only if no existing ACTIVE CEO task).
              On approval, handleCallForTenderApproved is triggered: status changes to PRETENDER-APPROVED, ITB clause
              submission is initiated, and for OPEN tenders, a TENDER-ADVERTISEMENT submission task is created.
            imageFileName: r4-s1-gsvp-tender-review
            sequence: 0

  # ============================================================
  # ROLE 7: BUDGET & FINANCE (Budget Officer + Finance HOD)
  # ============================================================
  - name: Budget & Finance Officers
    slug: budget-finance
    description: >
      Budget Officers and Finance HODs who verify budget allocation for tenders. This is a two-stage
      verification process in the call-for-tender approval chain: first the Budget Officer verifies
      (step 4), then the Finance HOD provides secondary verification (step 5).
    sequence: 7
    sections:
      - title: Tender Budget Verification - Budget Officer
        slug: budget-officer-verify
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              After the Requesting HOD and Procurement HOD approve a tender (for non-quotation tenders), a Budget
              Officer verification task is created (step 4 in the CFT approval matrix). The Budget Officer reviews
              the tender details and verifies that the proposed budget is available and correctly allocated.
            imageFileName: r7-s0-budget-officer-verify
            sequence: 0
          - instruction: >
              On approval, the system creates a Finance HOD budget verification task (step 5). On return with changes,
              the system notifies the admin of required changes and creates a SUBMISSION task for revision.
            imageFileName: r7-s0-budget-officer-verify
            sequence: 1

      - title: Tender Budget Verification - Finance HOD
        slug: finance-hod-verify
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              The Finance HOD receives the secondary budget verification task. They perform a final check on budget
              allocation and financial compliance. On approval, the system routes to GVP (Development) or GSVP
              (Corporate) based on the subsidiary type for the next approval stage.
            imageFileName: r7-s0-budget-officer-verify
            sequence: 0

  # ============================================================
  # ROLE 8: TENDER MANAGER / PROCUREMENT OFFICER (Tender-Specific)
  # ============================================================
  - name: Tender Manager (Procurement Officer - Tender Functions)
    slug: tender-manager
    description: >
      Procurement Officers with tender management responsibilities. Handles the full tender lifecycle
      including creating RFTs, managing bid submissions, conducting bid openings, processing addendums,
      managing site visits and briefings, and administering committee papers. This role shares the same
      user as Procurement Officer but focuses on tender-specific workflows.
    sequence: 8
    sections:
      # --- Create RFT ---
      - title: Tender - Creating a Request for Tender (RFT) or Contractual RFQ
        slug: tender-create-rft
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              The CreateRFTDialog opens from the PR review sourcing type selection ("RFT" or "Contract RFQ" button).
              The form supports both tender types and auto-saves drafts to IndexedDB (rftDraftsService). If updating
              an existing tender (hasWarning prop), a warning shows: "Any changes made here will restart the approval
              process from the beginning."
            imageFileName: r8-s0-tender-create-rft
            sequence: 0
          - instruction: >
              Core form fields: Tender Type (RadioGroup, required, OPEN or SELECTIVE), Tender Title (TextAreaInput,
              required, max 500 chars), Work Scope (TextAreaInput, required, max 5000 chars), Submission Start Date
              (DatePicker, required, min today), and Submission End Date (DatePicker, required, min submission start date).
            imageFileName: r8-s0-tender-create-rft
            sequence: 1
          - instruction: >
              Conditional fields for OPEN tenders only: Advertisement Start Date (DatePicker, required) and
              Advertisement End Date (DatePicker, required). These define when the tender notice will be publicly
              advertised. For government-funded tenders, a mandatory message about advertisement requirements is shown.
            imageFileName: r8-s0-tender-create-rft
            sequence: 2
          - instruction: >
              Conditional fields for SELECTIVE tenders only: Vendor Selection card with "Select Vendors" button
              opening SelectMultipleContractorDialog (selected contractors shown with remove buttons), and Reason
              for Selective Tender card (TextAreaInput, required for SELECTIVE, max 500 chars) explaining why a
              selective invitation process was chosen.
            imageFileName: r8-s0-tender-create-rft
            sequence: 3
          - instruction: >
              Optional site visit fields: Require Site Visit (Checkbox) - when checked, reveals Site Visit Date
              (DatePicker, required), Site Visit Time (TextInput time format, required), and Site Visit Location
              (TextInput, required). Optional briefing fields: Require Tender Briefing (Checkbox) - reveals
              Briefing Date (DatePicker), Briefing Time (TextInput), and Briefing Location (TextInput).
            imageFileName: r8-s0-tender-create-rft
            sequence: 4
          - instruction: >
              Click "Review & Create" (or "Review & Update" for existing) to show preview. In preview mode, click
              "Back to Edit" to return to form, or "Create RFT/RFQ" / "Update RFT/RFQ" for final submission. For
              OPEN tenders without site visit or briefing, a confirmation dialog appears before submission. Auto-save
              pauses during preview mode.
            imageFileName: r8-s0-tender-create-rft
            sequence: 5
          - instruction: >
              On creation, the tender enters PRETENDER-PENDING-APPROVAL status and routes through the Call for Tender
              approval matrix: Officer submits -> Requesting HOD -> Procurement HOD -> (if RFT) Budget Officer ->
              Finance HOD -> GSVP/GVP -> CEO. Reference format: K1-TND-{yyMMdd}-{ref}.
            imageFileName: r8-s0-tender-create-rft
            sequence: 6

      # --- Tender Addendum ---
      - title: Tender - Managing Addendums
        slug: tender-addendum
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              The TenderAddendumDialog allows adding addendums during the invitation-to-bid period. The form uses
              a dynamic array (minimum 1 addendum). Each addendum has: Title (TextInput, required) and Description
              (TextAreaInput, required). Addendums are numbered sequentially ("Addendum 1", "Addendum 2", etc.).
            imageFileName: r8-s0-tender-create-rft
            sequence: 0
          - instruction: >
              Click "Add Addendum" to add entries. Remove button appears when > 1 addendum exists. Only addendums
              with PENDING status are shown for editing. Click "Save Addendums" to preview via
              TenderAddendumPreviewDialog. On confirmation, the tender is updated and addendum status changes from
              PENDING to APPROVED.
            imageFileName: r8-s0-tender-create-rft
            sequence: 1

      # --- Bid Opening ---
      - title: Tender - Conducting Bid Opening
        slug: tender-bid-opening
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              The BidOpeningPreviewDialog displays a 3-column layout for the formal bid opening meeting. Left column
              shows the bid submission list sorted by amount (lowest first). Middle column shows the PDF viewer for
              each bid. Right column shows bid details and submitted files.
            imageFileName: r8-s0-tender-create-rft
            sequence: 0
          - instruction: >
              Bids are revealed one-by-one. Each bid card shows: Bid number, status icon (Eye/EyeOff for
              revealed/unrevealed), Contractor name, Amount, and Submission date. The lowest bid gets a green
              "Lowest" badge. Click a bid card to select it, then click "Reveal Bid" to show its details.
            imageFileName: r8-s0-tender-create-rft
            sequence: 1
          - instruction: >
              When a bid is revealed, the middle column loads the bid PDF (with download option), and the right column
              shows: Bid Details Card (Contractor name, Amount, Submission date, Completion duration, Comments) and
              Submitted Files section (bid submission PDF + additional files with download buttons). PDFs are cached
              by bid ID for performance.
            imageFileName: r8-s0-tender-create-rft
            sequence: 2
          - instruction: >
              Navigate between bids with Previous/Next buttons. The "Continue" button is enabled only when all bids
              have been revealed (allBidsRevealed check). Clicking Continue opens the ScheduleOfTenderSummaryDialog
              which shows the complete bid comparison summary.
            imageFileName: r8-s0-tender-create-rft
            sequence: 3
          - instruction: >
              In the summary dialog, confirm to update the task with attendees list, external attendees, and
              pre-tender estimated value. The tender status progresses to BID-OPENED. The system records the bid
              opening meeting details for the audit trail.
            imageFileName: r8-s0-tender-create-rft
            sequence: 4

      # --- Admin Action Card (Tender Actions) ---
      - title: Tender - Administrative Actions Overview
        slug: tender-admin-actions
        module: Procurement
        sequence: 3
        steps:
          - instruction: >
              The AdminActionCard component renders up to 21 conditional buttons based on the user's role, tender
              status, and task state. Buttons are grouped by function: General Actions, LOA Actions, Tender Management,
              Committee Paper Actions, Bid Actions, and Minutes Actions.
            imageFileName: r8-s0-tender-create-rft
            sequence: 0
          - instruction: >
              General Actions: "Place on Hold" / "Resume Ticket" (toggle, visible if ticketOwner or admin, not in
              final status), "Edit Purchase Request" (visible if ticketOwner and no active revision task), and
              "Cancel Request" (destructive, visible if ticketOwner and not in final status).
            imageFileName: r8-s0-tender-create-rft
            sequence: 1
          - instruction: >
              LOA Actions: "Update LOA" (visible if LOA task completed and admin is user), "Manage Signed LOA"
              (outline, visible if LOA exists and admin, no active tasks), "Update LOA Reference" (outline, visible
              if LOA exists and admin). These manage the Letter of Award associated with the tender.
            imageFileName: r8-s0-tender-create-rft
            sequence: 2
          - instruction: >
              Tender Management: "Edit Quotation/Tender" (canEditTenderRequest - status PRETENDER-PENDING-APPROVAL
              and approval tasks not complete), "Recall Quotation/Tender" (destructive, status BID-OPENED or
              BID-APPROVED and admin is user), "Edit RFQ/RFT" (canUpdateRFT - PRETENDER states and admin),
              "Update Advert" (OPEN only, INVITATION-TO-BID or PRETENDER-APPROVED), "Submit Another Advert PO"
              (same conditions as Update Advert).
            imageFileName: r8-s0-tender-create-rft
            sequence: 3
          - instruction: >
              Additional Tender Management: "Update Briefing & Site Visit" (canUpdateSiteVisit - PRETENDER/INVITATION
              states, admin/requestor), "Update Submission Dates" (same conditions as site visit update), "Update
              ITT/ITQ" (canUpdateTenderInformation - INVITATION-TO-BID or BID-CLAUSES approval task, admin).
            imageFileName: r8-s0-tender-create-rft
            sequence: 4
          - instruction: >
              Committee Paper Actions: "Edit TC/QC Paper" (canEditTCQCPaper - submission task completed and approval
              task active, and user is PR HOD), opens TenderCommitteePaperFormDialog in update mode.
            imageFileName: r8-s0-tender-create-rft
            sequence: 5
          - instruction: >
              Bid Actions: "Upload Physical Bids" (status INVITATION-TO-BID or BID-OPENED, and user is admin or
              QC/TC Secretary), "Update Bid Opening Meeting" (if bidOpeningRoomBookingId exists and user has
              tender-opening-secretary role), "Add Negotiated Amount" (status BID-OPENED and admin), "Manage Bid
              Options" (status BID-OPENED and admin).
            imageFileName: r8-s0-tender-create-rft
            sequence: 6
          - instruction: >
              Minutes Actions: "Update TC Minutes" (if tcMinutesFileId exists and user has TC_SECRETARY role),
              "Update BOD Minutes" (if bodMinutesFileId exists and user has TC_SECRETARY role). Both open
              UpdateTenderMinutesDialog with the appropriate minutesType (TC or BOD).
            imageFileName: r8-s0-tender-create-rft
            sequence: 7

      # --- Tender Date Changes ---
      - title: Tender - Managing Date Change Requests
        slug: tender-date-changes
        module: Procurement
        sequence: 4
        steps:
          - instruction: >
              When tender dates need modification after approval, the system uses a date change approval flow.
              handleTenderDateRequestChanges filters the changed date fields and creates an EVALUATE task if none
              exists. Changes are stored in tenderUpdatePendingApproval for review.
            imageFileName: r8-s0-tender-create-rft
            sequence: 0
          - instruction: >
              When date changes are approved (handleTenderDateRequestChangesApproved), the pending changes are applied
              from tenderUpdatePendingApproval to the tender record, the pending approval object is cleared, and a
              notification email is sent to the admin. If changes are requested
              (handleTenderDateRequestChangesRequested), the admin is notified of required modifications.
            imageFileName: r8-s0-tender-create-rft
            sequence: 1

  # ============================================================
  # ROLE 9: VENDOR (External Supplier / Contractor)
  # ============================================================
  - name: Vendor (External Supplier)
    slug: vendor
    description: >
      External vendors and contractors who interact with the KKIP procurement system through the Vendor Web
      Portal. This role covers vendor registration, submitting quotations in response to RFQs, managing
      purchase orders, signing Letters of Award, and submitting tender bids. All vendor interactions
      occur on the Vendor Web application (separate from the Admin Desktop App).
    sequence: 9
    sections:
      # --- Registration ---
      - title: Vendor Registration - Company Information
        slug: vendor-registration
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              Navigate to the vendor registration page (/auth/register). The registration is a multi-section form
              with 2 main progress sections: "company" (all business details) and "declaration" (compliance
              declarations). The form auto-saves to IndexedDB continuously. 8 sub-sections compose the company
              information: Company Details, Financial Information, Ownership Structure, Track Records, License
              Registration, HSE Information, Authorised Reseller, and Anti-Corruption Declaration.
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Basic Company Details form - Company Particulars: Organization Structure (SelectInput, required, options
              include Sendirian Berhad, Berhad, Enterprise, etc.), TIN Number (TextInput, conditional - required for
              Sendirian Berhad/Berhad only, with helper text), Trading License (TextInput, required), Trading License
              Description (TextInput, required), Trading License Expiry Year (SelectInput, required, current year +50
              years dropdown), Trading License Files (FileSelectInput, required, multiple files).
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              SSM fields (conditional - only for Sendirian Berhad/Berhad): SSM Number (TextInput, required) and SSM
              Files (FileSelectInput, required, multiple with description). All file uploads validate: max 20MB per
              file, accepted formats PDF/PNG/JPEG/JPG.
            imageFileName: common-my-tasks
            sequence: 2
          - instruction: >
              Company Name (TextInput, required) with autocomplete dropdown for existing vendors - shows when search
              length > 2. Options include similar vendor names + "None of these - I'm registering a new company".
              Selecting an existing vendor sets vendorId. Status badge shows green "Registering as existing vendor"
              or blue "Registering as new vendor". GST Number (TextInput, conditional for Sdn Bhd/Berhad, optional,
              helper "If none, enter N/A"). Year of Incorporation (SelectInput, required, 100-year dropdown backwards).
            imageFileName: common-my-tasks
            sequence: 3
          - instruction: >
              Registered Address: Line 1 (TextInput, required), Line 2 (TextInput, required), Postcode (TextInput,
              required), Country (SelectInputWithSearch, required), State (SelectInputWithSearch, conditional - only
              if country is Malaysia). Mailing Address: Toggle "Same as registered address" auto-populates all fields.
              Same field structure as registered address with independent country/state handling.
            imageFileName: common-my-tasks
            sequence: 4
          - instruction: >
              Contact Information: Contact Number (TextInput, required), Email (TextInput, required, email type),
              Website (TextInput, optional). Contact Person: Title (SelectInput, required, from CONTACT_TITLE_OPTIONS),
              Last Name (TextInput, required), First Name (TextInput, required), Designation (TextInput, required).
              Company Type (CheckboxGroup, required, multiple selection: SUPPLIER, CONSULTANT, CONTRACTOR,
              SERVICE-PROVIDER).
            imageFileName: common-my-tasks
            sequence: 5

      # --- Financial Info ---
      - title: Vendor Registration - Financial Information
        slug: vendor-financial
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              Financial Information: Currency (SelectInput, required, default MYR, from CURRENCY_OPTIONS),
              Authorized Capital (NumberInput, conditional for Sdn Bhd/Berhad, required, shows dynamic currency label),
              Paid-Up Capital (NumberInput, conditional, required), Annual Turnover (NumberInput, required),
              Working Capital (NumberInput, required). All monetary fields display dynamic currency based on selection.
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Bank Details: Bank Name (SelectInput, required, from BANK_OPTIONS), Account Number (TextInput, required),
              Account Holder (TextInput, required). Payment Terms: Payment Terms (SelectInput, required, from
              PAYMENT_TERMS_OPTIONS), Other Payment Terms (TextInput, conditional - required if paymentTerms is "Other").
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Supporting Documents: E-Disbursement File (single file, required, PDF preferred), Audited Accounts Files
              (FileSelectInput, multiple), Bank Statement Files (FileSelectInput, multiple). All with standard file
              validation.
            imageFileName: common-my-tasks
            sequence: 2

      # --- Ownership ---
      - title: Vendor Registration - Ownership Structure
        slug: vendor-ownership
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              Dynamic shareholder list with add/delete. Each shareholder record: Shareholder Name (TextInput, required),
              Identification Number (TextInput, required, up to 12 digits IC/passport, shows formatted partial ID),
              Share Amount (NumberInput, required, positive). Total Shares auto-calculated. "Add Shareholder" button
              creates new records. Delete button (red trash) appears when > 1 record. Optional Documents File
              (FileSelectInput) for ownership proof.
            imageFileName: common-my-tasks
            sequence: 0

      # --- Registration Submit ---
      - title: Vendor Registration - Preview and Submit
        slug: vendor-registration-submit
        module: Procurement
        sequence: 3
        steps:
          - instruction: >
              Click "Continue to Declaration" (company section) - validates 0 errors across all forms. If errors exist:
              shows specific field names if 3 or fewer errors, or a summary count if more. On the declaration section,
              click "Preview & Submit" (Eye icon) to open RegistrationPreviewDialog.
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              The preview dialog loads all registration data with collapsible sections for each category. A comprehensive
              syncAllFilesToGlobalCollection function extracts ALL files from IndexedDB (trading license, SSM, e-disbursement,
              audited accounts, bank statements, company profile, ownership, director, CIDB, PUKONSA, certificates).
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              On submit, the system calls registerVendor API. If a duplicate email is detected, an EmailConflictDialog
              offers options to register as existing vendor or continue as new. All files are uploaded via
              createFilesMutation. On success, navigation redirects to /auth/registration-success. The vendor enters
              REGISTERED status awaiting procurement review.
            imageFileName: common-my-tasks
            sequence: 2

      # --- Submit Quotation ---
      - title: Submitting a Quotation in Response to RFQ
        slug: vendor-submit-quotation
        module: Procurement
        sequence: 4
        steps:
          - instruction: >
              The SubmitQuotationDialog opens from an RFQ invitation. Split-pane layout: left (50%) shows live quotation
              preview (read-only), right (50%) shows the form (scrollable). Auto-saves to IndexedDB every 1 second.
              Previous drafts are loaded on dialog open and cleared on successful submission.
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Basic Information Card: Quotation Reference Number (TextInput, required) and Valid Until (DatePicker,
              required, must be future date). Below, a read-only Quotation Items Table shows requested items from the
              RFQ: Item Name, Quantity, UOM, Description/Specification.
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Quotation Response Items (dynamic array, min 1): Per item row in a table: Name (TextInput, required),
              UOM (SelectInput, from PROCUREMENT_UOM_OPTIONS, required), Quantity (NumberInput, min 1, required),
              Price Per Unit (NumberInput, required), Tax rate (NumberInput, required, percentage), Period (NumberInput,
              optional), Discount (NumberInput, optional). Delete button (Trash2 icon) enabled when > 1 item.
            imageFileName: common-my-tasks
            sequence: 2
          - instruction: >
              Delivery Section: Delivery Period Value (NumberInput, required, default 7), Delivery Period Unit
              (SelectInput, default "days", options: days/weeks/months), Delivery Charges (NumberInput, required,
              min 0, default 0). Payment Terms (SelectInput, required, options: 7 Days, 30 Days, 60 Days, Cash on
              Delivery, Payment in Advance, Other). If "Other" selected, Other Payment Terms (TextInput, required).
            imageFileName: common-my-tasks
            sequence: 3
          - instruction: >
              Discount (NumberInput, min 0, default 0). Additional Charges (dynamic array): per charge Name (TextInput,
              required) and Amount (NumberInput, min 0, required) with Add/Delete buttons. Terms & Conditions (dynamic
              array): per term (TextAreaInput, required) with Add/Delete. Quotation Attachment (VendorFileSelectInput,
              optional, multiple files).
            imageFileName: common-my-tasks
            sequence: 4
          - instruction: >
              The live preview (left pane) shows: calculated item totals with tax, Subtotal, Discount applied,
              Additional charges, Delivery charges, Final total, Payment terms, Delivery period, Valid until date,
              and Terms and conditions. Click "Preview & Submit" to open confirmation. On final submit, quotation
              is created with reference K1-QUOT-{yyMMdd}-{ref}.
            imageFileName: common-my-tasks
            sequence: 5

      # --- PO Management (Vendor) ---
      - title: Purchase Orders - Vendor View and Actions
        slug: vendor-po-management
        module: Procurement
        sequence: 5
        steps:
          - instruction: >
              Navigate to Purchase Orders in the Vendor Portal. 5 tabs: Received (APPROVED, PARTIAL-DELIVERY,
              ACCEPTED-BY-VENDOR statuses), Delivered (DELIVERY-COMPLETED), Pending Payment (filtered by no payment),
              Paid (PAID status), and Rejected by Us (REJECTED-BY-VENDOR).
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Each PO card displays: Reference number with status badge, Items count (icon + count), Delivery location
              (MapPin icon), Total amount (DollarSign icon, formatted currency), Invoice status badge (Submitted/No
              Invoice), and dates (order date, expected delivery). Click a card to open PurchaseOrderViewDialog.
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Invoice section (Received/Delivered tabs): Shows invoice reference number, invoice amount, supplier
              reference, and credit notes if applicable. Individual credit note entries show amounts. "Upload Credit
              Note" button appears for invoices without credit notes. Payable amount is calculated after deductions.
            imageFileName: common-my-tasks
            sequence: 2

      # --- Acknowledge PO ---
      - title: Purchase Order - Acknowledging Receipt
        slug: vendor-acknowledge-po
        module: Procurement
        sequence: 6
        steps:
          - instruction: >
              The AcknowledgePODialog shows a green CheckCircle icon with "Acknowledge Receipt of Purchase Order"
              title and the PO reference number. Confirmation message asks "Are you sure you want to acknowledge
              receipt of this purchase order?" Two buttons: Cancel (outline, disabled during submission) and
              Acknowledge (default, text changes to "Acknowledging..." when pending).
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              On acknowledge, vendorAcknowledgedOn is set to current ISO date. Success toast: "PO has been acknowledged
              successfully". The PO status changes to ACCEPTED-BY-VENDOR. The onAcknowledge callback executes.
            imageFileName: common-my-tasks
            sequence: 1

      # --- Reject PO ---
      - title: Purchase Order - Rejecting a PO
        slug: vendor-reject-po
        module: Procurement
        sequence: 7
        steps:
          - instruction: >
              The RejectPODialog shows a red XCircle icon with "Reject Purchase Order" title and PO reference.
              Instruction text: "You are about to reject this purchase order. Please provide a reason for rejection."
              Reason field (TextAreaInput, required, placeholder "Please enter the reason for rejecting this
              purchase order...").
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Buttons: Cancel (outline) and Reject PO (destructive, disabled if reason empty, text "Rejecting..."
              when pending). On reject, vendorCancellationReason is set. Success toast: "PO has been rejected
              successfully, an email has been sent to notify KKIP". Status changes to REJECTED-BY-VENDOR.
            imageFileName: common-my-tasks
            sequence: 1

      # --- LOA Signature ---
      - title: Letter of Award - Signing the LOA
        slug: vendor-sign-loa
        module: Procurement
        sequence: 8
        steps:
          - instruction: >
              The LetterOfAwardSignatureDialog opens from the vendor's LOA view. Title: "Sign Letter of Award".
              The form requires uploading a signed LOA copy: Signed LOA (VendorFileSelectInput, required, min 1 file,
              PDF only). Files appear in a display component with individual remove buttons.
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Buttons: Cancel (outline) and Sign LOA (green bg-green-600, Upload icon, disabled if submitting or
              form invalid, text "Signing..." when pending). On sign, vendorAcknowledgedOn and vendorSignedCopyFileIds
              are set on the LOA. Success toast: "Letter of Award signed successfully!" Status changes to VENDOR-SIGNED.
            imageFileName: common-my-tasks
            sequence: 1

      # --- Credit Note ---
      - title: Credit Note - Uploading Credit Notes
        slug: vendor-credit-note
        module: Procurement
        sequence: 9
        steps:
          - instruction: >
              The CreditNoteUploadDialog opens from the PO invoice section. Header shows "Upload Credit Note -
              Invoice {referenceNumber}" with Receipt icon. Max height 90vh with scroll. An Invoice Summary Card
              (read-only) displays: Invoice Reference Number, Invoice Amount (RM format, green), and Supplier
              Reference (or N/A).
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Credit Note Items (dynamic array, min 1): Per item card with Item Number header, Description (TextInput,
              required), Qty (NumberInput, required, label "Qty *"), Unit Price (NumberInput, required, label
              "Unit Price (RM) *"), and calculated Total (read-only, RM format). Delete button per item (appears when
              > 1 item). "Add Item" button (outline, sm size).
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Total Credit Note Amount displayed in red-50 background with red-200 border: "-RM {totalAmount}".
              Credit Note Files (VendorFileSelectInput, required, min 1, formats: PDF/JPG/PNG). Instructions card
              (blue) lists: upload document, accepted formats, specify items with qty/price, ensure details visible,
              credit note deducted from invoice total.
            imageFileName: common-my-tasks
            sequence: 2
          - instruction: >
              Buttons: Cancel (outline) and Upload Credit Note (Upload icon, disabled if submitting, text "Uploading
              Credit Note..." when pending). Validation: items array min 1 with description (required), qty (positive),
              amount (positive); creditNoteFiles min 1. On submit, credit note created via API with invoiceId, items,
              and fileIds.
            imageFileName: common-my-tasks
            sequence: 3

      # --- Bid Submission ---
      - title: Tender Bid Submission - Multi-Step Process
        slug: vendor-bid-submission
        module: Procurement
        sequence: 10
        steps:
          - instruction: >
              The MultiStepBidSubmissionDialog is a 3-tab process: Company Profile, Bid Information, and Declarations.
              Unsaved changes are tracked per tab with an orange dot indicator on tab headers. Navigation between tabs
              via Previous/Next buttons. Closing shows a confirmation alert: "Close Bid Submission? Any unsaved changes
              will be lost."
            imageFileName: common-my-tasks
            sequence: 0
          - instruction: >
              Tab 1 - Company Profile: Displays vendor information (read-only). An "Edit Company Profile" button
              opens EditCompanyProfileDialog to update vendor details before submission.
            imageFileName: common-my-tasks
            sequence: 1
          - instruction: >
              Tab 2 - Bid Information: Overall Price field (required), Cheque Reference Number (conditional, if earnest
              money required by tender), Completion Duration (conditional, if not fixed by tender), Bill of Quantities
              file upload (conditional, if BOQ required), Form of Tender/Quotation file upload (required). Optional
              additional forms: Work Schedule, Equipment and Tools, Technical Specifications, Key Personnel.
            imageFileName: common-my-tasks
            sequence: 2
          - instruction: >
              Tab 3 - Declarations: Four required checkboxes that must all be checked: Declaration of Integrity,
              Bidder Declaration, Acceptance of Invitation Terms, and Acceptance of Conditions of Tender.
            imageFileName: common-my-tasks
            sequence: 3
          - instruction: >
              Comprehensive validateBidSubmission function checks all required fields: tenderAmount exists,
              chequeReferenceNumber (if earnest money), estimatedCompletionDuration (if not fixed), boqFileIds
              (if BOQ required), formOfTenderFileIds (always required), and all 4 declarations checked. Returns
              array of missing field names; shows error toast listing them.
            imageFileName: common-my-tasks
            sequence: 4
          - instruction: >
              "Preview & Submit" button (only on Tab 3) validates then opens BidSubmissionPreviewModal showing
              comprehensive bid summary. Final submit button (with "Submitting..." state) sets submittedOn
              timestamp. Each tab component handles its own auto-save and tracks hasUnsavedChanges state.
            imageFileName: common-my-tasks
            sequence: 5

  # ============================================================
  # ROLE 10: TECHNICAL / TENDER COMMITTEE
  # ============================================================
  - name: Technical / Tender Committee
    slug: tender-committee
    description: >
      Committee members who evaluate tender bids and make recommendations. Includes TC Secretary,
      TC Committee Members, and TC Chairman. The committee reviews bid submissions, evaluates technical
      and financial proposals, and prepares committee papers with recommendations for award or recall.
    sequence: 10
    sections:
      - title: Tender Committee Paper - Review and Evaluation
        slug: tc-paper-review
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              TC/QC committee papers are prepared using the TenderCommitteePaperFormDialog. The paper captures:
              Project Introduction, Scope Justification, Project Objectives (dynamic array), Bid Summaries (one per
              bidder), Bid Comparison analysis files, Recommended Bids, Recommendation Reason, and Final Summary.
              The system determines if this is a Quotation Committee (QC) or Tender Committee (TC) paper based on
              bid amounts vs threshold.
            imageFileName: r10-s0-tc-paper-review
            sequence: 0
          - instruction: >
              The committee can recommend specific bids (recommendedBidIds multi-select), select bid options
              (recommendedBidOptionSelections), or check "Require Recall" to recall all quotations. If recall is
              not checked, the Recommendation Reason is required. Bid summaries are auto-populated from bid
              submission data and can include AI-powered summarization.
            imageFileName: r10-s0-tc-paper-review
            sequence: 1
          - instruction: >
              Approval tracking for committee papers appears in Procurement > Approval Tracking under the "QC Paper"
              and "TC Paper" tabs. These filter tasks by QUOTATION-COMMITTEE-PAPER and TENDER-COMMITTEE-PAPER
              reference objects respectively.
            imageFileName: r10-s0-tc-paper-review
            sequence: 2

      - title: Bid Opening Meeting - Attendance and Review
        slug: tc-bid-opening
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              Committee members attend the bid opening meeting. The system records attendees (internal users) and
              external attendees (string names). The Pre-Tender Estimated Value and Pre-Tender Estimate BQ Files
              are presented during the meeting. Bids are revealed one-by-one in order of amount (lowest first).
            imageFileName: r10-s0-tc-paper-review
            sequence: 0
          - instruction: >
              After all bids are revealed, the Schedule of Tender Summary is generated showing all bids side by side.
              Committee members can review: Contractor name, Bid amount, Submission date, Completion duration, and
              Comments for each bidder. The lowest bid is highlighted with a green badge.
            imageFileName: r10-s0-tc-paper-review
            sequence: 1

      - title: TC/BOD Minutes Management
        slug: tc-minutes
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              Users with TC_SECRETARY role can upload and update meeting minutes. "Update TC Minutes" button
              (visible if tcMinutesFileId exists) opens UpdateTenderMinutesDialog with minutesType=TC. "Update BOD
              Minutes" button (visible if bodMinutesFileId exists) opens with minutesType=BOD. Minutes files are
              stored as references on the tender record.
            imageFileName: r10-s0-tc-paper-review
            sequence: 0

  # ============================================================
  # ROLE 11: BOD (Board of Directors)
  # ============================================================
  - name: Board of Directors (BOD)
    slug: bod
    description: >
      Final approval authority for the highest-value procurements. Corporate tier: PO amounts above
      500,000 RM. Development tier: PO amounts above 1,000,000 RM. BOD approval is the last tier
      in the procurement approval matrix.
    sequence: 11
    sections:
      - title: Purchase Order - BOD Approval
        slug: bod-po-approval
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              POs exceeding the CEO tier limit route to the Board of Directors. The BOD reviews the complete
              procurement trail including PR, RFQ/QA, and PO details. Corporate threshold: above 500,000 RM.
              Development threshold: above 1,000,000 RM. BOD approval is the final gate - once approved, the PO
              is issued, GRN tasks are created, and vendor notifications are sent.
            imageFileName: r4-s0-gsvp-po-approval
            sequence: 0

  # ============================================================
  # ROLE 12: APPENDIX - APPROVAL MATRICES & STATUS TRANSITIONS
  # ============================================================
  - name: Appendix - Reference Information
    slug: appendix
    description: >
      Reference tables for approval matrices, status transitions, task workflows, and system constants.
      This section documents the business rules that govern the procurement module workflow.
    sequence: 12
    sections:
      # --- PO Approval Matrix Corporate ---
      - title: Approval Matrix - Purchase Order (Corporate)
        slug: appendix-po-corporate
        module: Procurement
        sequence: 0
        steps:
          - instruction: >
              Corporate PO Approval Tiers - Tier 1: Amount 0 - 1,000 RM, Approver is Requesting HOD, minimum 2
              quotations required. Tier 2: Amount 1,001 - 5,000 RM, Approver is Procurement HOD, minimum 2 quotations.
              Tier 3: Amount 5,001 - 50,000 RM, Approver is GSVP Corporate, minimum 3 quotations.
            imageFileName: r2-s13-po-listings
            sequence: 0
          - instruction: >
              Tier 4: Amount 50,001 - 250,000 RM, Approver is Quotation Committee (QC), minimum 5 quotations.
              QC sub-tasks: QC Secretary Review, then QC Committee Review (3 members, any 2 must approve), then
              QC Chairman Final approval. Tier 5: Amount 250,001 - 500,000 RM, Approver is CEO (Open Quotation),
              minimum 5 quotations. Tier 6: Amount 500,001+ RM, Approver is BOD (Open Tender), minimum 5 quotations.
            imageFileName: r2-s13-po-listings
            sequence: 1

      # --- PO Approval Matrix Development ---
      - title: Approval Matrix - Purchase Order (Development)
        slug: appendix-po-development
        module: Procurement
        sequence: 1
        steps:
          - instruction: >
              Development PO Approval Tiers - Tier 1: Amount 0 - 500 RM, Approver is Requesting HOD, minimum 2
              quotations. Tier 2: Amount 501 - 10,000 RM, Approver is Procurement HOD, minimum 3 quotations.
              Tier 3: Amount 10,001 - 50,000 RM, Approver is GSVP Corporate, minimum 3 quotations.
            imageFileName: r2-s13-po-listings
            sequence: 0
          - instruction: >
              Tier 4: Amount 50,001 - 500,000 RM, Approver is Quotation Committee (QC), minimum 5 quotations.
              QC sub-tasks same as Corporate. Tier 5: Amount 500,001 - 1,000,000 RM, Approver is CEO (Open Quotation),
              minimum 5 quotations. Tier 6: Amount 1,000,001+ RM, Approver is BOD (Open Tender), minimum 5 quotations.
            imageFileName: r2-s13-po-listings
            sequence: 1

      # --- CFT Approval Matrix ---
      - title: Approval Matrix - Call for Tender (CFT)
        slug: appendix-cft-matrix
        module: Procurement
        sequence: 2
        steps:
          - instruction: >
              Call for Tender 7-step approval chain: Step 1 - Procurement Officer submits tender. Step 2 - Requesting
              HOD approves. Step 3 - Procurement HOD reviews (for Quotations, directly approves; for RFTs, routes
              to budget). Step 4 - Budget Officer verifies budget allocation.
            imageFileName: r2-s13-po-listings
            sequence: 0
          - instruction: >
              Step 5 - Finance HOD provides secondary budget verification. Step 6 - GSVP (Corporate) or GVP
              (Development) reviews based on subsidiary type. Step 7 - CEO provides final approval. After CEO
              approval, tender status changes to PRETENDER-APPROVED, ITB clause submission is triggered, and for
              OPEN tenders a TENDER-ADVERTISEMENT task is created.
            imageFileName: r2-s13-po-listings
            sequence: 1

      # --- PR Approval Matrix ---
      - title: Approval Matrix - Purchase Request
        slug: appendix-pr-matrix
        module: Procurement
        sequence: 3
        steps:
          - instruction: >
              Purchase Request approval is a 2-step process: Step 1 - Requestor submits the PR. Step 2 - Requesting
              HOD (Department HOD or Division HOD based on approver selection) approves, declines, or returns with
              comments. After HOD approval, PR status changes to APPROVED and routing to Procurement begins.
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- PR Status Transitions ---
      - title: Status Transitions - Purchase Request
        slug: appendix-pr-statuses
        module: Procurement
        sequence: 4
        steps:
          - instruction: >
              Purchase Request statuses (6): PENDING-APPROVAL (default, awaiting HOD approval), APPROVED (HOD approved,
              awaiting procurement), PROCESSING (procurement officer assigned and working), COMPLETED (PO awarded,
              awardedOn set), CANCELLED (cancelled by requester or rejected by HOD, cancelledOn set), KIV (ticket
              placed on hold). Status is computed from model fields: KIV if ticket on hold, COMPLETED if awardedOn,
              CANCELLED if cancelledOn, PROCESSING if processedOn, APPROVED if approvedOn, else PENDING-APPROVAL.
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- PO Status Transitions ---
      - title: Status Transitions - Purchase Order
        slug: appendix-po-statuses
        module: Procurement
        sequence: 5
        steps:
          - instruction: >
              Purchase Order statuses (9): PENDING-APPROVAL (awaiting approval chain), APPROVED (fully approved,
              issuedOn set), ACCEPTED-BY-VENDOR (vendor acknowledged, vendorAcknowledgedOn set), REJECTED-BY-VENDOR
              (vendor rejected, vendorCancellationReason set), PARTIAL-DELIVERY (some items received,
              isFullDeliveryCompletedStatus=false), DELIVERY-COMPLETED (all items received), INVOICE-SUBMITTED
              (invoice uploaded), PAID (payment confirmed, vendorPaymentReceivedOn set or invoice paid), CANCELLED
              (cancellationReason set).
            imageFileName: r2-s13-po-listings
            sequence: 0
          - instruction: >
              PO status computation priority (highest to lowest): PAID > INVOICE-SUBMITTED > CANCELLED >
              DELIVERY-COMPLETED > PARTIAL-DELIVERY > ACCEPTED-BY-VENDOR > REJECTED-BY-VENDOR > APPROVED >
              PENDING-APPROVAL. PO total is computed as: subtotal - discount + deliveryCharges + additionalCharges
              + taxAmount. Subtotal is sum of all line item subtotals.
            imageFileName: r2-s13-po-listings
            sequence: 1

      # --- RFQ Status Transitions ---
      - title: Status Transitions - Request for Quotation
        slug: appendix-rfq-statuses
        module: Procurement
        sequence: 6
        steps:
          - instruction: >
              RFQ statuses (4): ACTIVE (open for quotation submission, default), PROCESSED (quotation analysis
              completed, processedOn set), CANCELLED (parent PR cancelled), KIV (parent PR on hold). Reference
              format: K1-RFQ-{yyMMdd}-{ref}. allQuotations computed property merges submitted quotations and
              supplier replies, deduped by vendorId.
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- Tender Status Transitions ---
      - title: Status Transitions - Tender
        slug: appendix-tender-statuses
        module: Procurement
        sequence: 7
        steps:
          - instruction: >
              Tender statuses (9): PRETENDER-PENDING-APPROVAL (initial submission, awaiting CFT approval chain),
              PRETENDER-APPROVED (CFT approved, ITB clauses being prepared), INVITATION-TO-BID (invitation documents
              sent, bids being collected), BID-OPENED (formal bid opening completed), BID-APPROVED (committee paper
              approved, winner selected), AWARDED (LOA issued to winning bidder), REJECTED (tender cancelled or all
              bids rejected), KIV (on hold), RECALL (quotations/tenders recalled for re-evaluation).
            imageFileName: r2-s13-po-listings
            sequence: 0
          - instruction: >
              Tender types: OPEN (publicly advertised, any qualified vendor can bid) and SELECTIVE (invitation only,
              requires justification for selective process). Tender invitation document types: INFRASTRUCTURE-WORKS,
              CONSTRUCTION-WORKS, MASTER-PRICE-LIST. Tender addendum statuses: PENDING, APPROVED, REJECTED.
            imageFileName: r2-s13-po-listings
            sequence: 1

      # --- Vendor Statuses ---
      - title: Status Transitions - Vendor Registration
        slug: appendix-vendor-statuses
        module: Procurement
        sequence: 8
        steps:
          - instruction: >
              Vendor registration statuses (5): DB-SEEDED (unregistered, created by admin as adhoc supplier),
              REGISTERED (vendor completed registration form), UNDER-REVIEW (procurement initiated evaluation,
              progresses through review stages: PROCUREMENT -> FINANCE -> TECHNICAL -> PROCUREMENT-RECOMMENDATION ->
              CHAIRMAN-REVIEW), APPROVED (fully evaluated and approved), NOT-APPROVED (evaluation failed or vendor
              rejected).
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- Task System ---
      - title: Task System - Workflow Engine
        slug: appendix-task-system
        module: Procurement
        sequence: 9
        steps:
          - instruction: >
              All procurement workflows are driven by tasks. Task statuses: ACTIVE (current action required),
              COMPLETED (action finished, completedOn set), CHANGES-REQUESTED (returned with comments), ON-HOLD
              (paused), CANCELLED (invalidated by system), QUEUED (waiting for prerequisite), LOG (audit trail entry).
              Tasks have: taskReferenceObject (PURCHASE-REQUEST, PURCHASE-ORDER, LETTER-OF-AWARD,
              QUOTATION-COMMITTEE-PAPER, TENDER-COMMITTEE-PAPER, INVOICE, etc.), taskType (APPROVE, SUBMISSION,
              UPDATE, CANCEL, EVALUATE, RECEIVING, etc.), and assignee.
            imageFileName: r2-s13-po-listings
            sequence: 0
          - instruction: >
              Key task workflow patterns: Linear progression (each approval creates the next tier's task), Parallel
              review (QC committee members review simultaneously, 2-of-3 threshold), Status invalidation (returning
              a PO invalidates all active downstream tasks and creates a revision task), Escalation (amount exceeding
              tier limit routes to next tier), and Leave substitution (system checks LEAVE constant array for
              substitute approvers).
            imageFileName: r2-s13-po-listings
            sequence: 1

      # --- Reference Number Formats ---
      - title: Reference Number Formats
        slug: appendix-ref-numbers
        module: Procurement
        sequence: 10
        steps:
          - instruction: >
              All procurement entities use the format K1-{TYPE}-{yyMMdd}-{idRef} where idRef is generated from
              the database ID. Purchase Request: K1-PR-{yyMMdd}-{ref}. Request for Quotation: K1-RFQ-{yyMMdd}-{ref}.
              Purchase Order: K1-PO-{yyMMdd}-{ref}. Quotation: K1-QUOT-{yyMMdd}-{ref}. Quotation Analysis:
              K1-QA-{yyMMdd}-{ref}. Tender: K1-TND-{yyMMdd}-{ref}. Example: K1-PR-260317-A001.
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- File Upload Constraints ---
      - title: File Upload Constraints
        slug: appendix-file-upload
        module: Procurement
        sequence: 11
        steps:
          - instruction: >
              File upload constraints across the system: Maximum 20MB per individual file. Maximum 30MB total upload
              size per form. Accepted formats: PDF, PNG, JPEG, JPG (some forms accept additional formats).
              TicketFileSelectInput is used when a ticket context exists. FileSelectInput for standalone uploads.
              VendorFileSelectInput for vendor portal uploads. All file components include SelectedFilesDisplay
              with individual remove buttons.
            imageFileName: r2-s13-po-listings
            sequence: 0

      # --- Auto-Save Features ---
      - title: Auto-Save and Draft Persistence
        slug: appendix-autosave
        module: Procurement
        sequence: 12
        steps:
          - instruction: >
              IndexedDB-based auto-save is implemented across multiple forms: Purchase Request form (all fields
              including items and attachments), Quotation Analysis (2000ms interval - selectedQuotationItems,
              comments, justifications, descriptions), Services Received Note / SRN (2000ms interval), Vendor
              Registration (continuous save across all 8 sections), Submit Quotation (1-second interval), Create
              RFT/RFQ (draft during dialog open, paused during preview), Tender Committee Paper (backend draft +
              IndexedDB fallback, keyboard shortcut Cmd+S/Ctrl+S, auto-save on window blur/visibility change/
              beforeunload), Bid Submission (per-tab auto-save with unsaved changes tracking). All drafts are
              cleared on successful submission and loaded on form/dialog open.
            imageFileName: r2-s13-po-listings
            sequence: 0
