            sequence: 4
            imageFileName: null
          - name: Submit evaluation
            description: Click submit. Verify the evaluation is saved and the task is completed.
            sequence: 5
            imageFileName: null
      - name: Driver Views Assigned Bookings
        description: Driver views their assigned vehicle bookings for the day.
        preconditions: User is assigned as a driver for one or more vehicle bookings.
        status: draft
        sequence: 14
        steps:
          - name: Navigate to Driver Bookings
            description:
              Navigate to Office Services > Driver Bookings. Verify the page shows a calendar selector and booking cards
              for the selected date.
            sequence: 0
            imageFileName: f3-flow14-driver-bookings
          - name: Select a date
            description:
