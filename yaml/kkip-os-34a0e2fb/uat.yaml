            sequence: 2
            imageFileName: f6-flow0-my-calendar
      - name: Manage Booking Requests
        description: User manages sent and received booking requests from the dedicated page.
        preconditions: User has both sent and received booking requests.
        status: draft
        sequence: 5
        steps:
          - name: Navigate to Booking Requests
            description:
              Click "Back to Calendar" button (outline, with back arrow) or navigate to Booking Requests page. Verify
              the page title is "Appointment Requests" and shows "To Approve (X)" and "My Requests (X)" tabs with counts.
            sequence: 0
            imageFileName: f6-user-booking-requests
          - name: View received requests (To Approve tab)
            description:
              Click "To Approve" tab. Verify requests are grouped by status sections - "Pending (X)" with clock icon
