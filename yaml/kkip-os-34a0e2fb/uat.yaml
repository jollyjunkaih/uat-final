  - name: Vehicle Booking
    description:
      Complete vehicle booking lifecycle including vehicle browsing, availability checking, booking creation with
      driver selection, approval workflow, key management, fuel tracking, booking cancellation, and post-trip
      evaluation.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope:
      Vehicle availability browsing, vehicle booking creation (single-day and multi-day), driver type selection
      (self-drive, KKIP employee, OS driver), approval workflow, auto-approval for top management, key release, key
      return with dashboard photo, fuel/mileage tracking, booking cancellation, post-trip evaluation with fine/accident
      reporting, Shell card requests, terms and conditions.
    outOfScope: Vehicle registration, vehicle disposal, vehicle depreciation, vehicle purchase workflow.
    sequence: 2
    uatFlows:
      - name: Browse Vehicle Availability
        description: User views available vehicles and their time slots for a selected date.
        preconditions: User is logged in and vehicles are configured in the system.
        status: draft
        sequence: 0
        steps:
          - name: Navigate to new booking page
            description:
              Navigate to My Bookings > New Booking. Click the "Vehicle Booking" tab. Verify the page shows a
              7-day calendar selector and vehicle availability cards in a 4-column grid.
            sequence: 0
            imageFileName: f3-flow0-browse-vehicle-availability
          - name: Select a booking date
            description:
              Click on a date in the calendar selector. Verify vehicle cards update showing availability for the selected
              date.
            sequence: 1
            imageFileName: f3-flow0-browse-vehicle-availability
          - name: Search for a vehicle
            description:
              Type a vehicle model name or license plate in the search field (placeholder "Search by vehicle ID or
              model..."). Verify cards filter to matching vehicles.
            sequence: 2
            imageFileName: f3-flow0-browse-vehicle-availability
          - name: View vehicle card details
            description:
              Verify each vehicle card shows vehicle image, model name, license plate, available time slots (green), and
              booked slots (with booker name and status).
            sequence: 3
            imageFileName: f3-flow0-browse-vehicle-availability
          - name: Identify vehicle status indicators
            description:
              Verify vehicles show status indicators - "Under Maintenance" (orange badge with orange border),
              "Exclusively used by [Entity]" (yellow badge), or "Available for Booking" (green badge).
            sequence: 4
            imageFileName: f3-flow0-browse-vehicle-availability
          - name: Attempt to book maintenance vehicle
            description: Click on a vehicle marked "Under Maintenance". Verify a warning is shown that the vehicle cannot be booked.
            sequence: 5
            imageFileName: f3-flow0-browse-vehicle-availability
      - name: Create Vehicle Booking - Self-Drive Same Day
        description: User creates a same-day vehicle booking as a self-driver.
        preconditions: User is on the Vehicle Booking tab with available vehicles displayed.
        status: draft
        sequence: 1
        steps:
          - name: Click on an available vehicle
            description:
              Click on a vehicle card with available slots. Verify the VehicleBookingForm dialog opens with header
              "Booking Details (Vehicle Number Plate)".
            sequence: 0
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Select purpose
            description:
              Open the "Purpose" dropdown and select a purpose. Available options include Meeting Client,
              Site Inspection, Dispatch/Messenger, Attend event/functions, Training/Seminar, Shuttle Service,
              Repair & Maintenance, Office Matters, Banking, Out station, Transporting Guest/Personnel, AOB, and Others.
            sequence: 1
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Select Others purpose
            description:
              Select "Others" from the purpose dropdown. Verify a custom text input appears for entering a custom reason.
              Enter a custom purpose.
            sequence: 2
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Enter description
            description: Fill in the "Description" textarea with trip details. Verify the field is required.
            sequence: 3
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Enter location
            description: Fill in the "Location" text input with the trip destination. Verify the field is required.
            sequence: 4
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Link referenced ticket (optional)
            description: In "Referenced Ticket (Optional)", search for and select a ticket from the searchable dropdown.
            sequence: 5
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Verify same-day checkbox
            description: Verify "Returning on the same day?" checkbox is checked by default. Leave it checked.
            sequence: 6
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Select pick up time
            description: Open the "Car Pick Up Time" dropdown and select a time from available slots (15-minute intervals).
            sequence: 7
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Select return time
            description: Open the "Car Return Time" dropdown. Verify it shows times after the pick up time. Select a return time.
            sequence: 8
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Verify availability status
            description: Verify the real-time availability indicator shows "Vehicle is available" in green for same-day bookings.
            sequence: 9
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Select self-drive
            description: Select "I am the driver" from the "Driver Option" dropdown. Verify the driver is set to the current user.
            sequence: 10
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Add attachments (optional)
            description: Optionally attach files using the "Attachments (Optional)" file input.
            sequence: 11
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Invite users (optional)
            description: Optionally select users from the "Invite Users (Optional)" multi-select dropdown.
            sequence: 12
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Accept terms and conditions
            description:
              Click the "terms and conditions" link to review vehicle T&Cs. Close the dialog. Check the "I agree to
              the terms and conditions" checkbox.
            sequence: 13
            imageFileName: f3-flow1-vehicle-booking-form
          - name: Submit booking
            description: Click "Create Booking". Verify a success toast with "pending approval" message appears.
            sequence: 14
            imageFileName: f3-flow1-vehicle-booking-form
      - name: Create Vehicle Booking - Employee Driver Multi-Day
        description: User creates a multi-day vehicle booking with a KKIP employee driver.
