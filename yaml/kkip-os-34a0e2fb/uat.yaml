  - name: Vehicle Management
    description: Vehicle fleet management including viewing vehicle inventory, checking vehicle details, maintenance status, insurance/road tax tracking, service requests, and managing vehicle usage type.
    module: Office Services
    priority: medium
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Vehicle inventory browsing, vehicle search and sorting, vehicle detail viewing (overview and maintenance tabs), changing vehicle usage type (bookable vs exclusive), vehicle status indicators, insurance/road tax expiry tracking, document uploads for insurance and road tax, service requests, repair mode toggling.
    outOfScope: Vehicle registration (asset management), vehicle depreciation, vehicle disposal, vehicle purchase workflow.
    sequence: 3
