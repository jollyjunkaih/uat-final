features:
  - name: Office Services - Inventory Request (E-Office Supplies)
    description: End-to-end office supplies request lifecycle including browsing items, cart management, submission, approval, officer assignment, order preparation, goods receiving, and feedback collection.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Browsing office supply items, adding items to cart, submitting inventory requests, HOD approval workflow, officer assignment, order preparation, GRN completion, feedback collection, request modification, rejection, reassignment, department request for non-stocked items.
    outOfScope: Stock replenishment, vendor purchase orders, warehouse stock management (inventory levels admin), IBS-Concrete requests.
    sequence: 0
    uatFlows:
      - name: Browse Office Supplies Catalog
        description: User navigates to the e-office supplies page, browses available items, searches for specific items, and views item details.
        preconditions: User is logged in and has access to Office Services module.
        status: draft
        sequence: 0
      - name: Add Items to Cart
        description: User adds stocked items to the cart with specified quantities.
        preconditions: User is on the E-Office Supplies page with stocked items available.
        status: draft
        sequence: 1
      - name: Request Non-Stocked Item via Department Request
        description: User submits a department request for a non-stocked item.
        preconditions: User is on the E-Office Supplies page with non-stocked items visible.
        status: draft
        sequence: 2
      - name: View and Manage Cart
        description: User opens the cart dialog, reviews items, modifies quantities, removes items, and enters a reason for the request.
        preconditions: User has items in the cart.
        status: draft
        sequence: 3
      - name: Preview and Submit Inventory Request
        description: User previews the formatted request document and submits it.
        preconditions: Cart has items and reason is filled.
        status: draft
        sequence: 4
      - name: HOD Approves Inventory Request
        description: Department HOD reviews and approves an inventory request.
        preconditions: An inventory request has been submitted and is in PENDING-APPROVAL status. HOD is logged in.
        status: draft
        sequence: 5
      - name: HOD Requests Changes on Inventory Request
        description: HOD reviews and returns the request for modifications.
        preconditions: An inventory request is in PENDING-APPROVAL status. HOD is logged in.
        status: draft
        sequence: 6
      - name: HOD Rejects Inventory Request
        description: HOD rejects the inventory request.
        preconditions: An inventory request is in PENDING-APPROVAL status.
        status: draft
        sequence: 7
      - name: HOD Modifies Items and Approves
        description: HOD adjusts item quantities and directly approves.
        preconditions: An inventory request is in PENDING-APPROVAL status.
        status: draft
        sequence: 8
      - name: Office Service HOD Assigns Officer
        description: After approval, Office Service HOD assigns an officer to prepare the supplies.
        preconditions: Inventory request is APPROVED. Office Service HOD is logged in.
        status: draft
        sequence: 9
      - name: Assigned Officer Prepares Supplies
        description: The assigned officer confirms the office supplies are ready for pickup.
        preconditions: Request is ASSIGNED. Officer is logged in.
        status: draft
        sequence: 10
      - name: Requester Completes Goods Received Note (GRN)
        description: Requester picks up supplies and confirms received quantities.
        preconditions: Request is PROCESSED (ready for pickup). Requester is logged in.
        status: draft
        sequence: 11
      - name: Requester Provides Feedback
        description: After receiving supplies, the requester provides a rating and comments.
        preconditions: Request is RECEIVED. Requester is logged in.
        status: draft
        sequence: 12
      - name: View Submitted Feedback
        description: View previously submitted feedback for a completed request.
        preconditions: Feedback has been submitted for a completed inventory request.
        status: draft
        sequence: 13
      - name: Reassign Inventory Request to Another Officer
        description: An officer reassigns an inventory request to themselves.
        preconditions: Inventory request is assigned to another officer and not yet completed. Current user is an Office Service officer.
        status: draft
        sequence: 14
      - name: Admin Manages Inventory Request Orders
        description: Admin views and filters inventory requests on the orders management page.
        preconditions: User has Office Services admin access.
        status: draft
        sequence: 15
      - name: Department HOD Views Office Supplies Orders
        description: Department HOD views and monitors inventory requests from their department.
        preconditions: User is a Department HOD with access to Office Supplies Orders.
        status: draft
        sequence: 16
  - name: Room Booking
    description: Complete meeting room booking lifecycle including room discovery, availability checking, booking creation with office service requests, approval workflow, editing, cancellation, and post-booking evaluation.
    module: Office Services
    priority: high
    status: draft
    ecosystem: Admin Desktop App + Backend
    inScope: Room availability browsing, room booking creation, office service requests (refreshments, presentation, extra tables/chairs, cleanup), HOD approval, auto-approval for top management, booking editing, booking deletion, post-booking evaluation, invited user management, Outlook calendar sync.
    outOfScope: Room CRUD management (creating/editing rooms), room facility management.
    sequence: 1
    uatFlows:
      - name: Browse Room Availability
        description: User views available meeting rooms and their time slots for a selected date.
        preconditions: User is logged in and meeting rooms are configured in the system.
        status: ready_for_test
        sequence: 0
      - name: Create Room Booking
        description: User creates a new room booking with all required and optional fields.
        preconditions: User is on the new booking page, Meeting Room Booking tab, with available rooms displayed.
        status: draft
        sequence: 1
      - name: Room Booking Auto-Approval (Top Management)
        description: A top-management user creates a room booking and it is automatically approved.
        preconditions: User has "top-management" role or their HOD has "top-management" role.
        status: draft
        sequence: 2
      - name: Room Booking HOD Approval
        description: HOD reviews and approves a pending room booking.
        preconditions: A room booking is in PENDING status. HOD is logged in.
        status: draft
        sequence: 3
      - name: HOD Rejects Room Booking
        description: HOD reviews and rejects a pending room booking.
        preconditions: A room booking is in PENDING status.
        status: draft
        sequence: 4
      - name: Check Room Availability
        description: Verify the room availability checking mechanism prevents double bookings.
        preconditions: A room booking already exists for a specific date and time.
        status: draft
        sequence: 5
      - name: Edit Room Booking
        description: User edits an existing room booking's details.
        preconditions: User has an active (non-completed) room booking.
        status: draft
        sequence: 6
      - name: Delete Room Booking
        description: User cancels/deletes an existing room booking.
        preconditions: User has an active room booking.
        status: draft
        sequence: 7
      - name: Admin Manages Room Bookings
        description: Admin views and manages room bookings from the Office Services bookings page.
        preconditions: Admin has Office Services access.
        status: draft
        sequence: 8
      - name: Post-Booking Evaluation
        description: User provides feedback after a completed room booking.
        preconditions: A room booking has been completed (booking date/time has passed) and an evaluation task is active.
        status: draft
        sequence: 9
